name: Validate YAML

on:
  push:
    branches: [main, dev]
    paths:
      - 'config/**/*.yaml'
      - 'config/**/*.yml'
  pull_request:
    paths:
      - 'config/**/*.yaml'
      - 'config/**/*.yml'

jobs:
  yamllint:
    name: Lint YAML files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_data: |
            extends: default
            rules:
              line-length:
                max: 120
                level: warning
              comments:
                min-spaces-from-content: 1
              truthy:
                allowed-values: ['true', 'false']
