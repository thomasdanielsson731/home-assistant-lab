# Axis D6210 Radar — connected to M2036 (driveway_id) via I/O port
#
# Setup: The D6210 triggers M2036's digital input (I/O port).
# M2036 must be configured to publish MQTT events on input state change.
# Camera: System → MQTT, then Events → Add rule: Digital Input → MQTT publish
#
# Topic convention (set in M2036 MQTT rule):
#   axis/driveway_env/radar/motion   — payload "1" (motion) / "0" (clear)
#
# Alternative: If D6210 is connected as an ACAP sensor, it publishes via AOA
# using the topic: axis/driveway_env/event/IOPort/VirtualInput/Active

- name: "driveway_env radar motion"
  unique_id: "d6210_radar_motion"
  state_topic: "axis/driveway_env/radar/motion"
  payload_on: "1"
  payload_off: "0"
  device_class: motion
  expire_after: 30

- name: "driveway_env radar presence"
  unique_id: "d6210_radar_presence"
  state_topic: "axis/driveway_env/event/IOPort/VirtualInput/Active"
  value_template: "{{ 'on' if value_json.Data.active else 'off' }}"
  payload_on: "on"
  payload_off: "off"
  device_class: presence
  expire_after: 30
