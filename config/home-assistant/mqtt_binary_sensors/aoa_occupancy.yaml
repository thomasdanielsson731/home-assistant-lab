- name: "front aoa person"
  unique_id: "aoa_front_person_occupancy"
  state_topic: "axis/front/event/ObjectAnalytics/ScenarioOccupancy/PersonOccupancy/Active"
  value_template: "{{ 'on' if value_json.Data.active else 'off' }}"
  payload_on: "on"
  payload_off: "off"
  device_class: occupancy
  expire_after: 120

