# Axis Scene Metadata — binary presence sensors
# Derived from frame detections — expire after 10s (faster than AOA sensors)

- name: "front scene object present"
  unique_id: "scene_front_object_present"
  state_topic: "axis/front/scene/frame"
  value_template: >
    {{ 'on' if value_json.detections | default([]) | length > 0 else 'off' }}
  payload_on: "on"
  payload_off: "off"
  device_class: motion
  expire_after: 10

