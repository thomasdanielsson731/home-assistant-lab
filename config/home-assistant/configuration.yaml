homeassistant:
  name: Home
  unit_system: metric
  currency: SEK
  country: SE
  internal_url: http://192.168.68.175:8123
  external_url: https://ha.danielsson.cloud

# Load default config set
default_config:

# Keep 90 days of history for outdoor env quarter graphs.
# Exclude high-churn entities to reduce DB size and I/O on 4 GB HA host.
recorder:
  purge_keep_days: 90
  commit_interval: 60
  auto_purge: true
  exclude:
    domains:
      - automation
      - script
      - update
      - persistent_notification
    entity_globs:
      - image.*
      - binary_sensor.*_motion
      - binary_sensor.*_scene_object_present
      - sensor.*_scene_persons
      - sensor.*_scene_vehicles

# HTTP — trust Cloudflared add-on (172.30.33.0/24) for external access via danielsson.cloud
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1
    - 172.30.33.0/24
    - 172.30.33.6

# Logging
logger:
  default: warning
  logs:
    custom_components.frigate: warning

frontend:
  themes: !include_dir_merge_named themes

lovelace:
  dashboards:
    home-hem:
      mode: yaml
      filename: dashboards/home-hem.yaml
      title: Hem
      icon: mdi:home
      show_in_sidebar: true
      require_admin: false
    home-cameras:
      mode: yaml
      filename: dashboards/home-cameras.yaml
      title: Kameror
      icon: mdi:cctv
      show_in_sidebar: true
      require_admin: false
    home-security:
      mode: yaml
      filename: dashboards/home-security.yaml
      title: Säkerhet
      icon: mdi:shield-home
      show_in_sidebar: true
      require_admin: false
    home-events:
      mode: yaml
      filename: dashboards/home-events.yaml
      title: Händelser
      icon: mdi:format-list-bulleted
      show_in_sidebar: true
      require_admin: false
    home-rooms:
      mode: yaml
      filename: dashboards/home-rooms.yaml
      title: Rum
      icon: mdi:floor-plan
      show_in_sidebar: true
      require_admin: false
    home-tech:
      mode: yaml
      filename: dashboards/home-tech.yaml
      title: Teknik
      icon: mdi:chip
      show_in_sidebar: true
      require_admin: true
    house-timeline:
      mode: yaml
      filename: dashboards/house-timeline.yaml
      title: Analytics
      icon: mdi:chart-timeline-variant
      show_in_sidebar: true
      require_admin: false
    house-graphs:
      mode: yaml
      filename: dashboards/house-graphs.yaml
      title: Environment
      icon: mdi:chart-areaspline
      show_in_sidebar: true
      require_admin: false

# Automations, scripts, scenes split into separate files
automation: !include_dir_merge_list automations/
script: !include_dir_merge_named scripts/

# Template sensors (house context + presence fusion)
template: !include_dir_merge_list templates/

# MQTT entities (broker configured via UI — stored in .storage/core.config_entries)
mqtt:
  binary_sensor: !include_dir_merge_list mqtt_binary_sensors/
  sensor: !include_dir_merge_list mqtt_sensors/
  image: !include_dir_merge_list mqtt_images/
