# Axis Scene Snapshot Images — latest detected object per camera
# Configured under mqtt: image: in configuration.yaml (not platform: mqtt)
# Topic: axis/<zone>/scene/snapshot  (JPEG binary published on detection)

- name: "front latest detection"
  unique_id: "scene_snapshot_front"
  image_topic: "axis/front/scene/snapshot"
  content_type: image/jpeg

- name: "driveway wide latest detection"
  unique_id: "scene_snapshot_driveway_wide"
  image_topic: "axis/driveway_wide/scene/snapshot"
  content_type: image/jpeg

- name: "driveway id latest detection"
  unique_id: "scene_snapshot_driveway_id"
  image_topic: "axis/driveway_id/scene/snapshot"
  content_type: image/jpeg

- name: "backyard latest detection"
  unique_id: "scene_snapshot_backyard"
  image_topic: "axis/backyard/scene/snapshot"
  content_type: image/jpeg

- name: "storage ext latest detection"
  unique_id: "scene_snapshot_storage_ext"
