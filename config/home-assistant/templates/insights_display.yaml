# Coalesce MQTT insight counters with legacy _2 duplicates (removed REST sensors).
- sensor:
    - name: "Insights events 24h display"
      unique_id: insights_events_24h_display
      icon: mdi:chart-timeline-variant
      unit_of_measurement: events
      state: >-
        {% set v = states('sensor.insights_events_24h') %}
        {{ v if v not in ['unknown', 'unavailable', ''] else states('sensor.insights_events_24h_2') | default('—') }}
      attributes:
        source: >-
          {% set v = states('sensor.insights_events_24h') %}
          {{ 'mqtt' if v not in ['unknown', 'unavailable', ''] else 'legacy' if states('sensor.insights_events_24h_2') not in ['unknown', 'unavailable', ''] else 'none' }}

