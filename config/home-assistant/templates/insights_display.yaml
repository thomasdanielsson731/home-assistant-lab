# Coalesce MQTT insight counters for dashboard chips (MQTT-only; legacy _2 removed).
- sensor:
    - name: "Insights events 24h display"
      unique_id: insights_events_24h_display
      icon: mdi:chart-timeline-variant
      unit_of_measurement: events
      state: "{{ states('sensor.insights_events_24h') | default('—') }}"
      attributes:
        source: >-
          {{ 'mqtt' if states('sensor.insights_events_24h') not in ['unknown', 'unavailable', ''] else 'none' }}

