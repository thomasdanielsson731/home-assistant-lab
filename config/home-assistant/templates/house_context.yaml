# Unified house context sensors (Digital Twin foundation)

- binary_sensor:
    - name: "House outdoor presence"
      unique_id: house_outdoor_presence
      icon: mdi:walk
      state: >-
        {% set zones = [
          'binary_sensor.front_aoa_person',
          'binary_sensor.driveway_wide_aoa_person',
          'binary_sensor.driveway_id_aoa_person',
          'binary_sensor.backyard_aoa_person',
          'binary_sensor.front_scene_object_present',
          'binary_sensor.driveway_wide_scene_object_present',
          'binary_sensor.driveway_id_scene_object_present',
          'binary_sensor.front_person_occupancy',
          'binary_sensor.driveway_wide_person_occupancy',
          'binary_sensor.driveway_id_person_occupancy'
        ] %}
        {{ zones | select('is_state', 'on') | list | count > 0 }}

- sensor:
    - name: "House air quality summary"
      unique_id: house_air_quality_summary
      icon: mdi:air-filter
      state: "{{ states('sensor.driveway_env_aqi') }}"
      unit_of_measurement: "AQI"
      attributes:
        temperature: "{{ states('sensor.driveway_env_temperature') }}"
        humidity: "{{ states('sensor.driveway_env_humidity') }}"
        co2: "{{ states('sensor.driveway_env_co2') }}"
        pm25: "{{ states('sensor.driveway_env_pm2_5') }}"

    - name: "House safety summary"
      unique_id: house_safety_summary
      icon: mdi:shield-home
      state: >-
        {% if is_state('binary_sensor.house_smoke_alarm', 'on') %}alarm
        {% elif is_state('binary_sensor.sonoff_snzb_05p', 'on') %}water
        {% elif is_state('binary_sensor.sonoff_snzb_05p', 'unavailable') %}warning
        {% elif state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | int(0) < 3 %}warning
        {% elif is_state('binary_sensor.house_outdoor_presence', 'on') %}outdoor_activity
        {% else %}normal{% endif %}
      attributes:
        smoke: "{{ states('binary_sensor.house_smoke_alarm') }}"
        smoke_detail: "{{ state_attr('binary_sensor.house_smoke_alarm', 'active_sensors') }}"
        smoke_count: "{{ state_attr('binary_sensor.house_smoke_alarm', 'detector_count') }}"
        smoke_expected: 3
        water: "{{ states('binary_sensor.sonoff_snzb_05p') }}"
        water_label: >-
          {% if is_state('binary_sensor.sonoff_snzb_05p', 'on') %}VATTEN DETEKTERAT
          {% elif is_state('binary_sensor.sonoff_snzb_05p', 'unavailable') %}Sensor offline
          {% elif is_state('binary_sensor.sonoff_snzb_05p', 'off') %}Torrt
          {% else %}Okänd{% endif %}
        indoor_temp: "{{ states('sensor.house_indoor_temperature') }}"
        outdoor_temp: "{{ states('sensor.driveway_env_temperature') }}"
        outdoor_presence: "{{ states('binary_sensor.house_outdoor_presence') }}"
        air_quality: "{{ states('sensor.house_air_quality_summary') }}"

    - name: "House outdoor activity summary"
      unique_id: house_outdoor_activity_summary
      icon: mdi:motion-sensor
      state: >-
        {% set ns = namespace(z=[]) %}
        {% if is_state('binary_sensor.front_aoa_person', 'on') %}{% set ns.z = ns.z + ['front'] %}{% endif %}
        {% if is_state('binary_sensor.driveway_wide_aoa_person', 'on') %}{% set ns.z = ns.z + ['driveway_wide'] %}{% endif %}
        {% if is_state('binary_sensor.driveway_id_aoa_person', 'on') %}{% set ns.z = ns.z + ['driveway_id'] %}{% endif %}
        {% if is_state('binary_sensor.front_person_occupancy', 'on') and 'front' not in ns.z %}{% set ns.z = ns.z + ['front'] %}{% endif %}
        {% if is_state('binary_sensor.driveway_wide_person_occupancy', 'on') and 'driveway_wide' not in ns.z %}{% set ns.z = ns.z + ['driveway_wide'] %}{% endif %}
        {% if is_state('binary_sensor.driveway_id_person_occupancy', 'on') and 'driveway_id' not in ns.z %}{% set ns.z = ns.z + ['driveway_id'] %}{% endif %}
        {{ ns.z | count }}
      unit_of_measurement: "zoner"
      attributes:
        presence: "{{ states('binary_sensor.house_outdoor_presence') }}"
        active_zones: >-
          {% set ns = namespace(z=[]) %}
          {% if is_state('binary_sensor.front_aoa_person', 'on') %}{% set ns.z = ns.z + ['front'] %}{% endif %}
          {% if is_state('binary_sensor.driveway_wide_aoa_person', 'on') %}{% set ns.z = ns.z + ['driveway_wide'] %}{% endif %}
          {% if is_state('binary_sensor.driveway_id_aoa_person', 'on') %}{% set ns.z = ns.z + ['driveway_id'] %}{% endif %}
          {% if is_state('binary_sensor.front_person_occupancy', 'on') %}{% set ns.z = ns.z + ['front_frigate'] %}{% endif %}
          {% if is_state('binary_sensor.driveway_wide_person_occupancy', 'on') %}{% set ns.z = ns.z + ['driveway_wide_frigate'] %}{% endif %}
          {% if is_state('binary_sensor.driveway_id_person_occupancy', 'on') %}{% set ns.z = ns.z + ['driveway_id_frigate'] %}{% endif %}
          {{ ns.z | join(', ') if ns.z else 'none' }}
        zones_label: >-
          {% set ns = namespace(labels=[]) %}
          {% if is_state('binary_sensor.front_aoa_person', 'on') or is_state('binary_sensor.front_person_occupancy', 'on') %}{% set ns.labels = ns.labels + ['Entré'] %}{% endif %}
          {% if is_state('binary_sensor.driveway_wide_aoa_person', 'on') or is_state('binary_sensor.driveway_wide_person_occupancy', 'on') %}{% set ns.labels = ns.labels + ['Uppfart'] %}{% endif %}
          {% if is_state('binary_sensor.driveway_id_aoa_person', 'on') or is_state('binary_sensor.driveway_id_person_occupancy', 'on') %}{% set ns.labels = ns.labels + ['Uppf. ID'] %}{% endif %}
          {{ ns.labels | join(' · ') if ns.labels else 'Inga aktiva zoner' }}

    - name: "House home status"
      unique_id: house_home_status
      icon: mdi:shield-check
      state: >-
        {% set dc = state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | int(0) %}
        {% if is_state('binary_sensor.house_smoke_alarm', 'on') %}alarm
        {% elif is_state('binary_sensor.sonoff_snzb_05p', 'on') %}alarm
        {% elif is_state('binary_sensor.sonoff_snzb_05p', 'unavailable') %}warning
        {% elif dc < 3 and dc > 0 %}warning
        {% elif dc == 0 %}warning
        {% elif states('binary_sensor.house_smoke_alarm') in ['unavailable', 'unknown'] %}warning
        {% else %}ok{% endif %}
      attributes:
        label: >-
          {% set dc = state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | int(0) %}
          {% if is_state('binary_sensor.house_smoke_alarm', 'on') %}RÖKALARM — kontrollera brandvarnare
          {% elif is_state('binary_sensor.sonoff_snzb_05p', 'on') %}VATTENLÄCKAGE — kök diskmaskin
          {% elif is_state('binary_sensor.sonoff_snzb_05p', 'unavailable') %}Vattensensor svarar inte
          {% elif dc < 3 and dc > 0 %}Brandvarnare {{ dc }}/3 — en sensor offline
          {% elif dc == 0 %}Brandvarnare oklar — kontrollera ZHA
          {% elif states('binary_sensor.house_smoke_alarm') in ['unavailable', 'unknown'] %}Brandvarnare oklar
          {% else %}Allt OK{% endif %}
        smoke: "{{ states('binary_sensor.house_smoke_alarm') }}"
        smoke_count: "{{ state_attr('binary_sensor.house_smoke_alarm', 'detector_count') }}"
        water: "{{ states('binary_sensor.sonoff_snzb_05p') }}"
