title: Säkerhet
views:
  - title: Säkerhet
    path: security
    icon: mdi:shield-home
    type: sections
    max_columns: 1
    sections:

      # ── Hemstatus (rök + vatten) ─────────────────────────────
      - title: HEMSTATUS
        cards:
          - type: custom:mushroom-template-card
            primary: "{{ state_attr('sensor.house_home_status', 'label') | default('Allt OK') }}"
            secondary: >-
              {{ state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | default('?') }} brandvarnare
              · {{ state_attr('sensor.house_safety_summary', 'water_label') | default('—') }}
            icon: mdi:shield-home
            icon_color: >-
              {% if is_state('sensor.house_home_status', 'alarm') %}red
              {% elif is_state('sensor.house_home_status', 'warning') %}amber
              {% else %}green{% endif %}
            fill_container: true
            tap_action:
              action: more-info
              entity: sensor.house_home_status

      - title: UTE
        cards:
          - type: custom:mushroom-template-card
            primary: >-
              {% set loiter = [
                'binary_sensor.front_aoa_loitering',
                'binary_sensor.driveway_wide_aoa_loitering',
                'binary_sensor.driveway_id_aoa_loitering',
                'binary_sensor.backyard_aoa_loitering',
                'binary_sensor.storage_ext_aoa_loitering',
                'binary_sensor.storage_int_aoa_loitering'
              ] %}
              {% if loiter | select('is_state', 'on') | list | count > 0 %}Någon stannar kvar ute
              {% elif is_state('binary_sensor.house_outdoor_presence', 'on') %}Någon rör sig utomhus
              {% else %}Inget utomhus just nu{% endif %}
            secondary: >-
              {{ state_attr('sensor.house_outdoor_activity_summary', 'zones_label') | default('Inga aktiva zoner') }}
            tooltip: >-
              Utomhusaktivitet från alla kameror (AOA + Frigate + Scene).
              Loitering = någon stannar kvar länge i en zon.
            icon: mdi:motion-sensor
            icon_color: >-
              {% set loiter = [
                'binary_sensor.front_aoa_loitering',
                'binary_sensor.driveway_wide_aoa_loitering',
                'binary_sensor.driveway_id_aoa_loitering',
                'binary_sensor.backyard_aoa_loitering',
                'binary_sensor.storage_ext_aoa_loitering',
                'binary_sensor.storage_int_aoa_loitering'
              ] %}
              {% if loiter | select('is_state', 'on') | list | count > 0 %}amber
              {% elif is_state('binary_sensor.house_outdoor_presence', 'on') %}amber
              {% else %}green{% endif %}
            fill_container: true
            tap_action:
              action: navigate
              navigation_path: /lovelace/home-cameras/cameras
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:door
                content: >-
                  {% if is_state('binary_sensor.front_aoa_person', 'on')
                     or is_state('binary_sensor.front_person_occupancy', 'on')
                     or is_state('binary_sensor.front_scene_object_present', 'on') %}Entré · person
                  {% elif is_state('binary_sensor.front_motion', 'on') %}Entré · rörelse
                  {% else %}Entré · lugnt{% endif %}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.front_aoa_person', 'on')
                     or is_state('binary_sensor.front_person_occupancy', 'on')
                     or is_state('binary_sensor.front_scene_object_present', 'on')
                     else 'blue' if is_state('binary_sensor.front_motion', 'on')
                     else 'green' }}
              - type: template
                icon: mdi:road-variant
                content: >-
                  {% if is_state('binary_sensor.driveway_wide_aoa_person', 'on')
                     or is_state('binary_sensor.driveway_wide_person_occupancy', 'on')
                     or is_state('binary_sensor.driveway_wide_scene_object_present', 'on') %}Uppf. · person
                  {% elif is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on') %}Uppf. · fordon
                  {% elif is_state('binary_sensor.driveway_wide_motion', 'on') %}Uppf. · rörelse
                  {% else %}Uppf. · lugnt{% endif %}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.driveway_wide_aoa_person', 'on')
                     or is_state('binary_sensor.driveway_wide_person_occupancy', 'on')
                     or is_state('binary_sensor.driveway_wide_scene_object_present', 'on')
                     else 'blue' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on')
                        or is_state('binary_sensor.driveway_wide_motion', 'on')
                     else 'green' }}
              - type: template
                icon: mdi:tree
                content: >-
                  {% if is_state('binary_sensor.backyard_aoa_person', 'on')
                     or is_state('binary_sensor.backyard_person_occupancy', 'on')
                     or is_state('binary_sensor.backyard_scene_object_present', 'on') %}Bakg. · person
                  {% elif is_state('binary_sensor.backyard_motion', 'on') %}Bakg. · rörelse
                  {% else %}Bakg. · lugnt{% endif %}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.backyard_aoa_person', 'on')
                     or is_state('binary_sensor.backyard_person_occupancy', 'on')
                     or is_state('binary_sensor.backyard_scene_object_present', 'on')
                     else 'blue' if is_state('binary_sensor.backyard_motion', 'on')
                     else 'green' }}
              - type: template
                icon: mdi:warehouse
                content: >-
                  {% if is_state('binary_sensor.storage_ext_aoa_person', 'on')
                     or is_state('binary_sensor.storage_ext_person_occupancy', 'on')
                     or is_state('binary_sensor.storage_ext_scene_object_present', 'on') %}Förr.ut · person
                  {% elif is_state('binary_sensor.storage_ext_motion', 'on') %}Förr.ut · rörelse
                  {% else %}Förr.ut · lugnt{% endif %}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.storage_ext_aoa_person', 'on')
                     or is_state('binary_sensor.storage_ext_person_occupancy', 'on')
                     or is_state('binary_sensor.storage_ext_scene_object_present', 'on')
                     else 'blue' if is_state('binary_sensor.storage_ext_motion', 'on')
                     else 'green' }}
              - type: template
                icon: mdi:garage
                content: >-
                  {% if is_state('binary_sensor.storage_int_aoa_person', 'on')
                     or is_state('binary_sensor.storage_int_person_occupancy', 'on')
                     or is_state('binary_sensor.storage_int_scene_object_present', 'on') %}Förr.in · person
                  {% elif is_state('binary_sensor.storage_int_motion', 'on') %}Förr.in · rörelse
                  {% else %}Förr.in · lugnt{% endif %}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.storage_int_aoa_person', 'on')
                     or is_state('binary_sensor.storage_int_person_occupancy', 'on')
                     or is_state('binary_sensor.storage_int_scene_object_present', 'on')
                     else 'blue' if is_state('binary_sensor.storage_int_motion', 'on')
                     else 'green' }}
              - type: template
                icon: mdi:timer-sand
                content: >-
                  {% set loiter = [
                    'binary_sensor.front_aoa_loitering',
                    'binary_sensor.driveway_wide_aoa_loitering',
                    'binary_sensor.driveway_id_aoa_loitering',
                    'binary_sensor.backyard_aoa_loitering',
                    'binary_sensor.storage_ext_aoa_loitering',
                    'binary_sensor.storage_int_aoa_loitering'
                  ] %}
                  {% set n = loiter | select('is_state', 'on') | list | count %}
                  {% if n > 0 %}Stannar kvar · {{ n }}
                  {% else %}Ingen kvarvarande{% endif %}
                icon_color: >-
                  {% set loiter = [
                    'binary_sensor.front_aoa_loitering',
                    'binary_sensor.driveway_wide_aoa_loitering',
                    'binary_sensor.driveway_id_aoa_loitering',
                    'binary_sensor.backyard_aoa_loitering',
                    'binary_sensor.storage_ext_aoa_loitering',
                    'binary_sensor.storage_int_aoa_loitering'
                  ] %}
                  {{ 'amber' if loiter | select('is_state', 'on') | list | count > 0 else 'grey' }}
              - type: template
                icon: mdi:car
                content: >-
                  {% if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on')
                     or is_state('binary_sensor.front_aoa_vehicle', 'on') %}Fordon ute
                  {% else %}Inget fordon{% endif %}
                icon_color: >-
                  {{ 'blue' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on')
                     or is_state('binary_sensor.front_aoa_vehicle', 'on') else 'green' }}
              - type: action
                icon: mdi:format-list-bulleted
                content: Händelser
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events

      # ── Smoke detectors (ZHA) — unified house alarm sensor ──────
      - title: BRANDVARNARE
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.house_smoke_alarm
                state_not: unavailable
            card:
              type: custom:mushroom-template-card
              primary: >-
                {% set dc = state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | int(0) %}
                {% if is_state('binary_sensor.house_smoke_alarm', 'on') %}RÖKALARM
                {% elif dc >= 3 %}3 brandvarnare · inget rök
                {% elif dc > 0 %}{{ dc }}/3 brandvarnare online
                {% else %}Brandvarnare oklar{% endif %}
              secondary: >-
                {% if is_state('binary_sensor.house_smoke_alarm', 'on') %}
                {{ state_attr('binary_sensor.house_smoke_alarm', 'active_sensors') | default('Kontrollera brandvarnare') }}
                {% else %}Tryck för detaljer{% endif %}
              icon: mdi:smoke-detector
              icon_color: >-
                {% set dc = state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | int(0) %}
                {% if is_state('binary_sensor.house_smoke_alarm', 'on') %}red
                {% elif dc < 3 %}amber
                {% else %}green{% endif %}
              fill_container: true
              tap_action:
                action: more-info
                entity: binary_sensor.house_smoke_alarm
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.house_smoke_alarm
                state: unavailable
            card:
              type: custom:mushroom-template-card
              primary: Brandvarnare oklar
              secondary: En brandvarnare svarar inte — kontrollera ZHA
              icon: mdi:smoke-detector-off
              icon_color: amber
              fill_container: true
              tap_action:
                action: none

      # ── Water leak (ZHA — dishwasher) — alltid synlig ───────────
      - title: VATTENLÄCKAGE
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.sonoff_snzb_05p
                state_not: unavailable
            card:
              type: custom:mushroom-template-card
              primary: >-
                {% if is_state('binary_sensor.sonoff_snzb_05p', 'on') %}VATTEN DETEKTERAT
                {% else %}Torrt{% endif %}
              secondary: Kök · diskmaskin
              icon: mdi:water-alert
              icon_color: >-
                {{ 'red' if is_state('binary_sensor.sonoff_snzb_05p', 'on') else 'green' }}
              fill_container: true
              tap_action:
                action: more-info
                entity: binary_sensor.sonoff_snzb_05p
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.sonoff_snzb_05p
                state: unavailable
            card:
              type: custom:mushroom-template-card
              primary: Vattensensor offline
              secondary: >-
                Sensorn svarar inte — kontrollera diskmaskin-sensorn.
                Vattenlarm tyst tills den är tillbaka.
              icon: mdi:water-off-outline
              icon_color: amber
              fill_container: true
              tap_action:
                action: none
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.sonoff_snzb_05p
                state_not: unavailable
            card:
              type: custom:mushroom-entity-card
              entity: sensor.sonoff_snzb_05p_batteri
              name: Batteri
              icon: mdi:battery
              layout: horizontal
              fill_container: true

      # ── Yale Doorman — dold tills Sprint 1 ─────────────────────
      - title: ACCESS
        visibility:
          - condition: state
            entity: sensor.house_home_status
            state: "__yale_hidden__"
        cards:
          - type: markdown
            content: Kommer snart

      - title: HISTORIK
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:counter
                content: >-
                  {{ states('sensor.insights_events_24h_display') | default('—', true) }} händelser (24 h)
                icon_color: grey
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events
          - type: custom:mushroom-template-card
            primary: Vad hände utomhus idag?
            secondary: Händelser — lista med bilder
            icon: mdi:format-list-bulleted
            icon_color: blue
            fill_container: true
            tap_action:
              action: navigate
              navigation_path: /lovelace/home-events/events
