# Händelser — event list (Danielsson Insights). Iframe blockeras i Windows HA-appen.
title: Händelser
views:
  - title: Händelser
    path: events
    icon: mdi:format-list-bulleted
    panel: true
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: >-
              **Vad hände?** Kronologisk lista med bilder — person, fordon, ankomster.
              Chippen visar 24 h-räknare från Insights. Tomma räknare kan betyda lugnt — inte alltid fel.
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  Person {{ states('sensor.insights_persons_24h_display') | default('—', true) }} (24 h)
                icon_color: amber
              - type: template
                icon: mdi:home-import-outline
                content: >-
                  Ankomster {{ states('sensor.insights_arrivals_24h_display') | default('—', true) }}
                icon_color: blue
              - type: template
                icon: mdi:package-variant-closed
                content: >-
                  Leveranser {{ states('sensor.insights_deliveries_24h_display') | default('—', true) }}
                icon_color: blue
              - type: template
                icon: mdi:bike
                content: >-
                  Cyklar {{ states('sensor.insights_bicycles_24h_display') | default('—', true) }}
                icon_color: green
              - type: template
                icon: mdi:counter
                content: >-
                  Totalt {{ states('sensor.insights_events_24h_display') | default('—', true) }}
                icon_color: grey
              - type: template
                icon: mdi:server-network
                content: >-
                  {% if states('sensor.insights_server_ok') == 'unavailable' %}Insights offline
                  {% else %}Insights OK{% endif %}
                icon_color: >-
                  {% if states('sensor.insights_server_ok') == 'unavailable' %}red
                  {% else %}green{% endif %}
          - type: conditional
            conditions:
              - condition: state
                entity: sensor.insights_server_ok
                state:
                  - unavailable
            card:
              type: markdown
              content: >-
                **Insights svarar inte** — starta om add-on *Danielsson Insights*
                under Inställningar → Tillägg → Drift.
          - type: custom:mushroom-template-card
            primary: Öppna händelselista
            secondary: Bilder och detaljer (Ingress i appen)
            icon: mdi:format-list-bulleted
            icon_color: blue
            fill_container: true
            tap_action:
              action: url
              url_path: !secret events_url
          - type: custom:mushroom-template-card
            primary: Öppna i webbläsare
            secondary: insights.danielsson.cloud — om Ingress-knappen inte fungerar
            icon: mdi:open-in-new
            icon_color: grey
            fill_container: true
            tap_action:
              action: url
              url_path: !secret events_external_url
