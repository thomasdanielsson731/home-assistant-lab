# Händelser — event list with clickable thumbnails (Danielsson Insights)
title: Händelser
views:
  - title: Händelser
    path: events
    icon: mdi:format-list-bulleted
    type: sections
    max_columns: 1
    sections:
      - cards:
          - type: markdown
            content: >-
              **Vad hände?** Kronologisk lista med bilder — person, fordon, ankomster.
              Tryck på en rad för detaljer.
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  Person {{ states('sensor.insights_persons_24h') | default('—', true) }} (24 h)
                icon_color: amber
              - type: template
                icon: mdi:home-import-outline
                content: >-
                  Ankomster {{ states('sensor.insights_arrivals_24h') | default('—', true) }}
                icon_color: blue
              - type: template
                icon: mdi:package-variant-closed
                content: >-
                  Leveranser {{ states('sensor.insights_deliveries_24h') | default('—', true) }}
                icon_color: blue
              - type: action
                icon: mdi:refresh
                content: Öppna / uppdatera
                tap_action:
                  action: url
                  url_path: !secret events_url
          - type: conditional
            conditions:
              - condition: screen
                media_query: "(min-width: 1025px)"
            card:
              type: iframe
              url: !secret events_url
              aspect_ratio: 75%

          - type: conditional
            conditions:
              - condition: screen
                media_query: "(max-width: 1024px)"
            card:
              type: vertical-stack
              cards:
                - type: custom:mushroom-template-card
                  primary: Öppna händelselista
                  secondary: Full lista med bilder — öppnas i webbläsare
                  icon: mdi:format-list-bulleted
                  icon_color: blue
                  fill_container: true
                  tap_action:
                    action: url
                    url_path: !secret events_url
                - type: picture-entity
                  entity: image.front_person
                  name: Senaste vid entrén
                  show_state: true
                  tap_action:
                    action: url
                    url_path: !secret events_url
