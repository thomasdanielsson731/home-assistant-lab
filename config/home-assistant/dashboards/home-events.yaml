# Händelser — event list with clickable rows (Danielsson Insights)
title: Händelser
views:
  - title: Händelser
    path: events
    icon: mdi:format-list-bulleted
    panel: true
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: >-
              **Vad hände?** Kronologisk lista med bilder — person, fordon, ankomster.
              Tryck på en rad för detaljer i Analytics.
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  Person {{ states('sensor.insights_persons_24h') | default('—', true) }} (24 h)
                icon_color: amber
              - type: template
                icon: mdi:home-import-outline
                content: >-
                  Ankomster {{ states('sensor.insights_arrivals_24h') | default('—', true) }}
                icon_color: blue
              - type: template
                icon: mdi:package-variant-closed
                content: >-
                  Leveranser {{ states('sensor.insights_deliveries_24h') | default('—', true) }}
                icon_color: blue
              - type: action
                icon: mdi:refresh
                content: Öppna / uppdatera
                tap_action:
                  action: url
                  url_path: !secret events_url
          - type: iframe
            url: !secret events_url
            aspect_ratio: 100%
