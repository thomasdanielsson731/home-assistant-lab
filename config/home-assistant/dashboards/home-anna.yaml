title: Danielsson Home
views:

  # ═══════════════════════════════════════════════════════════════
  # VIEW 1 — HEM (Anna — enkel)
  # ═══════════════════════════════════════════════════════════════
  - title: Hem
    path: home
    icon: mdi:home
    type: sections
    max_columns: 1
    sections:

      # ── Overview — Anna: väder, utomhusaktivitet, temperatur ──
      - cards:
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: >-
                  {% set h = now().hour %}
                  {% if h < 12 %}God morgon
                  {% elif h < 17 %}God eftermiddag
                  {% else %}God kväll{% endif %}
                secondary: >-
                  {% set vd = ['måndag','tisdag','onsdag','torsdag','fredag','lördag','söndag'] %}
                  {% set md = ['januari','februari','mars','april','maj','juni','juli','augusti','september','oktober','november','december'] %}
                  {{ vd[now().weekday()] }} · {{ now().day }} {{ md[now().month - 1] }}
                icon: mdi:home-variant
                icon_color: blue
                fill_container: true
                tap_action:
                  action: none
              - type: custom:mushroom-template-card
                primary: "{{ states('weather.forecast_hem') | replace('_', ' ') | title }}"
                secondary: Väder
                icon: mdi:weather-partly-cloudy
                icon_color: blue
                layout: vertical
                fill_container: true
                tap_action:
                  action: more-info
                  entity: weather.forecast_hem
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: >-
                  {% if is_state('binary_sensor.house_outdoor_presence', 'on') %}Aktivitet ute
                  {% else %}Ingen aktivitet ute{% endif %}
                secondary: Visar inte vem som är inne
                icon: mdi:motion-sensor
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.house_outdoor_presence', 'on') else 'grey' }}
                layout: vertical
                fill_container: true
              - type: custom:mushroom-template-card
                primary: >-
                  {% set inn = states('sensor.house_indoor_temperature') %}
                  {% if inn in ['unknown', 'unavailable', ''] %}—
                  {% else %}{{ inn }}°C{% endif %}
                secondary: Inne · vardagsrum
                icon: mdi:home-thermometer
                icon_color: >-
                  {% set inn = states('sensor.house_indoor_temperature') | float(none) %}
                  {% if inn is none %}grey
                  {% elif inn < 18 %}blue
                  {% elif inn < 24 %}green
                  {% elif inn < 26 %}amber
                  {% else %}red{% endif %}
                layout: vertical
                fill_container: true
              - type: custom:mushroom-template-card
                primary: >-
                  {% if states('sensor.driveway_env_temperature') in ['unknown', 'unavailable', ''] %}—
                  {% else %}{{ states('sensor.driveway_env_temperature') }}°C{% endif %}
                secondary: Ute · uppfart
                icon: mdi:thermometer
                icon_color: blue
                layout: vertical
                fill_container: true

      # ── Allt OK? — rök, vatten, sammanfattning ───────────────
      - cards:
          - type: custom:mushroom-template-card
            primary: "{{ state_attr('sensor.house_home_status', 'label') | default('Allt OK') }}"
            secondary: >-
              Brandvarnare {{ state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | default('?') }}/3
              · Vatten {{ state_attr('sensor.house_safety_summary', 'water_label') | default('—') }}
            icon: >-
              {% if is_state('sensor.house_home_status', 'alarm') %}mdi:shield-alert
              {% elif is_state('sensor.house_home_status', 'warning') %}mdi:shield-alert-outline
              {% else %}mdi:shield-check{% endif %}
            icon_color: >-
              {% if is_state('sensor.house_home_status', 'alarm') %}red
              {% elif is_state('sensor.house_home_status', 'warning') %}amber
              {% else %}green{% endif %}
            fill_container: true
            tap_action:
              action: navigate
              navigation_path: /lovelace/home-lab/security
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: template
                icon: mdi:smoke-detector
                content: >-
                  {% set dc = state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | int(0) %}
                  {% if is_state('binary_sensor.house_smoke_alarm', 'on') %}RÖK!
                  {% elif dc >= 3 %}Rök OK
                  {% elif dc > 0 %}Rök {{ dc }}/3
                  {% else %}Rök ?{% endif %}
                icon_color: >-
                  {% set dc = state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | int(0) %}
                  {% if is_state('binary_sensor.house_smoke_alarm', 'on') %}red
                  {% elif dc < 3 %}amber
                  {% else %}green{% endif %}
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-lab/security
              - type: template
                icon: mdi:water-alert
                content: >-
                  {% if is_state('binary_sensor.sonoff_snzb_05p', 'on') %}VATTEN
                  {% elif is_state('binary_sensor.sonoff_snzb_05p', 'unavailable') %}Vatten offline
                  {% else %}Vatten OK{% endif %}
                icon_color: >-
                  {% if is_state('binary_sensor.sonoff_snzb_05p', 'on') %}red
                  {% elif is_state('binary_sensor.sonoff_snzb_05p', 'unavailable') %}amber
                  {% else %}green{% endif %}
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-lab/security
              - type: action
                icon: mdi:lightbulb-off-outline
                content: Släck allt
                tap_action:
                  action: call-service
                  service: script.light_turn_off_common
              - type: action
                icon: mdi:chef-hat
                content: Släck kök
                tap_action:
                  action: call-service
                  service: script.light_turn_off_kitchen
              - type: action
                icon: mdi:sofa
                content: Släck vardagsrum
                tap_action:
                  action: call-service
                  service: script.light_turn_off_living_room
              - type: action
                icon: mdi:chart-timeline-variant
                content: Idag ute
                tap_action:
                  action: navigate
                  navigation_path: /house-timeline
              - type: action
                icon: mdi:cctv
                content: Kameror
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-lab/cameras

      - title: ENTRÉ
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.front_aoa_person
                state: "on"
            card:
              type: custom:mushroom-template-card
              primary: Någon vid entrén
              secondary: Just nu · se Kameror
              icon: mdi:door
              icon_color: amber
              fill_container: true
              tap_action:
                action: navigate
                navigation_path: /lovelace/home-lab/cameras
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.front_aoa_person
                state: "off"
              - condition: state
                entity: binary_sensor.front_motion
                state: "on"
            card:
              type: custom:mushroom-template-card
              primary: Rörelse vid entrén
              secondary: Ingen person bekräftad
              icon: mdi:motion-sensor
              icon_color: blue
              fill_container: true
              tap_action:
                action: navigate
                navigation_path: /lovelace/home-lab/cameras
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.front_aoa_person
                state: "off"
              - condition: state
                entity: binary_sensor.front_motion
                state: "off"
            card:
              type: custom:mushroom-template-card
              primary: Entrén lugnt
              secondary: Ingen rörelse just nu
              icon: mdi:door-closed
              icon_color: green
              fill_container: true
              tap_action:
                action: none

      - title: SENASTE VID ENTRÉN
        cards:
          - type: custom:mushroom-template-card
            entity: image.front_person
            primary: Senaste vid entrén
            secondary: >-
              {% if states('image.front_person') in ['unknown', 'unavailable', ''] %}
              Inga detektioner — lugnt
              {% else %}
              {% set dt = as_local(as_datetime(states('image.front_person'))) %}
              {{ dt.strftime('%H:%M idag') }} · {{ relative_time(dt) }}
              {% endif %}
            icon: mdi:cctv
            icon_color: >-
              {{ 'amber' if states('image.front_person') not in ['unknown', 'unavailable', ''] else 'grey' }}
            fill_container: true
            tap_action:
              action: navigate
              navigation_path: /house-timeline

      # ── Lights On Now — only lights that are actually on ────
      - title: LAMPOR TÄNDA
        cards:
          - type: custom:mushroom-template-card
            primary: >-
              {% set on = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('entity_id', 'search', 'ir_light|whitelight')
                | list %}
              {% if on | count == 0 %}Alla lampor släckta
              {% elif on | count == 1 %}1 lampa tänd
              {% else %}{{ on | count }} lampor tända{% endif %}
            secondary: >-
              {% set on = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('entity_id', 'search', 'ir_light|whitelight')
                | map(attribute='name') | list %}
              {{ on | join(' · ') if on | count > 0 else 'Gå till Rum för att styra' }}
            icon: mdi:lightbulb-group
            icon_color: >-
              {% set on = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('entity_id', 'search', 'ir_light|whitelight')
                | list %}
              {{ 'amber' if on | count > 0 else 'disabled' }}
            fill_container: true
            tap_action:
              action: navigate
              navigation_path: /lovelace/home-lab/rooms
          - type: grid
            columns: 2
            square: false
            cards:
              - type: conditional
                conditions:
                  - condition: state
                    entity: light.anna_och_thomas_sovrum
                    state: "on"
                card:
                  type: custom:mushroom-light-card
                  entity: light.anna_och_thomas_sovrum
                  name: Sovrum
                  layout: horizontal
                  fill_container: true
                  show_brightness_control: true
              - type: conditional
                conditions:
                  - condition: state
                    entity: light.hugos_rum
                    state: "on"
                card:
                  type: custom:mushroom-light-card
                  entity: light.hugos_rum
                  name: Hugos rum
                  layout: horizontal
                  fill_container: true
                  show_brightness_control: true
              - type: conditional
                conditions:
                  - condition: state
                    entity: light.living_room
                    state: "on"
                card:
                  type: custom:mushroom-light-card
                  entity: light.living_room
                  name: Vardagsrum
                  layout: horizontal
                  fill_container: true
                  show_brightness_control: true
              - type: conditional
                conditions:
                  - condition: state
                    entity: light.fonsterlampor
                    state: "on"
                card:
                  type: custom:mushroom-light-card
                  entity: light.fonsterlampor
                  name: Fönsterlampor
                  layout: horizontal
                  fill_container: true
                  show_brightness_control: true
              - type: conditional
                conditions:
                  - condition: state
                    entity: light.fonster_vanster
                    state: "on"
                card:
                  type: custom:mushroom-light-card
                  entity: light.fonster_vanster
                  name: Fönster vänster
                  layout: horizontal
                  fill_container: true
                  show_brightness_control: true
              - type: conditional
                conditions:
                  - condition: state
                    entity: light.fonster_hoger
                    state: "on"
                card:
                  type: custom:mushroom-light-card
                  entity: light.fonster_hoger
                  name: Fönster höger
                  layout: horizontal
                  fill_container: true
                  show_brightness_control: true
              - type: conditional
                conditions:
                  - condition: state
                    entity: light.matplats
                    state: "on"
                card:
                  type: custom:mushroom-light-card
                  entity: light.matplats
                  name: Matplats
                  layout: horizontal
                  fill_container: true
                  show_brightness_control: true
              - type: conditional
                conditions:
                  - condition: state
                    entity: light.spottar
                    state: "on"
                card:
                  type: custom:mushroom-light-card
                  entity: light.spottar
                  name: Spottar
                  layout: horizontal
                  fill_container: true
                  show_brightness_control: true
              - type: conditional
                conditions:
                  - condition: state
                    entity: light.taklampa
                    state: "on"
                card:
                  type: custom:mushroom-light-card
                  entity: light.taklampa
                  name: Taklampa
                  layout: horizontal
                  fill_container: true
                  show_brightness_control: true
              - type: conditional
                conditions:
                  - condition: state
                    entity: light.underskapsbelysning
                    state: "on"
                card:
                  type: custom:mushroom-light-card
                  entity: light.underskapsbelysning
                  name: Underskåp
                  layout: horizontal
                  fill_container: true
                  show_brightness_control: true
              - type: conditional
                conditions:
                  - condition: state
                    entity: light.sovrumstaklampa
                    state: "on"
                card:
                  type: custom:mushroom-light-card
                  entity: light.sovrumstaklampa
                  name: Sovrum tak
                  layout: horizontal
                  fill_container: true
                  show_brightness_control: true
              - type: conditional
                conditions:
                  - condition: state
                    entity: light.hugos_taklampa
                    state: "on"
                card:
                  type: custom:mushroom-light-card
                  entity: light.hugos_taklampa
                  name: Hugo tak
                  layout: horizontal
                  fill_container: true
                  show_brightness_control: true

  # ═══════════════════════════════════════════════════════════════
  # VIEW 2 — KAMEROR
  - title: Kameror
    path: cameras
    icon: mdi:cctv
    type: sections
    max_columns: 2
    sections:

      # One camera per section → even 2-column rows:
      #   Front | Driveway Wide / Driveway ID | Backyard / Storage Ext | Storage Int

      - title: ENTRÉ
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.front
                title: Entré (P3288)
            dimensions:
              aspect_ratio: 16/9
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  {{ 'Person' if is_state('binary_sensor.front_aoa_person', 'on')
                     else 'Rörelse' if is_state('binary_sensor.front_motion', 'on')
                     else 'Lugnt' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.front_aoa_person', 'on')
                     else 'blue' if is_state('binary_sensor.front_motion', 'on')
                     else 'grey' }}

      - title: UPPFART — BRETT
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.driveway_wide
                title: Uppfart bred (Q3558)
            dimensions:
              aspect_ratio: 16/9
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:car
                content: >-
                  {{ 'Fordon' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on')
                     else 'Inget fordon' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on') else 'grey' }}
              - type: template
                icon: mdi:motion-sensor
                content: >-
                  {{ 'Rörelse' if is_state('binary_sensor.driveway_wide_motion', 'on')
                     else 'Ingen rörelse' }}
                icon_color: >-
                  {{ 'blue' if is_state('binary_sensor.driveway_wide_motion', 'on') else 'grey' }}

      - title: UPPFART — ID
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.driveway_id
                title: Uppfart ID (M2036)
            dimensions:
              aspect_ratio: 16/9
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  {{ 'Person' if is_state('binary_sensor.driveway_id_aoa_person', 'on')
                     else 'Ingen person' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.driveway_id_aoa_person', 'on') else 'grey' }}

      - title: BAKGÅRD
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.backyard
                title: Bakgård (Q1656)
            dimensions:
              aspect_ratio: 16/9
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  {{ 'Person' if is_state('binary_sensor.backyard_aoa_person', 'on')
                     else 'Rörelse' if is_state('binary_sensor.backyard_motion', 'on')
                     else 'Lugnt' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.backyard_aoa_person', 'on')
                     else 'blue' if is_state('binary_sensor.backyard_motion', 'on')
                     else 'grey' }}

      - title: FÖRRÅD — UTE
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.storage_ext
                title: Förråd utvändigt (M1055)
            dimensions:
              aspect_ratio: 16/9
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  {{ 'Person' if is_state('binary_sensor.storage_ext_aoa_person', 'on')
                     else 'Rörelse' if is_state('binary_sensor.storage_ext_motion', 'on')
                     else 'Lugnt' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.storage_ext_aoa_person', 'on')
                     else 'blue' if is_state('binary_sensor.storage_ext_motion', 'on')
                     else 'grey' }}

      - title: FÖRRÅD — INNE
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.storage_int
                title: Förråd invändigt (Q1656)
            dimensions:
              aspect_ratio: 16/9
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  {{ 'Person' if is_state('binary_sensor.storage_int_aoa_person', 'on')
                     else 'Rörelse' if is_state('binary_sensor.storage_int_motion', 'on')
                     else 'Lugnt' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.storage_int_aoa_person', 'on')
                     else 'blue' if is_state('binary_sensor.storage_int_motion', 'on')
                     else 'grey' }}

  # ═══════════════════════════════════════════════════════════════
  # VIEW 3 — SÄKERHET (Anna — enkel)
  # ═══════════════════════════════════════════════════════════════
  - title: Säkerhet
    path: security
    icon: mdi:shield-home
    type: sections
    max_columns: 1
    sections:

      # ── Hemstatus (rök + vatten) ─────────────────────────────
      - title: HEMSTATUS
        cards:
          - type: custom:mushroom-template-card
            primary: "{{ state_attr('sensor.house_home_status', 'label') | default('Allt OK') }}"
            secondary: >-
              {{ state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | default('?') }} brandvarnare
              · {{ state_attr('sensor.house_safety_summary', 'water_label') | default('—') }}
            icon: mdi:shield-home
            icon_color: >-
              {% if is_state('sensor.house_home_status', 'alarm') %}red
              {% elif is_state('sensor.house_home_status', 'warning') %}amber
              {% else %}green{% endif %}
            fill_container: true
            tap_action:
              action: more-info
              entity: sensor.house_home_status

      - title: UTE
        cards:
          - type: custom:mushroom-template-card
            primary: >-
              {% if is_state('binary_sensor.house_outdoor_presence', 'on') %}Aktivitet utomhus
              {% else %}Ingen aktivitet utomhus{% endif %}
            secondary: >-
              {{ state_attr('sensor.house_outdoor_activity_summary', 'active_zones') | default('none') }}
            icon: mdi:motion-sensor
            icon_color: >-
              {{ 'amber' if is_state('binary_sensor.house_outdoor_presence', 'on') else 'green' }}
            fill_container: true
            tap_action:
              action: navigate
              navigation_path: /lovelace/home-lab/cameras
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:door
                content: >-
                  {% if is_state('binary_sensor.front_aoa_person', 'on') %}Entré · person
                  {% elif is_state('binary_sensor.front_motion', 'on') %}Entré · rörelse
                  {% else %}Entré · lugnt{% endif %}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.front_aoa_person', 'on')
                     else 'blue' if is_state('binary_sensor.front_motion', 'on')
                     else 'green' }}
              - type: template
                icon: mdi:timer-sand
                content: >-
                  {% set loiter = [
                    'binary_sensor.front_aoa_loitering',
                    'binary_sensor.driveway_wide_aoa_loitering',
                    'binary_sensor.driveway_id_aoa_loitering'
                  ] %}
                  {% if loiter | select('is_state', 'on') | list | count > 0 %}Kvarvarande vid entré
                  {% else %}Ingen loitering{% endif %}
                icon_color: >-
                  {% set loiter = [
                    'binary_sensor.front_aoa_loitering',
                    'binary_sensor.driveway_wide_aoa_loitering',
                    'binary_sensor.driveway_id_aoa_loitering'
                  ] %}
                  {{ 'amber' if loiter | select('is_state', 'on') | list | count > 0 else 'grey' }}
              - type: action
                icon: mdi:chart-timeline-variant
                content: Vad hände idag?
                tap_action:
                  action: navigate
                  navigation_path: /house-timeline

      # ── Smoke detectors (ZHA) — unified house alarm sensor ──────
      - title: BRANDVARNARE
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.house_smoke_alarm
                state_not: unavailable
            card:
              type: custom:mushroom-template-card
              primary: >-
                {% set dc = state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | int(0) %}
                {% if is_state('binary_sensor.house_smoke_alarm', 'on') %}RÖKALARM
                {% elif dc >= 3 %}3 brandvarnare · inget rök
                {% elif dc > 0 %}{{ dc }}/3 brandvarnare online
                {% else %}Brandvarnare oklar{% endif %}
              secondary: >-
                {% if is_state('binary_sensor.house_smoke_alarm', 'on') %}
                {{ state_attr('binary_sensor.house_smoke_alarm', 'active_sensors') | default('Kontrollera brandvarnare') }}
                {% else %}Tryck för detaljer{% endif %}
              icon: mdi:smoke-detector
              icon_color: >-
                {% set dc = state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | int(0) %}
                {% if is_state('binary_sensor.house_smoke_alarm', 'on') %}red
                {% elif dc < 3 %}amber
                {% else %}green{% endif %}
              fill_container: true
              tap_action:
                action: more-info
                entity: binary_sensor.house_smoke_alarm
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.house_smoke_alarm
                state: unavailable
            card:
              type: custom:mushroom-template-card
              primary: Brandvarnare oklar
              secondary: ZHA svarar inte — kontrollera brandvarnarna
              icon: mdi:smoke-detector-off
              icon_color: amber
              fill_container: true
              tap_action:
                action: none

      # ── Water leak (ZHA — dishwasher) — alltid synlig ───────────
      - title: VATTENLÄCKAGE
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.sonoff_snzb_05p
                state_not: unavailable
            card:
              type: custom:mushroom-template-card
              primary: >-
                {% if is_state('binary_sensor.sonoff_snzb_05p', 'on') %}VATTEN DETEKTERAT
                {% else %}Torrt{% endif %}
              secondary: Kök · diskmaskin
              icon: mdi:water-alert
              icon_color: >-
                {{ 'red' if is_state('binary_sensor.sonoff_snzb_05p', 'on') else 'green' }}
              fill_container: true
              tap_action:
                action: more-info
                entity: binary_sensor.sonoff_snzb_05p
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.sonoff_snzb_05p
                state: unavailable
            card:
              type: custom:mushroom-template-card
              primary: Vattensensor offline
              secondary: >-
                Sensorn svarar inte — be Thomas kolla diskmaskin-sensorn.
                Vattenlarm tyst tills den är tillbaka.
              icon: mdi:water-off-outline
              icon_color: amber
              fill_container: true
              tap_action:
                action: none
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.sonoff_snzb_05p
                state_not: unavailable
            card:
              type: custom:mushroom-entity-card
              entity: sensor.sonoff_snzb_05p_batteri
              name: Batteri
              icon: mdi:battery
              layout: horizontal
              fill_container: true

      # ── Yale Doorman — dold tills Sprint 1 ─────────────────────
      - title: ACCESS
        visibility:
          - condition: state
            entity: sensor.house_home_status
            state: "__yale_hidden__"
        cards:
          - type: markdown
            content: Kommer snart

      - title: HISTORIK
        cards:
          - type: custom:mushroom-template-card
            primary: Vad hände utomhus idag?
            secondary: Öppna Analytics — händelser & bilder
            icon: mdi:chart-timeline-variant
            icon_color: blue
            fill_container: true
            tap_action:
              action: navigate
              navigation_path: /house-timeline

  # ═══════════════════════════════════════════════════════════════
  # VIEW 4 — RUM (Anna — enkel)
  # Lights and devices by area
  # ═══════════════════════════════════════════════════════════════
  - title: Rum
    path: rooms
    icon: mdi:floor-plan
    type: sections
    max_columns: 2
    sections:

      # ── Master light control ──────────────────────────────────
      - column_span: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Belysning
            secondary: >-
              {% set on = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('entity_id', 'search', 'ir_light|whitelight')
                | list %}
              {% if on | count == 0 %}Alla lampor släckta
              {% elif on | count == 1 %}1 lampa tänd
              {% else %}{{ on | count }} lampor tända{% endif %}
            icon: mdi:lightbulb-group
            icon_color: >-
              {% set on = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('entity_id', 'search', 'ir_light|whitelight')
                | list %}
              {{ 'amber' if on | count > 0 else 'disabled' }}
            fill_container: true
            tap_action:
              action: none
          - type: custom:mushroom-chips-card
            chips:
              - type: action
                icon: mdi:lightbulb-off-outline
                content: Släck allt
                tap_action:
                  action: call-service
                  service: script.light_turn_off_common
              - type: action
                icon: mdi:chef-hat
                content: Släck kök
                tap_action:
                  action: call-service
                  service: script.light_turn_off_kitchen
              - type: action
                icon: mdi:sofa
                content: Släck vardagsrum
                tap_action:
                  action: call-service
                  service: script.light_turn_off_living_room
              - type: action
                icon: mdi:bed
                content: Släck sovrum
                tap_action:
                  action: call-service
                  service: script.light_turn_off_bedroom

      # ── Temperatur (enkel) ───────────────────────────────────
      - column_span: 2
        cards:
          - type: custom:mushroom-template-card
            primary: >-
              {% set inn = states('sensor.house_indoor_temperature') %}
              {% if inn in ['unknown', 'unavailable', ''] %}Inne —
              {% else %}Inne {{ inn }}°C{% endif %}
            secondary: >-
              {% set d = states('sensor.house_indoor_outdoor_delta') %}
              {% if d in ['unknown', 'unavailable', ''] %}Vardagsrum & hall
              {% else %}{{ state_attr('sensor.house_indoor_outdoor_delta', 'label') | default('Δ ' ~ d ~ '°C') }}{% endif %}
            icon: mdi:home-thermometer
            icon_color: >-
              {% set inn = states('sensor.house_indoor_temperature') | float(none) %}
              {% if inn is none %}grey
              {% elif inn < 18 %}blue
              {% elif inn < 24 %}green
              {% elif inn < 26 %}amber
              {% else %}red{% endif %}
            fill_container: true
            tap_action:
              action: more-info
              entity: sensor.house_indoor_temperature

      # ── Kök ──────────────────────────────────────────────────
      # Lamporna sitter bakom väggströmbrytare — "unavailable" betyder
      # strömlös, inte trasig. Visas då som "Av · väggströmbrytare".
      - title: KÖK
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: light.spottar
                state_not: unavailable
            card:
              type: custom:mushroom-light-card
              entity: light.spottar
              name: Spottar
              show_brightness_control: true
              collapsible_controls: false
              layout: horizontal
              fill_container: true
          - type: conditional
            conditions:
              - condition: state
                entity: light.spottar
                state: unavailable
            card:
              type: custom:mushroom-template-card
              primary: Spottar
              secondary: Av · väggströmbrytare
              icon: mdi:lightbulb-off-outline
              icon_color: disabled
              fill_container: true
              tap_action:
                action: none
          - type: conditional
            conditions:
              - condition: state
                entity: light.matplats
                state_not: unavailable
            card:
              type: custom:mushroom-light-card
              entity: light.matplats
              name: Matplats
              show_brightness_control: true
              collapsible_controls: false
              layout: horizontal
              fill_container: true
          - type: conditional
            conditions:
              - condition: state
                entity: light.matplats
                state: unavailable
            card:
              type: custom:mushroom-template-card
              primary: Matplats
              secondary: Av · väggströmbrytare
              icon: mdi:lightbulb-off-outline
              icon_color: disabled
              fill_container: true
              tap_action:
                action: none
          - type: conditional
            conditions:
              - condition: state
                entity: light.underskapsbelysning
                state_not: unavailable
            card:
              type: custom:mushroom-light-card
              entity: light.underskapsbelysning
              name: Underskåp
              show_brightness_control: true
              collapsible_controls: false
              layout: horizontal
              fill_container: true
          - type: conditional
            conditions:
              - condition: state
                entity: light.underskapsbelysning
                state: unavailable
            card:
              type: custom:mushroom-template-card
              primary: Underskåp
              secondary: Av · väggströmbrytare
              icon: mdi:lightbulb-off-outline
              icon_color: disabled
              fill_container: true
              tap_action:
                action: none
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.sonoff_snzb_05p
                state_not: unavailable
            card:
              type: custom:mushroom-entity-card
              entity: binary_sensor.sonoff_snzb_05p
              name: Vattensensor diskmaskin
              icon: mdi:water-alert
              layout: horizontal
              fill_container: true
              icon_color: >-
                {{ 'red' if is_state('binary_sensor.sonoff_snzb_05p', 'on') else 'green' }}
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.sonoff_snzb_05p
                state: unavailable
            card:
              type: custom:mushroom-template-card
              primary: Vattensensor offline
              secondary: Sensorn svarar inte — be Thomas kolla
              icon: mdi:water-off-outline
              icon_color: amber
              fill_container: true
              tap_action:
                action: navigate
                navigation_path: /lovelace/home-lab/security

      # ── Vardagsrum ───────────────────────────────────────────
      - title: VARDAGSRUM
        cards:
          - type: custom:mushroom-light-card
            entity: light.living_room
            name: Vardagsrum
            show_brightness_control: true
            show_color_temp_control: true
            collapsible_controls: false
            layout: horizontal
            fill_container: true
          - type: conditional
            conditions:
              - condition: state
                entity: light.taklampa
                state_not: unavailable
            card:
              type: custom:mushroom-light-card
              entity: light.taklampa
              name: Taklampa
              show_brightness_control: true
              collapsible_controls: false
              layout: horizontal
              fill_container: true
          - type: conditional
            conditions:
              - condition: state
                entity: light.taklampa
                state: unavailable
            card:
              type: custom:mushroom-template-card
              primary: Taklampa
              secondary: Av · väggströmbrytare
              icon: mdi:lightbulb-off-outline
              icon_color: disabled
              fill_container: true
              tap_action:
                action: none

      # ── Fönsterlampor ────────────────────────────────────────
      - title: FÖNSTERLAMPOR
        cards:
          - type: custom:mushroom-light-card
            entity: light.fonsterlampor
            name: Alla fönster
            show_brightness_control: true
            collapsible_controls: false
            layout: horizontal
            fill_container: true
          - type: horizontal-stack
            cards:
              - type: conditional
                conditions:
                  - condition: state
                    entity: light.fonster_vanster
                    state_not: unavailable
                card:
                  type: custom:mushroom-light-card
                  entity: light.fonster_vanster
                  name: Vänster
                  show_brightness_control: true
                  collapsible_controls: true
                  fill_container: true
              - type: conditional
                conditions:
                  - condition: state
                    entity: light.fonster_hoger
                    state_not: unavailable
                card:
                  type: custom:mushroom-light-card
                  entity: light.fonster_hoger
                  name: Höger
                  show_brightness_control: true
                  collapsible_controls: true
                  fill_container: true

      # ── Sovrum ───────────────────────────────────────────────
      - title: SOVRUM
        cards:
          - type: custom:mushroom-light-card
            entity: light.anna_och_thomas_sovrum
            name: Sovrum
            show_brightness_control: true
            show_color_temp_control: true
            collapsible_controls: false
            layout: horizontal
            fill_container: true
          - type: conditional
            conditions:
              - condition: state
                entity: light.sovrumstaklampa
                state_not: unavailable
            card:
              type: custom:mushroom-light-card
              entity: light.sovrumstaklampa
              name: Taklampa
              show_brightness_control: true
              collapsible_controls: false
              layout: horizontal
              fill_container: true
          - type: conditional
            conditions:
              - condition: state
                entity: light.sovrumstaklampa
                state: unavailable
            card:
              type: custom:mushroom-template-card
              primary: Taklampa
              secondary: Av · väggströmbrytare
              icon: mdi:lightbulb-off-outline
              icon_color: disabled
              fill_container: true
              tap_action:
                action: none

      # ── Hugos rum ────────────────────────────────────────────
      - title: HUGOS RUM
        cards:
          - type: custom:mushroom-light-card
            entity: light.hugos_rum
            name: Hugos rum
            show_brightness_control: true
            show_color_temp_control: true
            collapsible_controls: false
            layout: horizontal
            fill_container: true
          - type: conditional
            conditions:
              - condition: state
                entity: light.hugos_taklampa
                state_not: unavailable
            card:
              type: custom:mushroom-light-card
              entity: light.hugos_taklampa
              name: Taklampa
              show_brightness_control: true
              collapsible_controls: false
              layout: horizontal
              fill_container: true
          - type: conditional
            conditions:
              - condition: state
                entity: light.hugos_taklampa
                state: unavailable
            card:
              type: custom:mushroom-template-card
              primary: Taklampa
              secondary: Av · väggströmbrytare
              icon: mdi:lightbulb-off-outline
              icon_color: disabled
              fill_container: true
              tap_action:
                action: none
          - type: custom:mushroom-chips-card
            chips:
              - type: action
                icon: mdi:lightbulb-off-outline
                content: Släck Hugos rum
                tap_action:
                  action: call-service
                  service: light.turn_off
                  target:
                    entity_id:
                      - light.hugos_rum
                      - light.hugos_taklampa

      # ── Hugo rum ─────────────────────────────────────────────
      - title: STÄDROBOT
        column_span: 2
        cards:
          - type: custom:mushroom-vacuum-card
            entity: vacuum.hoover
            name: Städrobot
            fill_container: true
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-entity-card
                entity: sensor.hoover_batteri
                name: Batteri
                icon: mdi:battery
                layout: vertical
              - type: custom:mushroom-entity-card
                entity: sensor.hoover_status
                name: Status
                icon: mdi:information
                layout: vertical
              - type: custom:mushroom-entity-card
                entity: sensor.hoover_nuvarande_rum
                name: Rum
                icon: mdi:floor-plan
                layout: vertical
          - type: custom:mushroom-chips-card
            chips:
              - type: action
                icon: mdi:play
                content: Starta
                tap_action:
                  action: call-service
                  service: vacuum.start
                  target:
                    entity_id: vacuum.hoover
              - type: action
                icon: mdi:pause
                content: Pausa
                tap_action:
                  action: call-service
                  service: vacuum.pause
                  target:
                    entity_id: vacuum.hoover
              - type: action
                icon: mdi:stop
                content: Stopp
                tap_action:
                  action: call-service
                  service: vacuum.stop
                  target:
                    entity_id: vacuum.hoover
              - type: action
                icon: mdi:home-import-outline
                content: Docka
                tap_action:
                  action: call-service
                  service: vacuum.return_to_base
                  target:
                    entity_id: vacuum.hoover
              - type: entity
                entity: button.hoover_full_cleaning
                icon: mdi:broom
                content_info: name
          - type: custom:mushroom-template-card
            primary: >-
              {% if is_state('vacuum.hoover', 'cleaning') %}Städar — {{ states('sensor.hoover_nuvarande_rum') }}
              {% elif is_state('vacuum.hoover', 'docked') %}Dockad & laddad
              {% else %}{{ states('vacuum.hoover') | title }}{% endif %}
            secondary: "Totalt städat: {{ states('sensor.hoover_totalt_stadad_area') | round(0) }} m²"
            icon: mdi:robot-vacuum
            icon_color: >-
              {{ 'green' if is_state('vacuum.hoover', 'docked') else 'blue' }}
            fill_container: true
            tap_action:
              action: more-info
              entity: vacuum.hoover
          - type: picture-entity
            entity: image.hoover_bottenvaning
            name: Bottenvåning
            show_state: false
            tap_action:
              action: more-info

