# Analytics — Insights via Ingress (in-app). Iframe blockeras i Windows HA-appen.
views:
  - title: Analytics
    panel: true
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: action
                icon: mdi:format-list-bulleted
                content: Händelser
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events
              - type: action
                icon: mdi:chart-areaspline
                content: Environment
                tap_action:
                  action: navigate
                  navigation_path: /house-graphs
              - type: template
                icon: mdi:account
                content: >-
                  Person {{ states('sensor.insights_persons_24h_display') | default('—', true) }}
                icon_color: amber
              - type: template
                icon: mdi:counter
                content: >-
                  Totalt {{ states('sensor.insights_events_24h_display') | default('—', true) }}
                icon_color: grey
              - type: template
                icon: mdi:server-network
                content: >-
                  {% if states('sensor.insights_server_ok') == 'unavailable' %}Insights offline
                  {% else %}Insights OK{% endif %}
                icon_color: >-
                  {% if states('sensor.insights_server_ok') == 'unavailable' %}red
                  {% else %}green{% endif %}
          - type: conditional
            conditions:
              - condition: state
                entity: sensor.insights_server_ok
                state:
                  - unavailable
            card:
              type: markdown
              content: >-
                **Insights svarar inte** — starta om add-on *Danielsson Insights*
                under Inställningar → Tillägg → Drift.
          - type: markdown
            content: >-
              **Analytics** — tidslinje med korrelationer (ankomst, leverans, cykel).
              Windows-appen kan inte bädda in Insights (iframe blockeras). Tryck **Öppna Analytics**
              — samma vy som i webbläsaren, via HA Ingress.
          - type: custom:mushroom-template-card
            primary: Öppna Analytics
            secondary: Tidslinje med zoom och korrelationer (Ingress i appen)
            icon: mdi:timeline-clock
            icon_color: blue
            fill_container: true
            tap_action:
              action: url
              url_path: !secret timeline_url
          - type: custom:mushroom-template-card
            primary: Öppna i webbläsare
            secondary: insights.danielsson.cloud — om Ingress-knappen inte fungerar
            icon: mdi:open-in-new
            icon_color: grey
            fill_container: true
            tap_action:
              action: url
              url_path: !secret timeline_external_url
