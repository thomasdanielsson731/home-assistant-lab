# Analytics — HAOS add-on iframe (desktop) or open-in-browser button (mobile/iPad)
views:
  - title: Analytics
    panel: true
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: action
                icon: mdi:format-list-bulleted
                content: Händelser
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events
              - type: action
                icon: mdi:chart-areaspline
                content: Environment
                tap_action:
                  action: navigate
                  navigation_path: /house-graphs
              - type: template
                icon: mdi:account
                content: >-
                  Person {{ states('sensor.insights_persons_24h_display') | default('—', true) }}
                icon_color: amber
              - type: template
                icon: mdi:counter
                content: >-
                  Totalt {{ states('sensor.insights_events_24h_display') | default('—', true) }}
                icon_color: grey
              - type: template
                icon: mdi:server-network
                content: >-
                  {% if states('sensor.insights_server_ok') in ['unknown', 'unavailable', ''] %}Insights offline
                  {% else %}Insights OK{% endif %}
                icon_color: >-
                  {% if states('sensor.insights_server_ok') in ['unknown', 'unavailable', ''] %}red
                  {% else %}green{% endif %}
          - type: conditional
            conditions:
              - condition: state
                entity: sensor.insights_server_ok
                state:
                  - unavailable
                  - unknown
            card:
              type: markdown
              content: >-
                **Insights svarar inte** — Analytics/Environment kan vara tomma.
                Starta om add-on *Danielsson Insights* under Inställningar → Tillägg → Drift.
          - type: conditional
            conditions:
              - condition: screen
                media_query: "(min-width: 1025px)"
            card:
              type: custom:mushroom-template-card
              primary: Öppna Analytics i ny flik
              secondary: Använd om iframe är tom (vanligt efter omstart eller cache)
              icon: mdi:open-in-new
              icon_color: blue
              fill_container: true
              tap_action:
                action: url
                url_path: !secret timeline_url
          - type: conditional
            conditions:
              - condition: screen
                media_query: "(min-width: 1025px)"
            card:
              type: markdown
              content: >-
                **Analytics** — tidslinje med korrelationer (ankomst, leverans, cykel).
                Tomma spår = inga händelser av den typen i valt tidsintervall.
          - type: conditional
            conditions:
              - condition: screen
                media_query: "(min-width: 1025px)"
            card:
              type: iframe
              url: !secret timeline_url
              aspect_ratio: 125%

          - type: conditional
            conditions:
              - condition: screen
                media_query: "(max-width: 1024px)"
            card:
              type: vertical-stack
              cards:
                - type: markdown
                  content: |
                    ### Analytics på mobil/iPad
                    Iframe blockeras ofta via HTTPS — öppna i Safari/Chrome.
                - type: custom:mushroom-template-card
                  primary: Öppna Analytics
                  secondary: Tidslinje med zoom och korrelationer
                  icon: mdi:timeline-clock
                  icon_color: blue
                  fill_container: true
                  tap_action:
                    action: url
                    url_path: !secret timeline_url
