# Analytics — öppnas i webbläsare (Windows HA-appen blockar iframe och Ingress-länkar)
views:
  - title: Analytics
    panel: true
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: action
                icon: mdi:format-list-bulleted
                content: Händelser
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events
              - type: action
                icon: mdi:chart-areaspline
                content: Environment
                tap_action:
                  action: navigate
                  navigation_path: /house-graphs
              - type: template
                icon: mdi:account
                content: >-
                  Person {{ states('sensor.insights_persons_24h_display') | default('—', true) }}
                icon_color: amber
              - type: template
                icon: mdi:counter
                content: >-
                  Totalt {{ states('sensor.insights_events_24h_display') | default('—', true) }}
                icon_color: grey
              - type: template
                icon: mdi:server-network
                content: >-
                  {% if states('sensor.insights_server_ok') == 'unavailable' %}Insights offline
                  {% else %}Insights OK{% endif %}
                icon_color: >-
                  {% if states('sensor.insights_server_ok') == 'unavailable' %}red
                  {% else %}green{% endif %}
          - type: conditional
            conditions:
              - condition: state
                entity: sensor.insights_server_ok
                state:
                  - unavailable
            card:
              type: markdown
              content: >-
                **Insights svarar inte** — starta om add-on *Danielsson Insights*
                under Inställningar → Tillägg → Drift.
          - type: markdown
            content: >-
              **Analytics** — tidslinje med korrelationer (ankomst, leverans, cykel).
              Tryck länken nedan — öppnas i webbläsaren. På PC: använd Edge/Chrome (ha.danielsson.cloud)
              om Windows-appen inte reagerar.
          - type: weblink
            url: !secret timeline_url
            name: Öppna Analytics
            icon: mdi:timeline-clock
          - type: button
            name: Öppna Analytics (knapp)
            icon: mdi:open-in-new
            tap_action:
              action: url
              url_path: !secret timeline_url
