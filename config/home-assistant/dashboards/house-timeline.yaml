# Analytics — HAOS add-on iframe (desktop) or open-in-browser button (mobile/iPad)
views:
  - title: Analytics
    panel: true
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: action
                icon: mdi:format-list-bulleted
                content: Händelser
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events
              - type: template
                icon: mdi:account
                content: >-
                  Person {{ states('sensor.insights_persons_24h_display') | default('—', true) }}
                icon_color: amber
              - type: template
                icon: mdi:counter
                content: >-
                  Totalt {{ states('sensor.insights_events_24h_display') | default('—', true) }}
                icon_color: grey
          - type: conditional
            conditions:
              - condition: screen
                media_query: "(min-width: 1025px)"
            card:
              type: iframe
              url: !secret timeline_url
              aspect_ratio: 125%

          - type: conditional
            conditions:
              - condition: screen
                media_query: "(max-width: 1024px)"
            card:
              type: vertical-stack
              cards:
                - type: markdown
                  content: |
                    ### Analytics på mobil/iPad
                    Iframe blockeras ofta via HTTPS — öppna i Safari/Chrome.
                - type: button
                  name: Öppna Analytics
                  icon: mdi:timeline-clock
                  tap_action:
                    action: url
                    url_path: !secret timeline_url
