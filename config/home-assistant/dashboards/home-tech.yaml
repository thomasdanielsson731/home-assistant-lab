title: Danielsson Teknik
views:
  # ═══════════════════════════════════════════════════════════════
  # VIEW 1 — LIVE (nu-läge)
  # ═══════════════════════════════════════════════════════════════
  - title: Live
    path: live
    icon: mdi:radar
    type: sections
    max_columns: 1
    sections:

      - title: SNABBLÄNKAR
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: action
                icon: mdi:format-list-bulleted
                content: Händelser
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events
              - type: action
                icon: mdi:chart-timeline-variant
                content: Analytics
                tap_action:
                  action: navigate
                  navigation_path: /house-timeline
              - type: action
                icon: mdi:history
                content: Historik
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-tech/historik
              - type: action
                icon: mdi:chart-areaspline
                content: Environment
                tap_action:
                  action: navigate
                  navigation_path: /house-graphs
              - type: action
                icon: mdi:cctv
                content: Kameror
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-cameras/cameras
              - type: action
                icon: mdi:book-open-page-variant
                content: Story
                tap_action:
                  action: url
                  url_path: !secret story_url

      - title: STATUS NU
        cards:
          - type: custom:mushroom-template-card
            primary: >-
              {{ 'Aktivitet ute' if is_state('binary_sensor.house_outdoor_presence', 'on')
                 else 'Perimeter lugnt' }}
            secondary: >-
              {{ state_attr('sensor.house_outdoor_activity_summary', 'zones_label') | default('Inga aktiva zoner') }}
              · Δ {{ states('sensor.house_indoor_outdoor_delta') }}°C inne/ute
            icon: mdi:home-analytics
            icon_color: >-
              {{ 'amber' if is_state('binary_sensor.house_outdoor_presence', 'on') else 'green' }}
            fill_container: true
            tap_action:
              action: navigate
              navigation_path: /lovelace/home-events/events

      - title: HEMSTATUS
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:shield-check
                content: "{{ state_attr('sensor.house_home_status', 'label') | default('Allt OK') }}"
                icon_color: >-
                  {% if is_state('sensor.house_home_status', 'alarm') %}red
                  {% elif is_state('sensor.house_home_status', 'warning') %}amber
                  {% else %}green{% endif %}
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-security/security
              - type: template
                icon: mdi:smoke-detector
                content: >-
                  {% set dc = state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | int(0) %}
                  {% if is_state('binary_sensor.house_smoke_alarm', 'on') %}RÖK
                  {% else %}Rök {{ dc }}/3{% endif %}
                icon_color: >-
                  {% if is_state('binary_sensor.house_smoke_alarm', 'on') %}red
                  {% elif dc < 3 %}amber
                  {% else %}green{% endif %}
              - type: template
                icon: mdi:water-alert
                content: >-
                  {% if is_state('binary_sensor.sonoff_snzb_05p', 'on') %}VATTEN
                  {% elif is_state('binary_sensor.sonoff_snzb_05p', 'unavailable') %}Vatten offline
                  {% else %}Torrt{% endif %}
                icon_color: >-
                  {% if is_state('binary_sensor.sonoff_snzb_05p', 'on') %}red
                  {% elif is_state('binary_sensor.sonoff_snzb_05p', 'unavailable') %}amber
                  {% else %}green{% endif %}

      - title: PERIMETER NU
        cards:
          - type: markdown
            content: >-
              **F** Frigate · **A** AOA · **S** Scene · **M** Rörelse —
              grön = lugnt · amber = person · blå = rörelse/fordon.
              *Hovra över ett zonkort för förklaring.*
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-template-card
                primary: >-
                  {% if is_state('binary_sensor.front_person_occupancy', 'on')
                     or is_state('binary_sensor.front_aoa_person', 'on')
                     or is_state('binary_sensor.front_scene_object_present', 'on') %}Entré · Person
                  {% elif is_state('binary_sensor.front_motion', 'on') %}Entré · Rörelse
                  {% else %}Entré · Lugnt{% endif %}
                tooltip: >-
                  Entré (P3288): F=Frigate person, A=AOA, S=Scene, M=rörelse.
                  Amber=bekräftad person, blå=endast rörelse, grön=ingen aktivitet.
                secondary: >-
                  F{{ '✓' if is_state('binary_sensor.front_person_occupancy', 'on') else '·' }}
                  A{{ '✓' if is_state('binary_sensor.front_aoa_person', 'on') else '·' }}
                  S{{ '✓' if is_state('binary_sensor.front_scene_object_present', 'on') else '·' }}
                  M{{ '✓' if is_state('binary_sensor.front_motion', 'on') else '·' }}
                icon: mdi:door
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.front_person_occupancy', 'on')
                     or is_state('binary_sensor.front_aoa_person', 'on')
                     or is_state('binary_sensor.front_scene_object_present', 'on')
                     else 'blue' if is_state('binary_sensor.front_motion', 'on')
                     else 'green' }}
                fill_container: true
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-cameras/cameras
              - type: custom:mushroom-template-card
                primary: >-
                  {% if is_state('binary_sensor.driveway_wide_person_occupancy', 'on')
                     or is_state('binary_sensor.driveway_wide_aoa_person', 'on')
                     or is_state('binary_sensor.driveway_wide_scene_object_present', 'on') %}Uppf. bred · Person
                  {% elif is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on') %}Uppf. bred · Fordon
                  {% elif is_state('binary_sensor.driveway_wide_motion', 'on') %}Uppf. bred · Rörelse
                  {% else %}Uppf. bred · Lugnt{% endif %}
                secondary: >-
                  F{{ '✓' if is_state('binary_sensor.driveway_wide_person_occupancy', 'on') else '·' }}
                  A{{ '✓' if is_state('binary_sensor.driveway_wide_aoa_person', 'on') else '·' }}
                  S{{ '✓' if is_state('binary_sensor.driveway_wide_scene_object_present', 'on') else '·' }}
                  M{{ '✓' if is_state('binary_sensor.driveway_wide_motion', 'on') else '·' }}
                icon: mdi:road-variant
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.driveway_wide_person_occupancy', 'on')
                     or is_state('binary_sensor.driveway_wide_aoa_person', 'on')
                     or is_state('binary_sensor.driveway_wide_scene_object_present', 'on')
                     else 'blue' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on')
                        or is_state('binary_sensor.driveway_wide_motion', 'on')
                     else 'green' }}
                fill_container: true
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-cameras/cameras
              - type: custom:mushroom-template-card
                primary: >-
                  {% if is_state('binary_sensor.driveway_id_person_occupancy', 'on')
                     or is_state('binary_sensor.driveway_id_aoa_person', 'on')
                     or is_state('binary_sensor.driveway_id_scene_object_present', 'on') %}Uppf. ID · Person
                  {% elif is_state('binary_sensor.driveway_id_motion', 'on') %}Uppf. ID · Rörelse
                  {% else %}Uppf. ID · Lugnt{% endif %}
                secondary: >-
                  F{{ '✓' if is_state('binary_sensor.driveway_id_person_occupancy', 'on') else '·' }}
                  A{{ '✓' if is_state('binary_sensor.driveway_id_aoa_person', 'on') else '·' }}
                  S{{ '✓' if is_state('binary_sensor.driveway_id_scene_object_present', 'on') else '·' }}
                  M{{ '✓' if is_state('binary_sensor.driveway_id_motion', 'on') else '·' }}
                icon: mdi:car
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.driveway_id_person_occupancy', 'on')
                     or is_state('binary_sensor.driveway_id_aoa_person', 'on')
                     or is_state('binary_sensor.driveway_id_scene_object_present', 'on')
                     else 'blue' if is_state('binary_sensor.driveway_id_motion', 'on')
                     else 'green' }}
                fill_container: true
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-cameras/cameras
              - type: custom:mushroom-template-card
                primary: >-
                  {% if is_state('binary_sensor.backyard_person_occupancy', 'on')
                     or is_state('binary_sensor.backyard_aoa_person', 'on')
                     or is_state('binary_sensor.backyard_scene_object_present', 'on') %}Bakgård · Person
                  {% elif is_state('binary_sensor.backyard_motion', 'on') %}Bakgård · Rörelse
                  {% else %}Bakgård · Lugnt{% endif %}
                secondary: >-
                  F{{ '✓' if is_state('binary_sensor.backyard_person_occupancy', 'on') else '·' }}
                  A{{ '✓' if is_state('binary_sensor.backyard_aoa_person', 'on') else '·' }}
                  S{{ '✓' if is_state('binary_sensor.backyard_scene_object_present', 'on') else '·' }}
                  M{{ '✓' if is_state('binary_sensor.backyard_motion', 'on') else '·' }}
                icon: mdi:tree
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.backyard_person_occupancy', 'on')
                     or is_state('binary_sensor.backyard_aoa_person', 'on')
                     or is_state('binary_sensor.backyard_scene_object_present', 'on')
                     else 'blue' if is_state('binary_sensor.backyard_motion', 'on')
                     else 'green' }}
                fill_container: true
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-cameras/cameras
              - type: custom:mushroom-template-card
                primary: >-
                  {% if is_state('binary_sensor.storage_ext_person_occupancy', 'on')
                     or is_state('binary_sensor.storage_ext_aoa_person', 'on')
                     or is_state('binary_sensor.storage_ext_scene_object_present', 'on') %}Förråd ut · Person
                  {% elif is_state('binary_sensor.storage_ext_motion', 'on') %}Förråd ut · Rörelse
                  {% else %}Förråd ut · Lugnt{% endif %}
                secondary: >-
                  F{{ '✓' if is_state('binary_sensor.storage_ext_person_occupancy', 'on') else '·' }}
                  A{{ '✓' if is_state('binary_sensor.storage_ext_aoa_person', 'on') else '·' }}
                  S{{ '✓' if is_state('binary_sensor.storage_ext_scene_object_present', 'on') else '·' }}
                  M{{ '✓' if is_state('binary_sensor.storage_ext_motion', 'on') else '·' }}
                icon: mdi:warehouse
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.storage_ext_person_occupancy', 'on')
                     or is_state('binary_sensor.storage_ext_aoa_person', 'on')
                     or is_state('binary_sensor.storage_ext_scene_object_present', 'on')
                     else 'blue' if is_state('binary_sensor.storage_ext_motion', 'on')
                     else 'green' }}
                fill_container: true
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-cameras/cameras
              - type: custom:mushroom-template-card
                primary: >-
                  {% if is_state('binary_sensor.storage_int_person_occupancy', 'on')
                     or is_state('binary_sensor.storage_int_aoa_person', 'on')
                     or is_state('binary_sensor.storage_int_scene_object_present', 'on') %}Förråd in · Person
                  {% elif is_state('binary_sensor.storage_int_motion', 'on') %}Förråd in · Rörelse
                  {% else %}Förråd in · Lugnt{% endif %}
                secondary: >-
                  F{{ '✓' if is_state('binary_sensor.storage_int_person_occupancy', 'on') else '·' }}
                  A{{ '✓' if is_state('binary_sensor.storage_int_aoa_person', 'on') else '·' }}
                  S{{ '✓' if is_state('binary_sensor.storage_int_scene_object_present', 'on') else '·' }}
                  M{{ '✓' if is_state('binary_sensor.storage_int_motion', 'on') else '·' }}
                icon: mdi:garage
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.storage_int_person_occupancy', 'on')
                     or is_state('binary_sensor.storage_int_aoa_person', 'on')
                     or is_state('binary_sensor.storage_int_scene_object_present', 'on')
                     else 'blue' if is_state('binary_sensor.storage_int_motion', 'on')
                     else 'green' }}
                fill_container: true
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-cameras/cameras

      - title: KORRELERADE HÄNDELSER (24 H)
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:home-import-outline
                content: >-
                  Ankomster {{ states('sensor.insights_arrivals_24h') | default('—', true) }}
                icon_color: amber
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events
              - type: template
                icon: mdi:package-variant-closed
                content: >-
                  Leveranser {{ states('sensor.insights_deliveries_24h') | default('—', true) }}
                icon_color: blue
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events
              - type: template
                icon: mdi:account
                content: >-
                  Person {{ states('sensor.insights_persons_24h') | default('—', true) }}
                icon_color: amber
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events
              - type: template
                icon: mdi:counter
                content: >-
                  Totalt {{ states('sensor.insights_events_24h') | default('—', true) }}
                icon_color: grey
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events

      - title: UTE LUFT (D6210)
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:thermometer
                content: >-
                  {% set t = states('sensor.driveway_env_temperature') %}
                  {% if t in ['unknown', 'unavailable', ''] %}Ute —
                  {% else %}Ute {{ t }}°C{% endif %}
                icon_color: blue
              - type: template
                icon: mdi:water-percent
                content: >-
                  {% set h = states('sensor.driveway_env_humidity') %}
                  {% if h in ['unknown', 'unavailable', ''] %}Fukt —
                  {% else %}Fukt {{ h }}%{% endif %}
                icon_color: blue
              - type: template
                icon: mdi:molecule-co2
                content: >-
                  {% set c = states('sensor.driveway_env_co2') %}
                  {% if c in ['unknown', 'unavailable', ''] %}CO₂ —
                  {% elif c | int(0) == 0 %}CO₂ uppstart
                  {% else %}CO₂ {{ c | int(0) }}{% endif %}
                icon_color: grey
              - type: template
                icon: mdi:air-filter
                content: >-
                  {% set aqi = states('sensor.driveway_env_aqi') %}
                  {% if aqi in ['unknown', 'unavailable', ''] %}AQI —
                  {% elif aqi | int(0) == 0 %}AQI uppstart
                  {% else %}AQI {{ aqi }}{% endif %}
                icon_color: >-
                  {% set aqi = states('sensor.driveway_env_aqi') | int(0) %}
                  {% if aqi == 0 %}grey
                  {% elif aqi <= 50 %}green
                  {% elif aqi <= 100 %}amber
                  {% else %}red{% endif %}
              - type: template
                icon: mdi:blur
                content: >-
                  {% set pm = states('sensor.driveway_env_pm2_5') %}
                  {% if pm in ['unknown', 'unavailable', ''] %}PM2.5 —
                  {% else %}PM2.5 {{ pm }}{% endif %}
                icon_color: grey
              - type: template
                icon: mdi:delta
                content: >-
                  Δ {{ states('sensor.house_indoor_outdoor_delta') }}°C
                icon_color: blue
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:volume-high
                content: >-
                  Front {{ states('sensor.front_audio_spl') | default('—', true) }} dB
                icon_color: blue
              - type: template
                icon: mdi:volume-high
                content: >-
                  Uppf. {{ states('sensor.driveway_wide_audio_spl') | default('—', true) }} dB
                icon_color: blue
              - type: template
                icon: mdi:volume-high
                content: >-
                  Bkg {{ states('sensor.backyard_audio_spl') | default('—', true) }} dB
                icon_color: blue
          - type: grid
            columns: 3
            square: false
            cards:
              - type: history-graph
                title: Temp 24h
                hours_to_show: 24
                entities:
                  - entity: sensor.driveway_env_temperature
                    name: Ute
              - type: history-graph
                title: CO₂ 24h
                hours_to_show: 24
                entities:
                  - entity: sensor.driveway_env_co2
                    name: CO₂
              - type: history-graph
                title: AQI 24h
                hours_to_show: 24
                entities:
                  - entity: sensor.driveway_env_aqi
                    name: AQI

      - title: SENASTE BILDER
        cards:
          - type: markdown
            content: >-
              Frigate + Axis scene. Tomt = lugnt. Tryck → **Händelser**.
          - type: grid
            columns: 2
            square: false
            cards:
              - type: picture-entity
                entity: image.front_person
                name: Entré · Frigate
                show_state: true
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events
              - type: picture-entity
                entity: image.front_latest_detection
                name: Entré · Scene
                show_state: true
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events
              - type: picture-entity
                entity: image.driveway_wide_person
                name: Uppfart · Frigate
                show_state: true
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events
              - type: picture-entity
                entity: image.driveway_wide_latest_detection
                name: Uppfart · Scene
                show_state: true
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events
              - type: picture-entity
                entity: image.driveway_id_person
                name: Uppfart ID · Frigate
                show_state: true
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events
              - type: picture-entity
                entity: image.front_car
                name: Entré · fordon
                show_state: true
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events
              - type: picture-entity
                entity: image.driveway_wide_car
                name: Uppfart · fordon
                show_state: true
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events
              - type: picture-entity
                entity: image.driveway_id_car
                name: Uppfart ID · fordon
                show_state: true
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events

  # ═══════════════════════════════════════════════════════════════
  # VIEW 2 — HISTORIK (grafer)
  # ═══════════════════════════════════════════════════════════════
  - title: Historik
    path: historik
    icon: mdi:chart-line
    type: sections
    max_columns: 1
    sections:

      - title: NAVIGERING
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: action
                icon: mdi:radar
                content: Live
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-tech/live
              - type: action
                icon: mdi:format-list-bulleted
                content: Händelser
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events
              - type: action
                icon: mdi:chart-areaspline
                content: Environment
                tap_action:
                  action: navigate
                  navigation_path: /house-graphs
          - type: markdown
            content: >-
              **Recorder-historik** (HA databas) — inte samma som Händelser/Analytics.
              **Environment** (admin) har Chart.js med zoom och luckor markerade.

      - title: TEMPERATUR INNE (7 DAGAR)
        cards:
          - type: markdown
            content: >-
              **Inne** = brandvarnare. Utetemp under UTE LUFT nedan (D6210).
          - type: history-graph
            title: Inne
            hours_to_show: 168
            entities:
              - entity: sensor.heiman_hs1sa_e_plus_temperatur
                name: Kök
              - entity: sensor.heiman_hs1sa_e_plus_temperatur_2
                name: Hall
              - entity: sensor.heiman_hs1sa_e_plus_temperatur_3
                name: Vardagsrum
              - entity: sensor.house_indoor_temperature
                name: Snitt

      - title: UTE LUFT (7 DAGAR)
        cards:
          - type: markdown
            content: >-
              D6210 uppfart — recorder 90 dagar. Tom graf = bridge/add-on nere.
          - type: history-graph
            title: Ute
            hours_to_show: 168
            entities:
              - entity: sensor.driveway_env_temperature
                name: Ute
          - type: history-graph
            title: Luftfuktighet
            hours_to_show: 168
            entities:
              - entity: sensor.driveway_env_humidity
          - type: history-graph
            title: CO₂
            hours_to_show: 168
            entities:
              - entity: sensor.driveway_env_co2
          - type: history-graph
            title: AQI
            hours_to_show: 168
            entities:
              - entity: sensor.driveway_env_aqi
          - type: history-graph
            title: PM2.5
            hours_to_show: 168
            entities:
              - entity: sensor.driveway_env_pm2_5

      - title: UTE LUFT (90 DAGAR)
        cards:
          - type: markdown
            content: Dagliga medel — kräver ~24 h data innan statistics fylls i.
          - type: statistics-graph
            chart_type: line
            title: Temperatur
            entities:
              - sensor.driveway_env_temperature
            stat_types:
              - mean
            days_to_show: 90
            period: day
            hide_legend: true
          - type: statistics-graph
            chart_type: line
            title: Luftfuktighet
            entities:
              - sensor.driveway_env_humidity
            stat_types:
              - mean
            days_to_show: 90
            period: day
            hide_legend: true
          - type: statistics-graph
            chart_type: line
            title: CO₂
            entities:
              - sensor.driveway_env_co2
            stat_types:
              - mean
            days_to_show: 90
            period: day
            hide_legend: true
          - type: statistics-graph
            chart_type: line
            title: AQI
            entities:
              - sensor.driveway_env_aqi
            stat_types:
              - mean
            days_to_show: 90
            period: day
            hide_legend: true
          - type: statistics-graph
            chart_type: line
            title: PM2.5
            entities:
              - sensor.driveway_env_pm2_5
            stat_types:
              - mean
            days_to_show: 90
            period: day
            hide_legend: true

      - title: LJUD (7 DAGAR)
        cards:
          - type: history-graph
            title: SPL (dB)
            hours_to_show: 168
            entities:
              - entity: sensor.front_audio_spl
                name: Front
              - entity: sensor.driveway_wide_audio_spl
                name: Uppfart
              - entity: sensor.backyard_audio_spl
                name: Bakgård

  # ═══════════════════════════════════════════════════════════════
  # VIEW 3 — DRIFT (Thomas — admin)
  # ═══════════════════════════════════════════════════════════════
  - title: Drift
    path: ops
    icon: mdi:cog
    type: sections
    max_columns: 2
    sections:

      - title: KAMEROR
        column_span: 2
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:cctv
                content: Entré
                icon_color: >-
                  {{ 'green' if is_state('switch.front_recordings', 'on') else 'red' }}
              - type: template
                icon: mdi:cctv
                content: Uppf. bred
                icon_color: >-
                  {{ 'green' if is_state('switch.driveway_wide_recordings', 'on') else 'red' }}
              - type: template
                icon: mdi:cctv
                content: Uppf. ID
