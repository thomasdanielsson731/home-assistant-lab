title: Kameror
views:
  - title: Kameror
    path: cameras
    icon: mdi:cctv
    type: sections
    max_columns: 1
    sections:

      - title: SNABBLÄNKAR
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: action
                icon: mdi:format-list-bulleted
                content: Händelser
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events
          - type: markdown
            content: >-
              **Person** = bekräftad · **Rörelse** = oklar · **Lugnt** = inget just nu.
              Grön = lugnt · amber = person · blå = rörelse/fordon.

      - title: ENTRÉ
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.front
                title: Entré
                dimensions:
                  aspect_ratio: 9/16
                  layout: contain
            dimensions:
              aspect_ratio: 9/16
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  {{ 'Person' if is_state('binary_sensor.front_aoa_person', 'on')
                     or is_state('binary_sensor.front_person_occupancy', 'on')
                     or is_state('binary_sensor.front_scene_object_present', 'on')
                     else 'Rörelse' if is_state('binary_sensor.front_motion', 'on')
                     else 'Lugnt' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.front_aoa_person', 'on')
                     or is_state('binary_sensor.front_person_occupancy', 'on')
                     or is_state('binary_sensor.front_scene_object_present', 'on')
                     else 'blue' if is_state('binary_sensor.front_motion', 'on')
                     else 'green' }}
              - type: action
                icon: mdi:format-list-bulleted
                content: Senaste
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events

      - title: UPPFART — BRETT
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.driveway_wide
                title: Uppfart
            dimensions:
              aspect_ratio: 16/9
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:car
                content: >-
                  {{ 'Person' if is_state('binary_sensor.driveway_wide_aoa_person', 'on')
                     or is_state('binary_sensor.driveway_wide_person_occupancy', 'on')
                     or is_state('binary_sensor.driveway_wide_scene_object_present', 'on')
                     else 'Fordon' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on')
                     else 'Rörelse' if is_state('binary_sensor.driveway_wide_motion', 'on')
                     else 'Lugnt' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.driveway_wide_aoa_person', 'on')
                     or is_state('binary_sensor.driveway_wide_person_occupancy', 'on')
                     or is_state('binary_sensor.driveway_wide_scene_object_present', 'on')
                     else 'blue' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on')
                        or is_state('binary_sensor.driveway_wide_motion', 'on')
                     else 'green' }}

      - title: UPPFART — ID
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.driveway_id
                title: Uppfart ID
            dimensions:
              aspect_ratio: 16/9
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  {{ 'Person' if is_state('binary_sensor.driveway_id_aoa_person', 'on')
                     or is_state('binary_sensor.driveway_id_person_occupancy', 'on')
                     or is_state('binary_sensor.driveway_id_scene_object_present', 'on')
                     else 'Rörelse' if is_state('binary_sensor.driveway_id_motion', 'on')
                     else 'Lugnt' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.driveway_id_aoa_person', 'on')
                     or is_state('binary_sensor.driveway_id_person_occupancy', 'on')
                     or is_state('binary_sensor.driveway_id_scene_object_present', 'on')
                     else 'blue' if is_state('binary_sensor.driveway_id_motion', 'on')
                     else 'green' }}

      - title: BAKGÅRD
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.backyard
                title: Bakgård
            dimensions:
              aspect_ratio: 16/9
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  {{ 'Person' if is_state('binary_sensor.backyard_aoa_person', 'on')
                     or is_state('binary_sensor.backyard_person_occupancy', 'on')
                     or is_state('binary_sensor.backyard_scene_object_present', 'on')
                     else 'Rörelse' if is_state('binary_sensor.backyard_motion', 'on')
                     else 'Lugnt' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.backyard_aoa_person', 'on')
                     or is_state('binary_sensor.backyard_person_occupancy', 'on')
                     or is_state('binary_sensor.backyard_scene_object_present', 'on')
                     else 'blue' if is_state('binary_sensor.backyard_motion', 'on')
                     else 'green' }}

      - title: FÖRRÅD — UTE
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.storage_ext
                title: Förråd ut
            dimensions:
              aspect_ratio: 16/9
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  {{ 'Person' if is_state('binary_sensor.storage_ext_aoa_person', 'on')
                     or is_state('binary_sensor.storage_ext_person_occupancy', 'on')
                     or is_state('binary_sensor.storage_ext_scene_object_present', 'on')
                     else 'Rörelse' if is_state('binary_sensor.storage_ext_motion', 'on')
                     else 'Lugnt' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.storage_ext_aoa_person', 'on')
                     or is_state('binary_sensor.storage_ext_person_occupancy', 'on')
                     or is_state('binary_sensor.storage_ext_scene_object_present', 'on')
                     else 'blue' if is_state('binary_sensor.storage_ext_motion', 'on')
                     else 'green' }}

      - title: FÖRRÅD — INNE
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.storage_int
                title: Förråd in
            dimensions:
              aspect_ratio: 16/9
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  {{ 'Person' if is_state('binary_sensor.storage_int_aoa_person', 'on')
                     or is_state('binary_sensor.storage_int_person_occupancy', 'on')
                     or is_state('binary_sensor.storage_int_scene_object_present', 'on')
                     else 'Rörelse' if is_state('binary_sensor.storage_int_motion', 'on')
                     else 'Lugnt' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.storage_int_aoa_person', 'on')
                     or is_state('binary_sensor.storage_int_person_occupancy', 'on')
                     or is_state('binary_sensor.storage_int_scene_object_present', 'on')
                     else 'blue' if is_state('binary_sensor.storage_int_motion', 'on')
                     else 'green' }}
