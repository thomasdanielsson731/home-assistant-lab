                content: >-
                  Förr.in F{{ '✓' if is_state('binary_sensor.storage_int_person_occupancy', 'on') else '·' }}
                  A{{ '✓' if is_state('binary_sensor.storage_int_aoa_person', 'on') else '·' }}
                  S{{ '✓' if is_state('binary_sensor.storage_int_scene_object_present', 'on') else '·' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.storage_int_aoa_person', 'on') else 'grey' }}

