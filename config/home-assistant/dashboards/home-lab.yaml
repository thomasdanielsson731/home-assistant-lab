                     or is_state('binary_sensor.backyard_scene_object_present', 'on') else 'grey' }}
              - type: template
                icon: mdi:layers
                content: >-
                  Förr.ut F{{ '✓' if is_state('binary_sensor.storage_ext_person_occupancy', 'on') else '·' }}
                  A{{ '✓' if is_state('binary_sensor.storage_ext_aoa_person', 'on') else '·' }}
