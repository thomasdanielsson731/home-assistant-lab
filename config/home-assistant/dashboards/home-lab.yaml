title: Danielsson Home
views:

  # ═══════════════════════════════════════════════════════════════
  # VIEW 1 — HEM (Anna — enkel)
  # ═══════════════════════════════════════════════════════════════
  - title: Hem
    path: home
    icon: mdi:home
    type: sections
    max_columns: 1
    sections:

      # ── Overview — Anna: väder, närvaro, temperatur ───────────
      - cards:
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: >-
                  {% set h = now().hour %}
                  {% if h < 12 %}God morgon
                  {% elif h < 17 %}God eftermiddag
                  {% else %}God kväll{% endif %}
                secondary: >-
                  {% set vd = ['måndag','tisdag','onsdag','torsdag','fredag','lördag','söndag'] %}
                  {% set md = ['januari','februari','mars','april','maj','juni','juli','augusti','september','oktober','november','december'] %}
                  {{ vd[now().weekday()] }} · {{ now().day }} {{ md[now().month - 1] }}
                icon: mdi:home-variant
                icon_color: blue
                fill_container: true
                tap_action:
                  action: none
              - type: custom:mushroom-template-card
                primary: "{{ states('weather.forecast_hem') | replace('_', ' ') | title }}"
                secondary: Väder
                icon: mdi:weather-partly-cloudy
                icon_color: blue
                layout: vertical
                fill_container: true
                tap_action:
                  action: more-info
                  entity: weather.forecast_hem
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: >-
                  {% set n = states('sensor.house_occupancy_summary') | int(0) %}
                  {% if n == 0 %}Ingen hemma
                  {% else %}{{ n }} hemma{% endif %}
                secondary: >-
                  {% set who = state_attr('sensor.house_occupancy_summary', 'who_home') %}
                  {% if who and who != 'Ingen hemma' %}{{ who }}
                  {% else %}—{% endif %}
                icon: mdi:home-account
                icon_color: >-
                  {{ 'green' if states('sensor.house_occupancy_summary') | int(0) > 0 else 'grey' }}
                layout: vertical
                fill_container: true
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.house_indoor_temperature') }}°C"
                secondary: Inne · brandvarnare
                icon: mdi:home-thermometer
                icon_color: >-
                  {% set inn = states('sensor.house_indoor_temperature') | float(0) %}
                  {{ 'blue' if inn < 18 else 'green' if inn < 24 else 'orange' if inn < 26 else 'red' }}
                layout: vertical
                fill_container: true
              - type: custom:mushroom-template-card
                primary: >-
                  {% if states('sensor.driveway_env_temperature') in ['unknown', 'unavailable', ''] %}—
                  {% else %}{{ states('sensor.driveway_env_temperature') }}°C{% endif %}
                secondary: Ute · uppfart
                icon: mdi:thermometer
                icon_color: blue
                layout: vertical
                fill_container: true

      # ── Allt OK? — rök, vatten, sammanfattning ───────────────
      - cards:
          - type: custom:mushroom-template-card
            primary: "{{ state_attr('sensor.house_home_status', 'label') | default('Allt OK') }}"
            secondary: >-
              Brandvarnare {{ state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | default('?') }}/3
              · Vatten {{ state_attr('sensor.house_safety_summary', 'water_label') | default('—') }}
            icon: >-
              {% if is_state('sensor.house_home_status', 'alarm') %}mdi:shield-alert
              {% elif is_state('sensor.house_home_status', 'warning') %}mdi:shield-alert-outline
              {% else %}mdi:shield-check{% endif %}
            icon_color: >-
              {% if is_state('sensor.house_home_status', 'alarm') %}red
              {% elif is_state('sensor.house_home_status', 'warning') %}amber
              {% else %}green{% endif %}
            fill_container: true
            tap_action:
              action: navigate
              navigation_path: /lovelace/home-lab/security
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: template
                icon: mdi:smoke-detector
                content: >-
                  {% set dc = state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | int(3) %}
                  {% if is_state('binary_sensor.house_smoke_alarm', 'on') %}RÖK
                  {% else %}Rök {{ dc }}/3{% endif %}
                icon_color: >-
                  {% set dc = state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | int(3) %}
                  {% if is_state('binary_sensor.house_smoke_alarm', 'on') %}red
                  {% elif dc < 3 %}amber
                  {% else %}green{% endif %}
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-lab/security
              - type: template
                icon: mdi:water-alert
                content: >-
                  {% if is_state('binary_sensor.sonoff_snzb_05p', 'on') %}VATTEN
                  {% elif is_state('binary_sensor.sonoff_snzb_05p', 'unavailable') %}Vatten offline
                  {% else %}Vatten OK{% endif %}
                icon_color: >-
                  {% if is_state('binary_sensor.sonoff_snzb_05p', 'on') %}red
                  {% elif is_state('binary_sensor.sonoff_snzb_05p', 'unavailable') %}amber
                  {% else %}green{% endif %}
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-lab/security
              - type: action
                icon: mdi:lightbulb-off-outline
                content: Släck allt
                tap_action:
                  action: call-service
                  service: light.turn_off
                  target:
                    entity_id:
                      - light.living_room
                      - light.fonsterlampor
                      - light.anna_och_thomas_sovrum
                      - light.hugos_rum
                      - light.matplats
                      - light.spottar
                      - light.underskapsbelysning
              - type: action
                icon: mdi:cctv
                content: Kameror
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-lab/cameras

      # ── Who's Home (Companion + presence fusion) ────────
      - title: VEM ÄR HEMMA
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-person-card
                entity: person.thomasx
                layout: vertical
                fill_container: true
              - type: custom:mushroom-person-card
                entity: person.nils_2
                layout: vertical
                fill_container: true
              - type: custom:mushroom-person-card
                entity: person.hugo
                layout: vertical
                fill_container: true
              - type: custom:mushroom-person-card
                entity: person.anna
                layout: vertical
                fill_container: true
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: template
                icon: mdi:account
                content: "Thomas · {{ state_attr('sensor.thomas_presence_fused', 'label') | default('Okänd') }}"
                icon_color: >-
                  {{ 'green' if is_state('sensor.thomas_presence_fused', 'home') else 'grey' }}
              - type: template
                icon: mdi:account
                content: "Nils · {{ state_attr('sensor.nils_presence_fused', 'label') | default('Okänd') }}"
                icon_color: >-
                  {{ 'green' if is_state('sensor.nils_presence_fused', 'home') else 'grey' }}
              - type: template
                icon: mdi:account
                content: "Hugo · {{ state_attr('sensor.hugo_presence_fused', 'label') | default('Okänd') }}"
                icon_color: >-
                  {{ 'green' if is_state('sensor.hugo_presence_fused', 'home') else 'grey' }}
              - type: template
                icon: mdi:account
                content: "Anna · {{ state_attr('sensor.anna_presence_fused', 'label') | default('Okänd') }}"
                icon_color: >-
                  {{ 'green' if is_state('sensor.anna_presence_fused', 'home') else 'grey' }}

          - type: markdown
            content: >-
              *Okänd* på barnen? Be Thomas installera **Home Assistant-appen**
              på telefonen och slå på platsdelning.

      - title: ENTRÉ
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.front_aoa_person
                state: "on"
            card:
              type: custom:mushroom-template-card
              primary: Någon vid entrén
              secondary: Just nu · se Kameror
              icon: mdi:door
              icon_color: amber
              fill_container: true
              tap_action:
                action: navigate
                navigation_path: /lovelace/home-lab/cameras
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.front_aoa_person
                state: "off"
              - condition: state
                entity: binary_sensor.front_motion
                state: "on"
            card:
              type: custom:mushroom-template-card
              primary: Rörelse vid entrén
              secondary: Ingen person bekräftad
              icon: mdi:motion-sensor
              icon_color: blue
              fill_container: true
              tap_action:
                action: navigate
                navigation_path: /lovelace/home-lab/cameras
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.front_aoa_person
                state: "off"
              - condition: state
                entity: binary_sensor.front_motion
                state: "off"
            card:
              type: custom:mushroom-template-card
              primary: Entrén lugnt
              secondary: Ingen rörelse just nu
              icon: mdi:door-closed
              icon_color: green
              fill_container: true
              tap_action:
                action: none

      # ── Lights On Now — only lights that are actually on ────
      - title: LAMPOR TÄNDA
        cards:
          - type: custom:mushroom-template-card
            primary: >-
              {% set on = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('entity_id', 'search', 'ir_light|whitelight')
                | list %}
              {% if on | count == 0 %}Alla lampor släckta
              {% elif on | count == 1 %}1 lampa tänd
              {% else %}{{ on | count }} lampor tända{% endif %}
            secondary: >-
              {% set on = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('entity_id', 'search', 'ir_light|whitelight')
                | map(attribute='name') | list %}
              {{ on | join(' · ') if on | count > 0 else 'Gå till Rum för att styra' }}
            icon: mdi:lightbulb-group
            icon_color: >-
              {% set on = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('entity_id', 'search', 'ir_light|whitelight')
                | list %}
              {{ 'amber' if on | count > 0 else 'disabled' }}
            fill_container: true
            tap_action:
              action: navigate
              navigation_path: /lovelace/home-lab/rooms
          - type: entity-filter
            show_empty: false
            entities:
              - entity: light.anna_och_thomas_sovrum
                name: Sovrum
              - entity: light.hugos_rum
                name: Hugos rum
              - entity: light.living_room
                name: Vardagsrum
              - entity: light.fonsterlampor
                name: Fönsterlampor
              - entity: light.fonster_vanster
                name: Fönster vänster
              - entity: light.fonster_hoger
                name: Fönster höger
              - entity: light.matplats
                name: Matplats
              - entity: light.spottar
                name: Spottar
              - entity: light.taklampa
                name: Taklampa
              - entity: light.underskapsbelysning
                name: Underskåp
              - entity: light.sovrumstaklampa
                name: Sovrum tak
              - entity: light.hugos_taklampa
                name: Hugo tak
            state_filter:
              - "on"
            card:
              type: entities
              state_color: true

  # ═══════════════════════════════════════════════════════════════
  # VIEW 2 — KAMEROR
  - title: Kameror
    path: cameras
    icon: mdi:cctv
    type: sections
    max_columns: 2
    sections:

      # One camera per section → even 2-column rows:
      #   Front | Driveway Wide / Driveway ID | Backyard / Storage Ext | Storage Int

      - title: ENTRÉ
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.front
                title: Entré (P3288)
            dimensions:
              aspect_ratio: 16/9
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  {{ 'Person' if is_state('binary_sensor.front_aoa_person', 'on')
                     else 'Rörelse' if is_state('binary_sensor.front_motion', 'on')
                     else 'Lugnt' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.front_aoa_person', 'on')
                     else 'blue' if is_state('binary_sensor.front_motion', 'on')
                     else 'grey' }}

      - title: UPPFART — BRETT
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.driveway_wide
                title: Uppfart bred (Q3558)
            dimensions:
              aspect_ratio: 16/9
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:car
                content: >-
                  {{ 'Fordon' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on')
                     else 'Inget fordon' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on') else 'grey' }}
              - type: template
                icon: mdi:motion-sensor
                content: >-
                  {{ 'Rörelse' if is_state('binary_sensor.driveway_wide_motion', 'on')
                     else 'Ingen rörelse' }}
                icon_color: >-
                  {{ 'blue' if is_state('binary_sensor.driveway_wide_motion', 'on') else 'grey' }}

      - title: UPPFART — ID
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.driveway_id
                title: Uppfart ID (M2036)
            dimensions:
              aspect_ratio: 16/9
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  {{ 'Person' if is_state('binary_sensor.driveway_id_aoa_person', 'on')
                     else 'Ingen person' }}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.driveway_id_aoa_person', 'on') else 'grey' }}

      - title: BAKGÅRD
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.backyard
                title: Bakgård (Q1656)
            dimensions:
              aspect_ratio: 16/9
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  {{ 'Person' if is_state('binary_sensor.backyard_aoa_person', 'on')
                     else 'Rörelse' if is_state('binary_sensor.backyard_motion', 'on')
                     else 'Lugnt' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.backyard_aoa_person', 'on')
                     else 'blue' if is_state('binary_sensor.backyard_motion', 'on')
                     else 'grey' }}

      - title: FÖRRÅD — UTE
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.storage_ext
                title: Förråd utvändigt (M1055)
            dimensions:
              aspect_ratio: 16/9
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  {{ 'Person' if is_state('binary_sensor.storage_ext_aoa_person', 'on')
                     else 'Rörelse' if is_state('binary_sensor.storage_ext_motion', 'on')
                     else 'Lugnt' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.storage_ext_aoa_person', 'on')
                     else 'blue' if is_state('binary_sensor.storage_ext_motion', 'on')
                     else 'grey' }}

      - title: FÖRRÅD — INNE
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.storage_int
                title: Förråd invändigt (Q1656)
            dimensions:
              aspect_ratio: 16/9


  # ═══════════════════════════════════════════════════════════════
  # VIEW 3 — SÄKERHET (Anna — enkel)
  # ═══════════════════════════════════════════════════════════════
  - title: Säkerhet
    path: security
    icon: mdi:shield-home
    type: sections
    max_columns: 1
    sections:

      # ── Hemstatus (rök + vatten) ─────────────────────────────
      - title: HEMSTATUS
        cards:
          - type: custom:mushroom-template-card
            primary: "{{ state_attr('sensor.house_home_status', 'label') | default('Allt OK') }}"
            secondary: >-
              {{ state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | default('?') }} brandvarnare
              · {{ state_attr('sensor.house_safety_summary', 'water_label') | default('—') }}
            icon: mdi:shield-home
            icon_color: >-
              {% if is_state('sensor.house_home_status', 'alarm') %}red
              {% elif is_state('sensor.house_home_status', 'warning') %}amber
              {% else %}green{% endif %}
            fill_container: true
            tap_action:
              action: more-info
              entity: sensor.house_home_status

      # ── Face recognition — pausad (träning senare) ───────────
      - title: FACE RECOGNITION
        visibility:
          - condition: state
            entity: sensor.house_home_status
            state: "__face_hidden__"
        cards:
          - type: markdown
            content: Pausad

      # ── Smoke detectors (ZHA) — unified house alarm sensor ──────
      - title: BRANDVARNARE
        visibility:
          - condition: state
            entity: binary_sensor.house_smoke_alarm
            state_not: unavailable
        cards:
          - type: custom:mushroom-template-card
            primary: >-
              {% set ns = namespace(alarms=[]) %}
              {% for s in states.binary_sensor | selectattr('entity_id', 'search', 'heiman') | list %}
                {% if 'ias_zon' in s.entity_id or s.entity_id == 'binary_sensor.heiman_hs1sa_e_plus' %}
                  {% set ns.alarms = ns.alarms + [s] %}
                {% endif %}
              {% endfor %}
              {% if ns.alarms | selectattr('state', 'eq', 'on') | list | count > 0 %}RÖKALARM — {{ ns.alarms | selectattr('state', 'eq', 'on') | list | count }} aktiv
              {% else %}{{ ns.alarms | count }} brandvarnare · OK{% endif %}
            secondary: >-
              {% for s in states.binary_sensor | selectattr('entity_id', 'search', 'heiman') | list %}
              {% if 'ias_zon' in s.entity_id or s.entity_id == 'binary_sensor.heiman_hs1sa_e_plus' %}
              {{ state_attr(s.entity_id, 'friendly_name') | default(s.entity_id) }} · {{ 'RÖK' if s.state == 'on' else 'OK' }}
              {% endif %}
              {% endfor %}
              {% set temps = states.sensor | selectattr('entity_id', 'search', 'heiman') | selectattr('entity_id', 'search', 'temperatur') | list %}
              {% if temps | count > 0 %} · {% endif %}
              {% for t in temps %}
              {% if t.state not in ['unknown', 'unavailable', ''] %}{{ t.state }}°C{% if not loop.last %} · {% endif %}{% endif %}
              {% endfor %}
            icon: mdi:smoke-detector
            icon_color: >-
              {% set ns = namespace(alarm=false) %}
              {% for s in states.binary_sensor | selectattr('entity_id', 'search', 'heiman') | list %}
                {% if ('ias_zon' in s.entity_id or s.entity_id == 'binary_sensor.heiman_hs1sa_e_plus') and s.state == 'on' %}
                  {% set ns.alarm = true %}
                {% endif %}
              {% endfor %}
              {{ 'red' if ns.alarm else 'green' }}
            fill_container: true
            tap_action:
              action: more-info
              entity: binary_sensor.house_smoke_alarm

      # ── Water leak (ZHA — dishwasher) — alltid synlig ───────────
      - title: VATTENLÄCKAGE
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.sonoff_snzb_05p
                state_not: unavailable
            card:
              type: custom:mushroom-entity-card
              entity: binary_sensor.sonoff_snzb_05p
              name: Kök · diskmaskin
              icon: mdi:water-alert
              layout: horizontal
              fill_container: true
              primary_info: name
              secondary_info: state
              icon_color: >-
                {{ 'red' if is_state('binary_sensor.sonoff_snzb_05p', 'on') else 'green' }}
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.sonoff_snzb_05p
                state: unavailable
            card:
              type: custom:mushroom-template-card
              primary: Vattensensor offline
              secondary: >-
                Sensorn svarar inte — be Thomas kolla diskmaskin-sensorn.
                Vattenlarm tyst tills den är tillbaka.
              icon: mdi:water-off-outline
              icon_color: amber
              fill_container: true
              tap_action:
                action: none
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.sonoff_snzb_05p
                state_not: unavailable
            card:
              type: custom:mushroom-entity-card
              entity: sensor.sonoff_snzb_05p_batteri
              name: Batteri
              icon: mdi:battery
              layout: horizontal
              fill_container: true

      # ── Yale Doorman — dold tills Sprint 1 ─────────────────────
      - title: ACCESS
        visibility:
          - condition: state
            entity: sensor.house_home_status
            state: "__yale_hidden__"
        cards:
          - type: markdown
            content: Kommer snart

      - title: MER TEKNIK
        cards:
          - type: custom:mushroom-template-card
            primary: Detektioner & historik
            secondary: Multisensor, Frigate-bilder, CO₂, Analytics
            icon: mdi:chart-timeline-variant
            icon_color: blue
            fill_container: true
            tap_action:
              action: navigate
              navigation_path: /lovelace/home-lab/tech

  # ═══════════════════════════════════════════════════════════════
  # VIEW 4 — RUM (Anna — enkel)
  # Lights and devices by area
  # ═══════════════════════════════════════════════════════════════
  - title: Rum
    path: rooms
    icon: mdi:floor-plan
    type: sections
    max_columns: 2
    sections:

      # ── Master light control ──────────────────────────────────
      - column_span: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Belysning
            secondary: >-
              {% set on = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('entity_id', 'search', 'ir_light|whitelight')
                | list %}
              {% if on | count == 0 %}Alla lampor släckta
              {% elif on | count == 1 %}1 lampa tänd
              {% else %}{{ on | count }} lampor tända{% endif %}
            icon: mdi:lightbulb-group
            icon_color: >-
              {% set on = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('entity_id', 'search', 'ir_light|whitelight')
                | list %}
              {{ 'amber' if on | count > 0 else 'disabled' }}
            fill_container: true
            tap_action:
              action: none
          - type: custom:mushroom-chips-card
            chips:
              - type: action
                icon: mdi:lightbulb-off-outline
                content: Släck allt
                tap_action:
                  action: call-service
                  service: light.turn_off
                  target:
                    entity_id:
                      - light.living_room
                      - light.fonsterlampor
                      - light.anna_och_thomas_sovrum
                      - light.hugos_rum
                      - light.matplats
                      - light.spottar
                      - light.underskapsbelysning

      # ── Temperatur (enkel) ───────────────────────────────────
      - column_span: 2
        cards:
          - type: custom:mushroom-template-card
            primary: "Inne {{ states('sensor.house_indoor_temperature') }}°C"
            secondary: Brandvarnare · se grafer under Teknik
            icon: mdi:home-thermometer
            icon_color: green
            fill_container: true
            tap_action:
              action: navigate
              navigation_path: /lovelace/home-lab/tech

      # ── Kök ──────────────────────────────────────────────────
      # Lamporna sitter bakom väggströmbrytare — "unavailable" betyder
      # strömlös, inte trasig. Visas då som "Av · väggströmbrytare".
      - title: KÖK
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: light.spottar
                state_not: unavailable
            card:
              type: custom:mushroom-light-card
              entity: light.spottar
              name: Spottar
              show_brightness_control: true
              collapsible_controls: false
              layout: horizontal
              fill_container: true
          - type: conditional
            conditions:
