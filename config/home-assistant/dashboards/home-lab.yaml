title: Danielsson Home
views:

  # ═══════════════════════════════════════════════════════════════
  # VIEW 1 — HOME
  # ═══════════════════════════════════════════════════════════════
  - title: Home
    path: home
    icon: mdi:home
    type: sections
    max_columns: 1
    sections:

      # ── Overview — compact status at top ─────────────────────
      - cards:
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: >-
                  {% set h = now().hour %}
                  {% if h < 12 %}God morgon, Thomas
                  {% elif h < 17 %}God eftermiddag, Thomas
                  {% else %}God kväll, Thomas{% endif %}
                secondary: "{{ now().strftime('%A') }} · {{ now().day }} {{ now().strftime('%B') }}"
                icon: mdi:home-variant
                icon_color: blue
                fill_container: true
                tap_action:
                  action: none
              - type: custom:mushroom-template-card
                primary: "{{ states('weather.forecast_hem') | replace('_', ' ') | title }}"
                secondary: Väder
                icon: mdi:weather-partly-cloudy
                icon_color: blue
                layout: vertical
                fill_container: true
                tap_action:
                  action: more-info
                  entity: weather.forecast_hem
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: >-
                  {% set n = states('sensor.house_occupancy_summary') | int(0) %}
                  {% if n == 0 %}Ingen hemma
                  {% else %}{{ n }} hemma{% endif %}
                secondary: >-
                  {% set who = state_attr('sensor.house_occupancy_summary', 'who_home') %}
                  {% if who and who != 'Nobody' %}{{ who }}
                  {% elif is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on') %}Bil på uppfarten
                  {% else %}—{% endif %}
                icon: mdi:home-account
                icon_color: >-
                  {{ 'green' if states('sensor.house_occupancy_summary') | int(0) > 0 else 'grey' }}
                layout: vertical
                fill_container: true
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.house_indoor_temperature') }}°C"
                secondary: >-
                  Inne · Δ {{ states('sensor.house_indoor_outdoor_delta') }}° mot ute
                icon: mdi:home-thermometer
                icon_color: >-
                  {% set inn = states('sensor.house_indoor_temperature') | float(0) %}
                  {{ 'blue' if inn < 18 else 'green' if inn < 24 else 'orange' if inn < 26 else 'red' }}
                layout: vertical
                fill_container: true
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.driveway_env_temperature') }}°C"
                secondary: >-
                  Ute · {{ relative_time(states.sensor.driveway_env_temperature.last_changed) }}
                icon: mdi:thermometer
                icon_color: >-
                  {% set t = states('sensor.driveway_env_temperature') | float(0) %}
                  {{ 'blue' if t < 10 else 'green' if t < 22 else 'orange' if t < 28 else 'red' }}
                layout: vertical
                fill_container: true
              - type: custom:mushroom-chips-card
                alignment: center
                chips:
                  - type: template
                    icon: mdi:water-percent
                    content: "{{ states('sensor.driveway_env_humidity') }}%"
                    icon_color: blue
                  - type: template
                    icon: mdi:molecule-co2
                    content: "{{ states('sensor.driveway_env_co2') | int(0) }}"
                    icon_color: >-
                      {% set c = states('sensor.driveway_env_co2') | int(0) %}
                      {{ 'green' if c < 800 else 'amber' if c < 1200 else 'red' }}
                  - type: template
                    icon: mdi:air-filter
                    content: "AQI {{ states('sensor.driveway_env_aqi') }}"
                    icon_color: >-
                      {% set aqi = states('sensor.driveway_env_aqi') | int(0) %}
                      {{ 'green' if aqi <= 50 else 'amber' if aqi <= 100 else 'red' }}
                  - type: template
                    icon: mdi:blur
                    content: "PM2.5 {{ states('sensor.driveway_env_pm2_5') }}"
                    icon_color: grey

      # ── Allt OK? — rök, vatten, sammanfattning ───────────────
      - cards:
          - type: custom:mushroom-template-card
            primary: "{{ state_attr('sensor.house_home_status', 'label') | default('Allt OK') }}"
            secondary: >-
              Brandvarnare {{ state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | default('?') }}/3
              · Vatten {{ state_attr('sensor.house_safety_summary', 'water_label') | default('—') }}
            icon: >-
              {% if is_state('sensor.house_home_status', 'alarm') %}mdi:shield-alert
              {% elif is_state('sensor.house_home_status', 'warning') %}mdi:shield-alert-outline
              {% else %}mdi:shield-check{% endif %}
            icon_color: >-
              {% if is_state('sensor.house_home_status', 'alarm') %}red
              {% elif is_state('sensor.house_home_status', 'warning') %}amber
              {% else %}green{% endif %}
            fill_container: true
            tap_action:
              action: navigate
              navigation_path: /lovelace/home-lab/security
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: template
                icon: mdi:smoke-detector
                content: >-
                  {% if is_state('binary_sensor.house_smoke_alarm', 'on') %}Rök
                  {% else %}Rök OK{% endif %}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.house_smoke_alarm', 'on') else 'green' }}
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-lab/security
              - type: template
                icon: mdi:water-alert
                content: >-
                  {% if is_state('binary_sensor.sonoff_snzb_05p', 'on') %}VATTEN
                  {% elif is_state('binary_sensor.sonoff_snzb_05p', 'unavailable') %}Vatten offline
                  {% else %}Vatten OK{% endif %}
                icon_color: >-
                  {% if is_state('binary_sensor.sonoff_snzb_05p', 'on') %}red
                  {% elif is_state('binary_sensor.sonoff_snzb_05p', 'unavailable') %}amber
                  {% else %}green{% endif %}
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-lab/security
              - type: template
                icon: mdi:chart-timeline-variant
                content: Historik
                icon_color: blue
                tap_action:
                  action: navigate
                  navigation_path: /house-timeline

      # ── Who's Home (Companion + presence fusion) ────────
      - title: VEM ÄR HEMMA
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-person-card
                entity: person.thomasx
                layout: vertical
                fill_container: true
              - type: custom:mushroom-person-card
                entity: person.nils_2
                layout: vertical
                fill_container: true
              - type: custom:mushroom-person-card
                entity: person.hugo
                layout: vertical
                fill_container: true
              - type: custom:mushroom-person-card
                entity: person.anna
                layout: vertical
                fill_container: true
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: template
                icon: mdi:account
                content: "Thomas · {{ state_attr('sensor.thomas_presence_fused', 'label') | default('—') }}"
                icon_color: >-
                  {{ 'green' if is_state('sensor.thomas_presence_fused', 'home')
                     else 'blue' if is_state('sensor.thomas_presence_fused', 'face')
                     else 'grey' }}
              - type: template
                icon: mdi:account
                content: "Nils · {{ state_attr('sensor.nils_presence_fused', 'label') | default('—') }}"
                icon_color: >-
                  {{ 'green' if is_state('sensor.nils_presence_fused', 'home')
                     else 'blue' if is_state('sensor.nils_presence_fused', 'face')
                     else 'grey' }}
              - type: template
                icon: mdi:account
                content: "Hugo · {{ state_attr('sensor.hugo_presence_fused', 'label') | default('—') }}"
                icon_color: >-
                  {{ 'green' if is_state('sensor.hugo_presence_fused', 'home')
                     else 'blue' if is_state('sensor.hugo_presence_fused', 'face')
                     else 'grey' }}
              - type: template
                icon: mdi:account
                content: "Anna · {{ state_attr('sensor.anna_presence_fused', 'label') | default('—') }}"
                icon_color: >-
                  {{ 'green' if is_state('sensor.anna_presence_fused', 'home')
                     else 'blue' if is_state('sensor.anna_presence_fused', 'face')
                     else 'grey' }}

          - type: markdown
            content: >-
              **Companion-app** behövs på telefonen för att sluta visa *Unknown*.
              Se runbook `companion-app-setup.md` i repot.

      # ── Quick Status ─────────────────────────────────────────
      - title: SNABB STATUS
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:door
                content: >-
                  {% if is_state('binary_sensor.front_aoa_person', 'on') %}Entré · Person
                  {% elif is_state('binary_sensor.front_motion', 'on') %}Entré · Rörelse
                  {% else %}Entré · Lugnt{% endif %}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.front_aoa_person', 'on')
                     else 'amber' if is_state('binary_sensor.front_motion', 'on')
                     else 'green' }}
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-lab/security
              - type: template
                icon: mdi:car
                content: >-
                  {% if is_state('binary_sensor.driveway_id_aoa_person', 'on') %}Uppfart · Person
                  {% elif is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on') %}Uppfart · Fordon
                  {% elif is_state('binary_sensor.driveway_wide_motion', 'on') %}Uppfart · Rörelse
                  {% else %}Uppfart · Lugnt{% endif %}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.driveway_id_aoa_person', 'on')
                     else 'amber' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on')
                        or is_state('binary_sensor.driveway_wide_motion', 'on')
                     else 'green' }}
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-lab/cameras
              - type: template
                icon: mdi:walk
                content: >-
                  {{ 'Utomhus · Någon' if is_state('sensor.house_outdoor_presence', 'on')
                     else 'Utomhus · Tomt' }}
                icon_color: >-
                  {{ 'red' if is_state('sensor.house_outdoor_presence', 'on') else 'grey' }}

      # ── Lights On Now — only lights that are actually on ────
      - title: LAMPOR TÄNDA
        cards:
          - type: custom:mushroom-template-card
            primary: >-
              {% set on = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('entity_id', 'search', 'ir_light|whitelight')
                | list %}
              {% if on | count == 0 %}Alla lampor släckta
              {% elif on | count == 1 %}1 lampa tänd
              {% else %}{{ on | count }} lampor tända{% endif %}
            secondary: >-
              {% set on = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('entity_id', 'search', 'ir_light|whitelight')
                | map(attribute='name') | list %}
              {{ on | join(' · ') if on | count > 0 else 'Gå till Rum för att styra' }}
            icon: mdi:lightbulb-group
            icon_color: >-
              {% set on = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('entity_id', 'search', 'ir_light|whitelight')
                | list %}
              {{ 'amber' if on | count > 0 else 'disabled' }}
            fill_container: true
            tap_action:
              action: navigate
              navigation_path: /lovelace/home-lab/rooms
          - type: entity-filter
            show_empty: false
            entities:
              - entity: light.anna_och_thomas_sovrum
                name: Sovrum
              - entity: light.hugos_rum
                name: Hugos rum
              - entity: light.living_room
                name: Vardagsrum
              - entity: light.fonsterlampor
                name: Fönsterlampor
              - entity: light.fonster_vanster
                name: Fönster vänster
              - entity: light.fonster_hoger
                name: Fönster höger
              - entity: light.matplats
                name: Matplats
              - entity: light.spottar
                name: Spottar
              - entity: light.taklampa
                name: Taklampa
              - entity: light.underskapsbelysning
                name: Underskåp
              - entity: light.sovrumstaklampa
                name: Sovrum tak
              - entity: light.hugos_taklampa
                name: Hugo tak
            state_filter:
              - "on"
            card:
              type: entities
              state_color: true

      # ── Vacuum — family quick control ────────────────────────
      - title: VACUUM
        cards:
          - type: custom:mushroom-vacuum-card
            entity: vacuum.hoover
            name: Vacuum
            fill_container: true
          - type: custom:mushroom-chips-card
            chips:
              - type: action
                icon: mdi:play
                content: Start
                tap_action:
                  action: call-service
                  service: vacuum.start
                  target:
                    entity_id: vacuum.hoover
              - type: action
                icon: mdi:pause
                content: Pause
                tap_action:
                  action: call-service
                  service: vacuum.pause
                  target:
                    entity_id: vacuum.hoover
              - type: action
                icon: mdi:stop
                content: Stop
                tap_action:
                  action: call-service
                  service: vacuum.stop
                  target:
                    entity_id: vacuum.hoover
              - type: action
                icon: mdi:home-import-outline
                content: Dock
                tap_action:
                  action: call-service
                  service: vacuum.return_to_base
                  target:
                    entity_id: vacuum.hoover
              - type: entity
                entity: button.hoover_full_cleaning
                icon: mdi:broom
                content_info: name


  # ═══════════════════════════════════════════════════════════════
  # VIEW 2 — CAMERAS
  # custom:advanced-camera-card with Frigate integration
  # ═══════════════════════════════════════════════════════════════
  - title: Cameras
    path: cameras
    icon: mdi:cctv
    type: sections
    max_columns: 2
    sections:

      # One camera per section → even 2-column rows:
      #   Front | Driveway Wide / Driveway ID | Backyard / Storage Ext | Storage Int

      - title: ENTRÉ
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.front
                title: Entré (P3288)
            dimensions:
              aspect_ratio: 16/9
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  {{ 'Person' if is_state('binary_sensor.front_aoa_person', 'on')
                     else 'Rörelse' if is_state('binary_sensor.front_motion', 'on')
                     else 'Lugnt' }}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.front_aoa_person', 'on')
                     else 'amber' if is_state('binary_sensor.front_motion', 'on')
                     else 'grey' }}

      - title: UPPFART — BRETT
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.driveway_wide
                title: Uppfart bred (Q3558)
            dimensions:
              aspect_ratio: 16/9
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:car
                content: >-
                  {{ 'Fordon' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on')
                     else 'Inget fordon' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on') else 'grey' }}
              - type: template
                icon: mdi:motion-sensor
                content: >-
                  {{ 'Rörelse' if is_state('binary_sensor.driveway_wide_motion', 'on')
                     else 'Ingen rörelse' }}
                icon_color: >-
                  {{ 'blue' if is_state('binary_sensor.driveway_wide_motion', 'on') else 'grey' }}

      - title: UPPFART — ID
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.driveway_id
                title: Uppfart ID (M2036)
            dimensions:
              aspect_ratio: 16/9
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  {{ 'Person' if is_state('binary_sensor.driveway_id_aoa_person', 'on')
                     else 'Ingen person' }}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.driveway_id_aoa_person', 'on') else 'grey' }}

      - title: BAKGÅRD
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.backyard
                title: Bakgård (Q1656)
            dimensions:
              aspect_ratio: 16/9

      - title: FÖRRÅD — UTE
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.storage_ext
                title: Förråd utvändigt (M1055)
            dimensions:
              aspect_ratio: 16/9

      - title: FÖRRÅD — INNE
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.storage_int
                title: Förråd invändigt (Q1656)
            dimensions:
              aspect_ratio: 16/9


  # ═══════════════════════════════════════════════════════════════
  # VIEW 3 — SECURITY
  # ═══════════════════════════════════════════════════════════════
  - title: Säkerhet
    path: security
    icon: mdi:shield-home
    type: sections
    max_columns: 1
    sections:

      # ── Hemstatus (rök + vatten) ─────────────────────────────
      - title: HEMSTATUS
        cards:
          - type: custom:mushroom-template-card
            primary: "{{ state_attr('sensor.house_home_status', 'label') | default('Allt OK') }}"
            secondary: >-
              {{ state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | default('?') }} brandvarnare
              · {{ state_attr('sensor.house_safety_summary', 'water_label') | default('—') }}
            icon: mdi:shield-home
            icon_color: >-
              {% if is_state('sensor.house_home_status', 'alarm') %}red
              {% elif is_state('sensor.house_home_status', 'warning') %}amber
              {% else %}green{% endif %}
            fill_container: true
            tap_action:
              action: more-info
              entity: sensor.house_home_status

      # ── Multisensor per zon (Frigate + AOA + scene) ──────────
      - title: SENSORFUSION
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:layers
                content: >-
                  Entré F{{ '✓' if is_state('binary_sensor.front_person_occupancy', 'on') else '·' }}
                  A{{ '✓' if is_state('binary_sensor.front_aoa_person', 'on') else '·' }}
                  S{{ '✓' if is_state('binary_sensor.front_scene_object_present', 'on') else '·' }}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.front_aoa_person', 'on') else 'grey' }}
              - type: template
                icon: mdi:layers
                content: >-
                  Uppfart F{{ '✓' if is_state('binary_sensor.driveway_wide_person_occupancy', 'on') else '·' }}
                  A{{ '✓' if is_state('binary_sensor.driveway_wide_aoa_person', 'on') else '·' }}
                  S{{ '✓' if is_state('binary_sensor.driveway_wide_scene_object_present', 'on') else '·' }}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.driveway_wide_aoa_person', 'on') else 'grey' }}

      # ── Live Detections ──────────────────────────────────────
      # grey = clear · amber = motion only · red = person detected
      - title: LIVE DETEKTIONER
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:cctv
                content: Front
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.front_person_occupancy', 'on')
                     else 'amber' if is_state('binary_sensor.front_motion', 'on')
                     else 'grey' }}
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-lab/cameras
              - type: template
                icon: mdi:cctv
                content: Driveway
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.driveway_id_person_occupancy', 'on')
                     or is_state('binary_sensor.driveway_wide_person_occupancy', 'on')
                     else 'amber' if is_state('binary_sensor.driveway_wide_motion', 'on')
                     or is_state('binary_sensor.driveway_wide_car_occupancy', 'on')
                     else 'grey' }}
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-lab/cameras
              - type: template
                icon: mdi:cctv
                content: Backyard
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.backyard_person_occupancy', 'on')
                     else 'amber' if is_state('binary_sensor.backyard_motion', 'on')
                     else 'grey' }}
              - type: template
                icon: mdi:cctv
                content: Stor Ext
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.storage_ext_person_occupancy', 'on')
                     else 'amber' if is_state('binary_sensor.storage_ext_motion', 'on')
                     else 'grey' }}
              - type: template
                icon: mdi:cctv
                content: Stor Int
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.storage_int_person_occupancy', 'on')
                     else 'amber' if is_state('binary_sensor.storage_int_motion', 'on')
                     else 'grey' }}

      # ── Latest Frigate detection snapshots ───────────────────
      # Cards without a detection are hidden (conditional on image state)
      - title: SENASTE BILDER
        cards:
          - type: horizontal-stack
            cards:
              - type: conditional
                conditions:
                  - condition: state
                    entity: image.front_person
                    state_not: unknown
                  - condition: state
                    entity: image.front_person
                    state_not: unavailable
                card:
                  type: custom:mushroom-template-card
                  entity: image.front_person
                  primary: Entrén · person
                  secondary: >-
                    {% set dt = as_local(as_datetime(states('image.front_person'))) %}
                    {{ dt.strftime('%H:%M · %d %b') }} ({{ relative_time(dt) }})
                  icon: mdi:account
                  layout: vertical
                  fill_container: true
                  tap_action:
                    action: more-info
              - type: conditional
                conditions:
                  - condition: state
                    entity: image.driveway_wide_person
                    state_not: unknown
                  - condition: state
                    entity: image.driveway_wide_person
                    state_not: unavailable
                card:
                  type: custom:mushroom-template-card
                  entity: image.driveway_wide_person
                  primary: Uppfart · person
                  secondary: >-
                    {% set dt = as_local(as_datetime(states('image.driveway_wide_person'))) %}
                    {{ dt.strftime('%H:%M · %d %b') }} ({{ relative_time(dt) }})
                  icon: mdi:account
                  layout: vertical
                  fill_container: true
                  tap_action:
                    action: more-info
              - type: conditional
                conditions:
                  - condition: state
                    entity: image.driveway_id_person
                    state_not: unknown
                  - condition: state
                    entity: image.driveway_id_person
                    state_not: unavailable
                card:
                  type: custom:mushroom-template-card
                  entity: image.driveway_id_person
                  primary: Uppfart ID · person
                  secondary: >-
                    {% set dt = as_local(as_datetime(states('image.driveway_id_person'))) %}
                    {{ dt.strftime('%H:%M · %d %b') }} ({{ relative_time(dt) }})
                  icon: mdi:account
                  layout: vertical
                  fill_container: true
                  tap_action:
                    action: more-info
          - type: horizontal-stack
            cards:
              - type: conditional
                conditions:
                  - condition: state
                    entity: image.front_car
                    state_not: unknown
                  - condition: state
                    entity: image.front_car
                    state_not: unavailable
                card:
                  type: custom:mushroom-template-card
                  entity: image.front_car
                  primary: Entrén · fordon
                  secondary: >-
                    {% set dt = as_local(as_datetime(states('image.front_car'))) %}
                    {{ dt.strftime('%H:%M · %d %b') }} ({{ relative_time(dt) }})
                  icon: mdi:car
                  layout: vertical
                  fill_container: true
                  tap_action:
                    action: more-info
              - type: conditional
                conditions:
                  - condition: state
                    entity: image.driveway_wide_car
                    state_not: unknown
                  - condition: state
                    entity: image.driveway_wide_car
                    state_not: unavailable
                card:
