                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.house_outdoor_presence', 'on') else 'grey' }}

      - title: PERIMETER
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:door
                content: >-
                  {% if is_state('binary_sensor.front_aoa_person', 'on') %}Entré · Person
                  {% elif is_state('binary_sensor.front_motion', 'on') %}Entré · Rörelse
                  {% else %}Entré · Lugnt{% endif %}
                icon_color: >-
