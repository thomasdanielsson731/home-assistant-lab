title: Home Lab
views:

  # ═══════════════════════════════════════════════════════════════
  # VIEW 1 — HOME
  # ═══════════════════════════════════════════════════════════════
  - title: Home
    path: home
    icon: mdi:home
    type: sections
    max_columns: 1
    sections:

      # ── Overview — compact status at top ─────────────────────
      - cards:
          - type: custom:mushroom-template-card
            primary: >-
              {% set h = now().hour %}
              {% if h < 12 %}Good morning
              {% elif h < 17 %}Good afternoon
              {% else %}Good evening{% endif %}, Thomas
            secondary: "{{ now().strftime('%A') }} · {{ now().day }} {{ now().strftime('%B') }}"
            icon: mdi:home-variant
            icon_color: blue
            fill_container: true
            tap_action:
              action: none
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.house_people_home_count') }} home"
                secondary: "{{ state_attr('sensor.house_people_home_count', 'who_home') }}"
                icon: mdi:home-account
                icon_color: >-
                  {{ 'green' if states('sensor.house_people_home_count') | int > 0 else 'grey' }}
                layout: vertical
                fill_container: true
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.driveway_env_temperature') }}°C"
                secondary: >-
                  Ute · {{ relative_time(states.sensor.driveway_env_temperature.last_changed) }}
                icon: mdi:thermometer
                icon_color: >-
                  {% set t = states('sensor.driveway_env_temperature') | float(0) %}
                  {{ 'blue' if t < 10 else 'green' if t < 22 else 'orange' if t < 28 else 'red' }}
                layout: vertical
                fill_container: true
              - type: custom:mushroom-chips-card
                alignment: center
                chips:
                  - type: template
                    icon: mdi:water-percent
                    content: "{{ states('sensor.driveway_env_humidity') }}%"
                    icon_color: blue
                  - type: template
                    icon: mdi:molecule-co2
                    content: "{{ states('sensor.driveway_env_co2') | int(0) }}"
                    icon_color: >-
                      {% set c = states('sensor.driveway_env_co2') | int(0) %}
                      {{ 'green' if c < 800 else 'amber' if c < 1200 else 'red' }}
                  - type: template
                    icon: mdi:air-filter
                    content: "AQI {{ states('sensor.driveway_env_aqi') }}"
                    icon_color: >-
                      {% set aqi = states('sensor.driveway_env_aqi') | int(0) %}
                      {{ 'green' if aqi <= 50 else 'amber' if aqi <= 100 else 'red' }}
                  - type: template
                    icon: mdi:blur
                    content: "PM2.5 {{ states('sensor.driveway_env_pm2_5') }}"
                    icon_color: grey

      # ── Who's Home ───────────────────────────────────────────
      - title: WHO'S HOME
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-person-card
                entity: person.thomasx
                layout: vertical
                fill_container: true
              - type: custom:mushroom-person-card
                entity: person.nils_2
                layout: vertical
                fill_container: true
              - type: custom:mushroom-person-card
                entity: person.hugo
                layout: vertical
                fill_container: true
              - type: custom:mushroom-person-card
                entity: person.anna
                layout: vertical
                fill_container: true

      # ── Quick Status ─────────────────────────────────────────
      - title: QUICK STATUS
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:door
                content: >-
                  {% if is_state('binary_sensor.front_aoa_person', 'on') %}Entré · Person
                  {% elif is_state('binary_sensor.front_motion', 'on') %}Entré · Rörelse
                  {% else %}Entré · Lugnt{% endif %}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.front_aoa_person', 'on')
                     else 'amber' if is_state('binary_sensor.front_motion', 'on')
                     else 'green' }}
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-lab/security
              - type: template
                icon: mdi:car
                content: >-
                  {% if is_state('binary_sensor.driveway_id_aoa_person', 'on') %}Uppfart · Person
                  {% elif is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on') %}Uppfart · Fordon
                  {% elif is_state('binary_sensor.driveway_wide_motion', 'on') %}Uppfart · Rörelse
                  {% else %}Uppfart · Lugnt{% endif %}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.driveway_id_aoa_person', 'on')
                     else 'amber' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on')
                        or is_state('binary_sensor.driveway_wide_motion', 'on')
                     else 'green' }}
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-lab/cameras
              - type: template
                icon: mdi:walk
                content: >-
                  {{ 'Utomhus · Någon' if is_state('sensor.house_outdoor_presence', 'on')
                     else 'Utomhus · Tomt' }}
                icon_color: >-
                  {{ 'red' if is_state('sensor.house_outdoor_presence', 'on') else 'grey' }}
              - type: template
                icon: mdi:weather-cloudy
                content: "{{ states('weather.forecast_hem') | title }}"
                icon_color: blue

      # ── Lights On Now ────────────────────────────────────────
      - title: LIGHTS ON NOW
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: entity
                entity: light.anna_och_thomas_sovrum
              - type: entity
                entity: light.hugos_rum
              - type: entity
                entity: light.living_room
              - type: entity
                entity: light.fonsterlampor

      # ── Recent Events ────────────────────────────────────────
      - title: RECENT EVENTS
        cards:
          - type: logbook
            hours_to_show: 6
            entities:
              - binary_sensor.front_motion
              - binary_sensor.front_person_occupancy
              - binary_sensor.driveway_wide_motion
              - binary_sensor.driveway_wide_car_occupancy
              - binary_sensor.driveway_id_motion
              - binary_sensor.driveway_id_person_occupancy
              - binary_sensor.backyard_motion
              - binary_sensor.backyard_person_occupancy
              - binary_sensor.storage_ext_motion
              - binary_sensor.storage_int_motion

      - title: LAST 7 DAYS
        cards:
          - type: custom:mini-graph-card
            entities:
              - entity: sensor.driveway_env_temperature
                name: Temperature
            name: Temperature
            hours_to_show: 168
            points_per_hour: 2
            line_width: 2
            show:
              state: true
              extrema: true
              fill: fade
              labels: false
            color_thresholds:
              - value: 0
                color: "#2196F3"
              - value: 20
                color: "#4CAF50"
              - value: 28
                color: "#FF9800"
          - type: custom:mini-graph-card
            entities:
              - entity: sensor.driveway_env_humidity
                name: Humidity
            name: Humidity
            hours_to_show: 168
            points_per_hour: 2
            line_width: 2
            show:
              state: true
              extrema: true
              fill: fade
              labels: false
          - type: custom:mini-graph-card
            entities:
              - entity: sensor.driveway_env_co2
                name: CO₂
            name: CO₂
            hours_to_show: 168
            points_per_hour: 2
            line_width: 2
            show:
              state: true
              extrema: true
              fill: fade
              labels: false
            color_thresholds:
              - value: 0
                color: "#4CAF50"
              - value: 800
                color: "#FF9800"
              - value: 1200
                color: "#F44336"
          - type: custom:mini-graph-card
            entities:
              - entity: sensor.driveway_env_aqi
                name: AQI
            name: Air Quality
            hours_to_show: 168
            points_per_hour: 2
            line_width: 2
            show:
              state: true
              extrema: true
              fill: fade
              labels: false
          - type: custom:mini-graph-card
            entities:
              - entity: sensor.driveway_env_pm2_5
                name: PM2.5
            name: PM2.5
            hours_to_show: 168
            points_per_hour: 2
            line_width: 2
            show:
              state: true
              extrema: true
              fill: fade
              labels: false

      - title: LAST 90 DAYS
        cards:
          - type: custom:mini-graph-card
            entities:
              - entity: sensor.driveway_env_temperature
                name: Temperature
            name: Temperature
            hours_to_show: 2160
            points_per_hour: 0.1667
            group_by: interval
            aggregate_func: avg
            line_width: 2
            show:
              state: true
              extrema: true
              fill: fade
              labels: false
            color_thresholds:
              - value: 0
                color: "#2196F3"
              - value: 20
                color: "#4CAF50"
              - value: 28
                color: "#FF9800"
          - type: custom:mini-graph-card
            entities:
              - entity: sensor.driveway_env_humidity
                name: Humidity
            name: Humidity
            hours_to_show: 2160
            points_per_hour: 0.1667
            group_by: interval
            aggregate_func: avg
            line_width: 2
            show:
              state: true
              extrema: true
              fill: fade
              labels: false
          - type: custom:mini-graph-card
            entities:
              - entity: sensor.driveway_env_co2
                name: CO₂
            name: CO₂
            hours_to_show: 2160
            points_per_hour: 0.1667
            group_by: interval
            aggregate_func: avg
            line_width: 2
            show:
              state: true
              extrema: true
              fill: fade
              labels: false
          - type: custom:mini-graph-card
            entities:
              - entity: sensor.driveway_env_aqi
                name: AQI
            name: Air Quality
            hours_to_show: 2160
            points_per_hour: 0.1667
            group_by: interval
            aggregate_func: avg
            line_width: 2
            show:
              state: true
              extrema: true
              fill: fade
              labels: false
          - type: custom:mini-graph-card
            entities:
              - entity: sensor.driveway_env_pm2_5
                name: PM2.5
            name: PM2.5
            hours_to_show: 2160
            points_per_hour: 0.1667
            group_by: interval
            aggregate_func: avg
            line_width: 2
            show:
              state: true
              extrema: true
              fill: fade
              labels: false


  # ═══════════════════════════════════════════════════════════════
  # VIEW 2 — CAMERAS
  # custom:advanced-camera-card with Frigate integration
  # ═══════════════════════════════════════════════════════════════
  - title: Cameras
    path: cameras
    icon: mdi:cctv
    type: sections
    max_columns: 2
    sections:

      # ── Front — primary entry view ───────────────────────────
      - title: FRONT
        column_span: 2
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.front
                title: Front (P3288)
            dimensions:
              aspect_ratio: 16/9
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  {{ 'Person' if is_state('binary_sensor.front_aoa_person', 'on')
                     else 'Rörelse' if is_state('binary_sensor.front_motion', 'on')
                     else 'Lugnt' }}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.front_aoa_person', 'on')
                     else 'amber' if is_state('binary_sensor.front_motion', 'on')
                     else 'grey' }}

      # ── Backyard + Storage — side by side ────────────────────
      - title: BACKYARD
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.backyard
                title: Backyard (Q1656)
            dimensions:
              aspect_ratio: 16/9

      - title: STORAGE
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.storage_ext
                title: Storage Exterior (Q1656)
            dimensions:
              aspect_ratio: 16/9
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.storage_int
                title: Storage Interior (M1055)
            dimensions:
              aspect_ratio: 16/9

      # ── Driveway — wide overview + ID cam below ──────────────
      - title: DRIVEWAY
        column_span: 2
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.driveway_wide
                title: Driveway Wide (Q3558-LVE)
            dimensions:
              aspect_ratio: 16/9
          - type: horizontal-stack
            cards:
              - type: custom:advanced-camera-card
                cameras:
                  - camera_entity: camera.driveway_id
                    title: Driveway ID (M2036)
                dimensions:
                  aspect_ratio: 16/9
              - type: custom:mushroom-chips-card
                alignment: center
                chips:
                  - type: template
                    icon: mdi:account
                    content: >-
                      {{ 'Person' if is_state('binary_sensor.driveway_id_aoa_person', 'on')
                         else 'Ingen person' }}
                    icon_color: >-
                      {{ 'red' if is_state('binary_sensor.driveway_id_aoa_person', 'on') else 'grey' }}
                  - type: template
                    icon: mdi:car
                    content: >-
                      {{ 'Fordon' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on')
                         else 'Inget fordon' }}
                    icon_color: >-
                      {{ 'amber' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on') else 'grey' }}
                  - type: template
                    icon: mdi:motion-sensor
                    content: >-
                      {{ 'Rörelse' if is_state('binary_sensor.driveway_wide_motion', 'on')
                         else 'Ingen rörelse' }}
                    icon_color: >-
                      {{ 'blue' if is_state('binary_sensor.driveway_wide_motion', 'on') else 'grey' }}


  # ═══════════════════════════════════════════════════════════════
  # VIEW 3 — SECURITY
  # ═══════════════════════════════════════════════════════════════
  - title: Security
    path: security
    icon: mdi:shield-home
    type: sections
    max_columns: 1
    sections:

      # ── Live Detections ──────────────────────────────────────
      # grey = clear · amber = motion only · red = person detected
      - title: LIVE DETECTIONS
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:cctv
                content: Front
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.front_person_occupancy', 'on')
                     else 'amber' if is_state('binary_sensor.front_motion', 'on')
                     else 'grey' }}
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-lab/cameras
              - type: template
                icon: mdi:cctv
                content: Driveway
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.driveway_id_person_occupancy', 'on')
                     or is_state('binary_sensor.driveway_wide_person_occupancy', 'on')
                     else 'amber' if is_state('binary_sensor.driveway_wide_motion', 'on')
                     or is_state('binary_sensor.driveway_wide_car_occupancy', 'on')
                     else 'grey' }}
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-lab/cameras
              - type: template
                icon: mdi:cctv
                content: Backyard
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.backyard_person_occupancy', 'on')
                     else 'amber' if is_state('binary_sensor.backyard_motion', 'on')
                     else 'grey' }}
              - type: template
                icon: mdi:cctv
                content: Stor Ext
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.storage_ext_person_occupancy', 'on')
                     else 'amber' if is_state('binary_sensor.storage_ext_motion', 'on')
                     else 'grey' }}
              - type: template
                icon: mdi:cctv
                content: Stor Int
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.storage_int_person_occupancy', 'on')
                     else 'amber' if is_state('binary_sensor.storage_int_motion', 'on')
                     else 'grey' }}

      # ── Latest Frigate detection snapshots ───────────────────
      - title: SENASTE BILDER
        cards:
          - type: horizontal-stack
            cards:
              - type: picture-entity
                entity: image.front_person
                name: Entrén · person
                show_state: false
                tap_action:
                  action: more-info
              - type: picture-entity
                entity: image.driveway_wide_person
                name: Uppfart · person
                show_state: false
                tap_action:
                  action: more-info
              - type: picture-entity
                entity: image.driveway_id_person
                name: Uppfart ID · person
                show_state: false
                tap_action:
                  action: more-info
          - type: horizontal-stack
            cards:
              - type: picture-entity
                entity: image.front_car
                name: Entrén · fordon
                show_state: false
                tap_action:
                  action: more-info
              - type: picture-entity
                entity: image.driveway_wide_car
                name: Uppfart · fordon
                show_state: false
                tap_action:
                  action: more-info
              - type: picture-entity
                entity: image.driveway_id_car
                name: Uppfart ID · fordon
                show_state: false
                tap_action:
                  action: more-info

      # ── AOA presence (live) — scene/frame often empty on FW 12.x ──
      - title: LIVE PRESENCE (AOA)
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  Entré · {{ 'På' if is_state('binary_sensor.front_aoa_person', 'on') else 'Av' }}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.front_aoa_person', 'on') else 'grey' }}
              - type: template
                icon: mdi:account
                content: >-
                  Uppf. bred · {{ 'På' if is_state('binary_sensor.driveway_wide_aoa_person', 'on') else 'Av' }}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.driveway_wide_aoa_person', 'on') else 'grey' }}
              - type: template
                icon: mdi:account
                content: >-
                  Uppf. ID · {{ 'På' if is_state('binary_sensor.driveway_id_aoa_person', 'on') else 'Av' }}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.driveway_id_aoa_person', 'on') else 'grey' }}
              - type: template
                icon: mdi:car
                content: >-
                  Fordon · {{ 'På' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on')
                     or is_state('binary_sensor.front_aoa_vehicle', 'on') else 'Av' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on')
                     or is_state('binary_sensor.front_aoa_vehicle', 'on') else 'grey' }}
              - type: template
                icon: mdi:account
                content: >-
                  Backyard · {{ 'På' if is_state('binary_sensor.backyard_aoa_person', 'on') else 'Av' }}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.backyard_aoa_person', 'on') else 'grey' }}

      # ── Object Counts ─────────────────────────────────────────
      - title: OBJECT COUNTS (24H)
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.front_person_count
            name: Front — persons
            icon: mdi:account
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: sensor.driveway_wide_car_count
            name: Driveway — cars
            icon: mdi:car
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: sensor.driveway_id_person_count
            name: Driveway ID — persons
            icon: mdi:account
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: sensor.backyard_person_count
            name: Backyard — persons
            icon: mdi:account
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: sensor.storage_ext_person_count
            name: Storage Ext — persons
            icon: mdi:account
            layout: horizontal
            fill_container: true

      # ── Face Recognition ─────────────────────────────────────
      - title: FACE RECOGNITION
        cards:
          - type: custom:mushroom-template-card
            primary: Not yet active
            secondary: Double Take + CompreFace — Phase 4
            icon: mdi:face-recognition
            icon_color: amber
            fill_container: true
            tap_action:
              action: none

      # ── Event Log ────────────────────────────────────────────
      - title: EVENT LOG
        cards:
          - type: logbook
            hours_to_show: 24
            entities:
              - binary_sensor.front_motion
              - binary_sensor.front_person_occupancy
              - binary_sensor.driveway_wide_motion
              - binary_sensor.driveway_wide_car_occupancy
              - binary_sensor.driveway_wide_person_occupancy
              - binary_sensor.driveway_id_motion
              - binary_sensor.driveway_id_person_occupancy
              - binary_sensor.backyard_motion
              - binary_sensor.backyard_person_occupancy
              - binary_sensor.storage_ext_motion
              - binary_sensor.storage_ext_person_occupancy
              - binary_sensor.storage_int_motion
              - binary_sensor.storage_int_person_occupancy


  # ═══════════════════════════════════════════════════════════════
  # VIEW 4 — ROOMS
  # Lights and devices by area
  # ═══════════════════════════════════════════════════════════════
  - title: Rooms
    path: rooms
    icon: mdi:floor-plan
    type: sections
    max_columns: 2
    sections:

      # ── Master light control ──────────────────────────────────
      - column_span: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Belysning
            secondary: >-
              {% set on = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('entity_id', 'search', 'ir_light|whitelight')
                | list %}
              {% if on | count == 0 %}Alla lampor släckta
              {% elif on | count == 1 %}1 lampa tänd
              {% else %}{{ on | count }} lampor tända{% endif %}
            icon: mdi:lightbulb-group
            icon_color: >-
              {% set on = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('entity_id', 'search', 'ir_light|whitelight')
                | list %}
              {{ 'amber' if on | count > 0 else 'disabled' }}
            fill_container: true
            tap_action:
              action: none
          - type: custom:mushroom-chips-card
            chips:
              - type: action
                icon: mdi:lightbulb-off-outline
                content: Släck allt
                tap_action:
                  action: call-service
                  service: light.turn_off
                  target:
                    entity_id:
                      - light.living_room
                      - light.fonsterlampor
                      - light.anna_och_thomas_sovrum
                      - light.hugos_rum
                      - light.matplats
                      - light.spottar
                      - light.underskapsbelysning

      # ── Kök ──────────────────────────────────────────────────
      - title: KÖK
        cards:
          - type: custom:mushroom-light-card
            entity: light.spottar
            name: Spottar
            show_brightness_control: true
            collapsible_controls: false
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-light-card
            entity: light.matplats
            name: Matplats
            show_brightness_control: true
            collapsible_controls: false
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-light-card
            entity: light.underskapsbelysning
            name: Underskåp
            show_brightness_control: true
            collapsible_controls: false
            layout: horizontal
            fill_container: true

      # ── Vardagsrum ───────────────────────────────────────────
      - title: VARDAGSRUM
        cards:
          - type: custom:mushroom-light-card
            entity: light.living_room
            name: Vardagsrum
            show_brightness_control: true
            show_color_temp_control: true
            collapsible_controls: false
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-light-card
            entity: light.taklampa
            name: Taklampa
            show_brightness_control: true
            collapsible_controls: false
            layout: horizontal
            fill_container: true

      # ── Fönsterlampor ────────────────────────────────────────
      - title: FÖNSTERLAMPOR
        cards:
          - type: custom:mushroom-light-card
