                  layout: vertical
                  fill_container: true
                  tap_action:
                    action: more-info

      - title: TEMPERATUR (7 DAGAR)
        cards:
          - type: markdown
            content: >-
              **Ute** = D6210 · **Inne** = brandvarnare. Avbrott i linje = sampling paus.
          - type: horizontal-stack
            cards:
              - type: history-graph
                title: Ute
                hours_to_show: 168
                entities:
                  - entity: sensor.driveway_env_temperature
                    name: Ute
              - type: history-graph
                title: Inne
                hours_to_show: 168
                entities:
                  - entity: sensor.heiman_hs1sa_e_plus_temperatur
                    name: Kök
                  - entity: sensor.heiman_hs1sa_e_plus_temperatur_2
                    name: Hall
                  - entity: sensor.heiman_hs1sa_e_plus_temperatur_3
                    name: Vardagsrum
                  - entity: sensor.house_indoor_temperature
                    name: Snitt

      - title: UTE LUFT (7 DAGAR)
        cards:
          - type: markdown
            content: >-
              D6210 uppfart — recorder 90 dagar. Tom graf = bridge/add-on nere eller ingen historik än.
          - type: history-graph
            title: Temperatur
            hours_to_show: 168
            entities:
              - entity: sensor.driveway_env_temperature
          - type: history-graph
            title: Luftfuktighet
            hours_to_show: 168
            entities:
              - entity: sensor.driveway_env_humidity
          - type: history-graph
            title: CO₂
            hours_to_show: 168
            entities:
              - entity: sensor.driveway_env_co2
          - type: history-graph
            title: AQI
            hours_to_show: 168
            entities:
              - entity: sensor.driveway_env_aqi
          - type: history-graph
            title: PM2.5
            hours_to_show: 168
            entities:
              - entity: sensor.driveway_env_pm2_5

      - title: UTE LUFT (90 DAGAR)
        cards:
          - type: markdown
            content: Dagliga medel — kräver ~24 h data innan statistics fylls i.
          - type: statistics-graph
            chart_type: line
            title: Temperatur
            entities:
              - sensor.driveway_env_temperature
            stat_types:
              - mean
            days_to_show: 90
            period: day
            hide_legend: true
          - type: statistics-graph
            chart_type: line
            title: Luftfuktighet
            entities:
              - sensor.driveway_env_humidity
            stat_types:
              - mean
            days_to_show: 90
            period: day
            hide_legend: true
          - type: statistics-graph
            chart_type: line
            title: CO₂
            entities:
              - sensor.driveway_env_co2
            stat_types:
              - mean
            days_to_show: 90
            period: day
            hide_legend: true
          - type: statistics-graph
            chart_type: line
            title: AQI
            entities:
              - sensor.driveway_env_aqi
            stat_types:
              - mean
            days_to_show: 90
            period: day
            hide_legend: true
          - type: statistics-graph
            chart_type: line
            title: PM2.5
            entities:
              - sensor.driveway_env_pm2_5
            stat_types:
              - mean
            days_to_show: 90
            period: day
            hide_legend: true

      - title: LJUD (7 DAGAR)
        cards:
          - type: history-graph
            title: SPL (dB)
            hours_to_show: 168
            entities:
              - entity: sensor.front_audio_spl
                name: Front
              - entity: sensor.driveway_wide_audio_spl
                name: Uppfart
              - entity: sensor.backyard_audio_spl
                name: Bakgård


  # ═══════════════════════════════════════════════════════════════
  # VIEW 6 — DRIFT (Thomas — admin)
  # ═══════════════════════════════════════════════════════════════
  - title: Drift
    path: ops
    icon: mdi:cog
    type: sections
    max_columns: 2
    sections:

      # ── Camera status ────────────────────────────────────────
      - title: KAMEROR
        column_span: 2
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:cctv
                content: Entré
                icon_color: >-
                  {{ 'green' if is_state('switch.front_recordings', 'on') else 'red' }}
              - type: template
                icon: mdi:cctv
                content: Uppf. bred
                icon_color: >-
                  {{ 'green' if is_state('switch.driveway_wide_recordings', 'on') else 'red' }}
              - type: template
                icon: mdi:cctv
                content: Uppf. ID
                icon_color: >-
                  {{ 'green' if is_state('switch.driveway_id_recordings', 'on') else 'red' }}
              - type: template
                icon: mdi:cctv
                content: Bakgård
                icon_color: >-
                  {{ 'green' if is_state('switch.backyard_recordings', 'on') else 'red' }}
              - type: template
                icon: mdi:cctv
                content: Förråd ut
                icon_color: >-
                  {{ 'green' if is_state('switch.storage_ext_recordings', 'on') else 'red' }}
              - type: template
                icon: mdi:cctv
                content: Förråd in
                icon_color: >-
                  {{ 'green' if is_state('switch.storage_int_recordings', 'on') else 'red' }}

      # ── AOA live occupancy ───────────────────────────────────
      - title: NÄRVARO (AOA)
        column_span: 2
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:walk
                content: >-
                  Entry · {{ 'aktiv' if is_state('binary_sensor.house_outdoor_presence', 'on') else 'lugnt' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.house_outdoor_presence', 'on') else 'grey' }}
              - type: template
                icon: mdi:account
                content: >-
                  Entré · {{ 'På' if is_state('binary_sensor.front_aoa_person', 'on') else 'Av' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.front_aoa_person', 'on') else 'grey' }}
              - type: template
                icon: mdi:account
                content: >-
                  Uppf. bred · {{ 'På' if is_state('binary_sensor.driveway_wide_aoa_person', 'on') else 'Av' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.driveway_wide_aoa_person', 'on') else 'grey' }}
              - type: template
                icon: mdi:account
                content: >-
                  Uppf. ID · {{ 'På' if is_state('binary_sensor.driveway_id_aoa_person', 'on') else 'Av' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.driveway_id_aoa_person', 'on') else 'grey' }}
              - type: template
                icon: mdi:car
                content: >-
                  Fordon · {{ 'På' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on')
                     or is_state('binary_sensor.front_aoa_vehicle', 'on') else 'Av' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on')
                     or is_state('binary_sensor.front_aoa_vehicle', 'on') else 'grey' }}
              - type: template
                icon: mdi:account
                content: >-
                  Bakgård · {{ 'På' if is_state('binary_sensor.backyard_aoa_person', 'on') else 'Av' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.backyard_aoa_person', 'on') else 'grey' }}
              - type: template
                icon: mdi:account
                content: >-
                  Förr.ut · {{ 'På' if is_state('binary_sensor.storage_ext_aoa_person', 'on') else 'Av' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.storage_ext_aoa_person', 'on') else 'grey' }}
              - type: template
                icon: mdi:timer-sand
                content: >-
                  Loiter · {{ 'På' if is_state('binary_sensor.front_aoa_loitering', 'on') else 'Av' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.front_aoa_loitering', 'on') else 'grey' }}

      # ── Data health ──────────────────────────────────────────
      - title: DATA
        column_span: 2
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:thermometer-lines
                content: "Δ {{ states('sensor.house_indoor_outdoor_delta') }}°C"
                icon_color: blue
              - type: template
                icon: mdi:motion-sensor
                content: >-
                  Zoner {{ states('sensor.house_outdoor_activity_summary') }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.house_outdoor_presence', 'on') else 'grey' }}
              - type: template
                icon: mdi:air-filter
                content: >-
                  {% set t = states('sensor.driveway_env_temperature') %}
                  {% if t in ['unknown', 'unavailable', ''] %}D6210 offline
                  {% else %}D6210 {{ t }}°C{% endif %}
                icon_color: >-
                  {% if states('sensor.driveway_env_temperature') in ['unknown', 'unavailable', ''] %}amber
                  {% else %}green{% endif %}
              - type: action
                icon: mdi:chart-timeline-variant
                content: Insights
                tap_action:
                  action: navigate
                  navigation_path: /house-timeline

      # ── Recording toggles ────────────────────────────────────
      - title: INSPELNING
        column_span: 2
        cards:
          - type: custom:mushroom-entity-card
            entity: switch.front_recordings
            name: Front
            icon: mdi:record-rec
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: switch.driveway_wide_recordings
            name: Driveway Wide
            icon: mdi:record-rec
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: switch.driveway_id_recordings
            name: Driveway ID
            icon: mdi:record-rec
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: switch.backyard_recordings
            name: Backyard
            icon: mdi:record-rec
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: switch.storage_ext_recordings
            name: Storage Ext
            icon: mdi:record-rec
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: switch.storage_int_recordings
            name: Storage Int
            icon: mdi:record-rec
            layout: horizontal
            fill_container: true

      # ── Insights platform ────────────────────────────────────
      - title: INSIGHTS
        column_span: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Danielsson Insights
            secondary: Analytics · miljö · story — add-on v0.2.4 på :8765
            icon: mdi:chart-timeline-variant
            icon_color: blue
            fill_container: true
            tap_action:
              action: navigate
              navigation_path: /house-timeline

      # ── System ───────────────────────────────────────────────
      - title: SYSTEM
        column_span: 2
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-entity-card
                entity: update.home_assistant_core_update
                name: Core
                icon: mdi:home-assistant
                layout: vertical
                fill_container: true
              - type: custom:mushroom-entity-card
                entity: update.home_assistant_supervisor_update
                name: Supervisor
                icon: mdi:update
                layout: vertical
                fill_container: true
              - type: custom:mushroom-entity-card
                entity: update.home_assistant_operating_system_update
                name: HAOS
                icon: mdi:layers
                layout: vertical
                fill_container: true

      # ── Add-ons ──────────────────────────────────────────────
      - title: TILLÄGG
        column_span: 2
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-entity-card
                entity: update.frigate_full_access_uppdatering
                name: Frigate
                icon: mdi:cctv
                layout: vertical
              - type: custom:mushroom-entity-card
                entity: update.danielsson_insights_uppdatering
                name: Insights
                icon: mdi:chart-timeline-variant
                layout: vertical
              - type: custom:mushroom-entity-card
                entity: update.matter_server_uppdatering
                name: Matter
                icon: mdi:chip
                layout: vertical
              - type: custom:mushroom-entity-card
                entity: update.advanced_ssh_web_terminal_uppdatering
                name: SSH
                icon: mdi:console
                layout: vertical

      # ── Network ──────────────────────────────────────────────
      - title: NÄTVERK
        cards:
          - type: custom:mushroom-entity-card
            entity: binary_sensor.m9plus_wan_status
            name: WAN
            icon: mdi:wan
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: sensor.m9plus_nedladdningshastighet
            name: Down
            icon: mdi:download
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: sensor.m9plus_uppladdningshastighet
            name: Up
            icon: mdi:upload
            layout: horizontal
            fill_container: true

      # ── Backup ───────────────────────────────────────────────
      - title: SÄKERHETSKOPIA
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.backup_backup_manager_state
            name: State
            icon: mdi:backup-restore
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: sensor.backup_last_successful_automatic_backup
            name: Last Backup
            icon: mdi:clock-check
            layout: horizontal
            fill_container: true

      # ── Quick Actions ────────────────────────────────────────
      - title: SNABBA ÅTGÄRDER
        column_span: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Restart HA
            icon: mdi:restart
            icon_color: amber
            fill_container: true
            tap_action:
              action: call-service
              service: homeassistant.restart
              confirmation:
                text: Restart Home Assistant?
          - type: custom:mushroom-template-card
            primary: Backup Now
            icon: mdi:backup-restore
            icon_color: blue
            fill_container: true
            tap_action:
              action: call-service
              service: backup.create
              confirmation:
                text: Create a full backup?
