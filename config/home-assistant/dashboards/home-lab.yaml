title: Home Lab
views:

  # ═══════════════════════════════════════════════════════════════
  # VIEW 1 — HOME
  # ═══════════════════════════════════════════════════════════════
  - title: Home
    path: home
    icon: mdi:home
    type: sections
    max_columns: 1
    sections:

      # ── Overview — compact status at top ─────────────────────
      - cards:
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: >-
                  {% set h = now().hour %}
                  {% if h < 12 %}Good morning
                  {% elif h < 17 %}Good afternoon
                  {% else %}Good evening{% endif %}, Thomas
                secondary: "{{ now().strftime('%A') }} · {{ now().day }} {{ now().strftime('%B') }}"
                icon: mdi:home-variant
                icon_color: blue
                fill_container: true
                tap_action:
                  action: none
              - type: custom:mushroom-template-card
                primary: "{{ states('weather.forecast_hem') | replace('_', ' ') | title }}"
                secondary: Weather
                icon: mdi:weather-partly-cloudy
                icon_color: blue
                layout: vertical
                fill_container: true
                tap_action:
                  action: more-info
                  entity: weather.forecast_hem
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.house_people_home_count') }} home"
                secondary: "{{ state_attr('sensor.house_people_home_count', 'who_home') }}"
                icon: mdi:home-account
                icon_color: >-
                  {{ 'green' if states('sensor.house_people_home_count') | int > 0 else 'grey' }}
                layout: vertical
                fill_container: true
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.driveway_env_temperature') }}°C"
                secondary: >-
                  Ute · {{ relative_time(states.sensor.driveway_env_temperature.last_changed) }}
                icon: mdi:thermometer
                icon_color: >-
                  {% set t = states('sensor.driveway_env_temperature') | float(0) %}
                  {{ 'blue' if t < 10 else 'green' if t < 22 else 'orange' if t < 28 else 'red' }}
                layout: vertical
                fill_container: true
              - type: custom:mushroom-chips-card
                alignment: center
                chips:
                  - type: template
                    icon: mdi:water-percent
                    content: "{{ states('sensor.driveway_env_humidity') }}%"
                    icon_color: blue
                  - type: template
                    icon: mdi:molecule-co2
                    content: "{{ states('sensor.driveway_env_co2') | int(0) }}"
                    icon_color: >-
                      {% set c = states('sensor.driveway_env_co2') | int(0) %}
                      {{ 'green' if c < 800 else 'amber' if c < 1200 else 'red' }}
                  - type: template
                    icon: mdi:air-filter
                    content: "AQI {{ states('sensor.driveway_env_aqi') }}"
                    icon_color: >-
                      {% set aqi = states('sensor.driveway_env_aqi') | int(0) %}
                      {{ 'green' if aqi <= 50 else 'amber' if aqi <= 100 else 'red' }}
                  - type: template
                    icon: mdi:blur
                    content: "PM2.5 {{ states('sensor.driveway_env_pm2_5') }}"
                    icon_color: grey

      # ── Who's Home ───────────────────────────────────────────
      - title: WHO'S HOME
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-person-card
                entity: person.thomasx
                layout: vertical
                fill_container: true
              - type: custom:mushroom-person-card
                entity: person.nils_2
                layout: vertical
                fill_container: true
              - type: custom:mushroom-person-card
                entity: person.hugo
                layout: vertical
                fill_container: true
              - type: custom:mushroom-person-card
                entity: person.anna
                layout: vertical
                fill_container: true

      # ── Quick Status ─────────────────────────────────────────
      - title: QUICK STATUS
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:door
                content: >-
                  {% if is_state('binary_sensor.front_aoa_person', 'on') %}Entré · Person
                  {% elif is_state('binary_sensor.front_motion', 'on') %}Entré · Rörelse
                  {% else %}Entré · Lugnt{% endif %}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.front_aoa_person', 'on')
                     else 'amber' if is_state('binary_sensor.front_motion', 'on')
                     else 'green' }}
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-lab/security
              - type: template
                icon: mdi:car
                content: >-
                  {% if is_state('binary_sensor.driveway_id_aoa_person', 'on') %}Uppfart · Person
                  {% elif is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on') %}Uppfart · Fordon
                  {% elif is_state('binary_sensor.driveway_wide_motion', 'on') %}Uppfart · Rörelse
                  {% else %}Uppfart · Lugnt{% endif %}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.driveway_id_aoa_person', 'on')
                     else 'amber' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on')
                        or is_state('binary_sensor.driveway_wide_motion', 'on')
                     else 'green' }}
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-lab/cameras
              - type: template
                icon: mdi:walk
                content: >-
                  {{ 'Utomhus · Någon' if is_state('sensor.house_outdoor_presence', 'on')
                     else 'Utomhus · Tomt' }}
                icon_color: >-
                  {{ 'red' if is_state('sensor.house_outdoor_presence', 'on') else 'grey' }}

      # ── Lights On Now — only lights that are actually on ────
      - title: LIGHTS ON NOW
        cards:
          - type: custom:mushroom-template-card
            primary: >-
              {% set on = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('entity_id', 'search', 'ir_light|whitelight')
                | list %}
              {% if on | count == 0 %}All lights off
              {% elif on | count == 1 %}1 light on
              {% else %}{{ on | count }} lights on{% endif %}
            secondary: >-
              {% set on = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('entity_id', 'search', 'ir_light|whitelight')
                | map(attribute='name') | list %}
              {{ on | join(' · ') if on | count > 0 else 'Tap a light in Rooms to control' }}
            icon: mdi:lightbulb-group
            icon_color: >-
              {% set on = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('entity_id', 'search', 'ir_light|whitelight')
                | list %}
              {{ 'amber' if on | count > 0 else 'disabled' }}
            fill_container: true
            tap_action:
              action: navigate
              navigation_path: /lovelace/home-lab/rooms
          - type: entity-filter
            show_empty: false
            entities:
              - entity: light.anna_och_thomas_sovrum
                name: Sovrum
              - entity: light.hugos_rum
                name: Hugos rum
              - entity: light.living_room
                name: Vardagsrum
              - entity: light.fonsterlampor
                name: Fönsterlampor
              - entity: light.fonster_vanster
                name: Fönster vänster
              - entity: light.fonster_hoger
                name: Fönster höger
              - entity: light.matplats
                name: Matplats
              - entity: light.spottar
                name: Spottar
              - entity: light.taklampa
                name: Taklampa
              - entity: light.underskapsbelysning
                name: Underskåp
              - entity: light.sovrumstaklampa
                name: Sovrum tak
              - entity: light.hugos_taklampa
                name: Hugo tak
            state_filter:
              - "on"
            card:
              type: entities
              state_color: true

      # ── Vacuum — family quick control ────────────────────────
      - title: VACUUM
        cards:
          - type: custom:mushroom-vacuum-card
            entity: vacuum.hoover
            name: Vacuum
            fill_container: true
          - type: custom:mushroom-chips-card
            chips:
              - type: action
                icon: mdi:play
                content: Start
                tap_action:
                  action: call-service
                  service: vacuum.start
                  target:
                    entity_id: vacuum.hoover
              - type: action
                icon: mdi:pause
                content: Pause
                tap_action:
                  action: call-service
                  service: vacuum.pause
                  target:
                    entity_id: vacuum.hoover
              - type: action
                icon: mdi:stop
                content: Stop
                tap_action:
                  action: call-service
                  service: vacuum.stop
                  target:
                    entity_id: vacuum.hoover
              - type: action
                icon: mdi:home-import-outline
                content: Dock
                tap_action:
                  action: call-service
                  service: vacuum.return_to_base
                  target:
                    entity_id: vacuum.hoover
              - type: entity
                entity: button.hoover_full_cleaning
                icon: mdi:broom
                content_info: name


  # ═══════════════════════════════════════════════════════════════
  # VIEW 2 — CAMERAS
  # custom:advanced-camera-card with Frigate integration
  # ═══════════════════════════════════════════════════════════════
  - title: Cameras
    path: cameras
    icon: mdi:cctv
    type: sections
    max_columns: 2
    sections:

      # ── Front — primary entry view ───────────────────────────
      - title: FRONT
        column_span: 2
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.front
                title: Front (P3288)
            dimensions:
              aspect_ratio: 16/9
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  {{ 'Person' if is_state('binary_sensor.front_aoa_person', 'on')
                     else 'Rörelse' if is_state('binary_sensor.front_motion', 'on')
                     else 'Lugnt' }}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.front_aoa_person', 'on')
                     else 'amber' if is_state('binary_sensor.front_motion', 'on')
                     else 'grey' }}

      # ── Backyard + Storage — side by side ────────────────────
      - title: BACKYARD
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.backyard
                title: Backyard (Q1656)
            dimensions:
              aspect_ratio: 16/9

      - title: STORAGE
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.storage_ext
                title: Storage Exterior (Q1656)
            dimensions:
              aspect_ratio: 16/9
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.storage_int
                title: Storage Interior (M1055)
            dimensions:
              aspect_ratio: 16/9

      # ── Driveway — wide overview + ID cam below ──────────────
      - title: DRIVEWAY
        column_span: 2
        cards:
          - type: custom:advanced-camera-card
            cameras:
              - camera_entity: camera.driveway_wide
                title: Driveway Wide (Q3558-LVE)
            dimensions:
              aspect_ratio: 16/9
          - type: horizontal-stack
            cards:
              - type: custom:advanced-camera-card
                cameras:
                  - camera_entity: camera.driveway_id
                    title: Driveway ID (M2036)
                dimensions:
                  aspect_ratio: 16/9
              - type: custom:mushroom-chips-card
                alignment: center
                chips:
                  - type: template
                    icon: mdi:account
                    content: >-
                      {{ 'Person' if is_state('binary_sensor.driveway_id_aoa_person', 'on')
                         else 'Ingen person' }}
                    icon_color: >-
                      {{ 'red' if is_state('binary_sensor.driveway_id_aoa_person', 'on') else 'grey' }}
                  - type: template
                    icon: mdi:car
                    content: >-
                      {{ 'Fordon' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on')
                         else 'Inget fordon' }}
                    icon_color: >-
                      {{ 'amber' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on') else 'grey' }}
                  - type: template
                    icon: mdi:motion-sensor
                    content: >-
                      {{ 'Rörelse' if is_state('binary_sensor.driveway_wide_motion', 'on')
                         else 'Ingen rörelse' }}
                    icon_color: >-
                      {{ 'blue' if is_state('binary_sensor.driveway_wide_motion', 'on') else 'grey' }}


  # ═══════════════════════════════════════════════════════════════
  # VIEW 3 — SECURITY
  # ═══════════════════════════════════════════════════════════════
  - title: Security
    path: security
    icon: mdi:shield-home
    type: sections
    max_columns: 1
    sections:

      # ── Live Detections ──────────────────────────────────────
      # grey = clear · amber = motion only · red = person detected
      - title: LIVE DETECTIONS
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:cctv
                content: Front
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.front_person_occupancy', 'on')
                     else 'amber' if is_state('binary_sensor.front_motion', 'on')
                     else 'grey' }}
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-lab/cameras
              - type: template
                icon: mdi:cctv
                content: Driveway
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.driveway_id_person_occupancy', 'on')
                     or is_state('binary_sensor.driveway_wide_person_occupancy', 'on')
                     else 'amber' if is_state('binary_sensor.driveway_wide_motion', 'on')
                     or is_state('binary_sensor.driveway_wide_car_occupancy', 'on')
                     else 'grey' }}
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-lab/cameras
              - type: template
                icon: mdi:cctv
                content: Backyard
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.backyard_person_occupancy', 'on')
                     else 'amber' if is_state('binary_sensor.backyard_motion', 'on')
                     else 'grey' }}
              - type: template
                icon: mdi:cctv
                content: Stor Ext
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.storage_ext_person_occupancy', 'on')
                     else 'amber' if is_state('binary_sensor.storage_ext_motion', 'on')
                     else 'grey' }}
              - type: template
                icon: mdi:cctv
                content: Stor Int
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.storage_int_person_occupancy', 'on')
                     else 'amber' if is_state('binary_sensor.storage_int_motion', 'on')
                     else 'grey' }}

      # ── Latest Frigate detection snapshots ───────────────────
      - title: SENASTE BILDER
        cards:
          - type: horizontal-stack
            cards:
              - type: picture-entity
                entity: image.front_person
                name: Entrén · person
                show_state: false
                tap_action:
                  action: more-info
              - type: picture-entity
                entity: image.driveway_wide_person
                name: Uppfart · person
                show_state: false
                tap_action:
                  action: more-info
              - type: picture-entity
                entity: image.driveway_id_person
                name: Uppfart ID · person
                show_state: false
                tap_action:
                  action: more-info
          - type: horizontal-stack
            cards:
              - type: picture-entity
                entity: image.front_car
                name: Entrén · fordon
                show_state: false
                tap_action:
                  action: more-info
              - type: picture-entity
                entity: image.driveway_wide_car
                name: Uppfart · fordon
                show_state: false
                tap_action:
                  action: more-info
              - type: picture-entity
                entity: image.driveway_id_car
                name: Uppfart ID · fordon
                show_state: false
                tap_action:
                  action: more-info

      # ── Face Recognition ─────────────────────────────────────
      - title: FACE RECOGNITION
        cards:
          - type: custom:mushroom-template-card
            primary: Not yet active
            secondary: Double Take + CompreFace — Phase 4
            icon: mdi:face-recognition
            icon_color: amber
            fill_container: true
            tap_action:
              action: none

      # ── Yale Doorman (Sprint 1) ──────────────────────────────
      - title: ACCESS
        cards:
          - type: custom:mushroom-template-card
            primary: Yale Doorman — coming soon
            secondary: Door lock + person correlation
            icon: mdi:door-closed-lock
            icon_color: disabled
            fill_container: true
            tap_action:
              action: none

      - title: MORE ANALYTICS
        cards:
          - type: custom:mushroom-template-card
            primary: Danielsson Insights
            secondary: Timeline · Environment · Activity · Object counts
            icon: mdi:chart-timeline-variant
            icon_color: blue
            fill_container: true
            tap_action:
              action: navigate
              navigation_path: /lovelace/home-lab/insights


  # ═══════════════════════════════════════════════════════════════
  # VIEW 4 — INSIGHTS (Danielsson Insights)
  # ═══════════════════════════════════════════════════════════════
  - title: Insights
    path: insights
    icon: mdi:chart-timeline-variant
    type: sections
    max_columns: 1
    sections:

      # ── Outdoor environment — live ─────────────────────────────
      - title: OUTDOOR NOW
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.driveway_env_temperature') }}°C"
                secondary: Temperature
                icon: mdi:thermometer
                icon_color: >-
                  {% set t = states('sensor.driveway_env_temperature') | float(0) %}
                  {{ 'blue' if t < 10 else 'green' if t < 22 else 'orange' if t < 28 else 'red' }}
                layout: vertical
                fill_container: true
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.driveway_env_humidity') }}%"
                secondary: Humidity
                icon: mdi:water-percent
                icon_color: blue
                layout: vertical
                fill_container: true
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.driveway_env_co2') | int(0) }} ppm"
                secondary: CO₂
                icon: mdi:molecule-co2
                icon_color: >-
                  {% set c = states('sensor.driveway_env_co2') | int(0) %}
                  {{ 'green' if c < 800 else 'amber' if c < 1200 else 'red' }}
                layout: vertical
                fill_container: true
              - type: custom:mushroom-template-card
                primary: "AQI {{ states('sensor.driveway_env_aqi') }}"
                secondary: Air quality
                icon: mdi:air-filter
                icon_color: >-
                  {% set aqi = states('sensor.driveway_env_aqi') | int(0) %}
                  {{ 'green' if aqi <= 50 else 'amber' if aqi <= 100 else 'red' }}
                layout: vertical
                fill_container: true
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.driveway_env_pm2_5') }}"
                secondary: PM2.5 µg/m³
                icon: mdi:blur
                icon_color: grey
                layout: vertical
                fill_container: true

      - title: LAST 7 DAYS
        cards:
          - type: history-graph
            title: Temperature
            entities:
              - entity: sensor.driveway_env_temperature
            hours_to_show: 168
          - type: history-graph
            title: Humidity
            entities:
              - entity: sensor.driveway_env_humidity
            hours_to_show: 168
          - type: history-graph
            title: CO₂
            entities:
              - entity: sensor.driveway_env_co2
            hours_to_show: 168
          - type: history-graph
            title: Air Quality (AQI)
            entities:
              - entity: sensor.driveway_env_aqi
            hours_to_show: 168
          - type: history-graph
            title: PM2.5
            entities:
              - entity: sensor.driveway_env_pm2_5
            hours_to_show: 168

      - title: LAST 90 DAYS
        cards:
          - type: statistics-graph
            chart_type: line
            entities:
              - sensor.driveway_env_temperature
            stat_types:
              - mean
            days_to_show: 90
            period: day
            hide_legend: true
          - type: statistics-graph
            chart_type: line
            entities:
              - sensor.driveway_env_humidity
            stat_types:
              - mean
            days_to_show: 90
            period: day
            hide_legend: true
          - type: statistics-graph
            chart_type: line
            entities:
              - sensor.driveway_env_co2
            stat_types:
              - mean
            days_to_show: 90
            period: day
            hide_legend: true
          - type: statistics-graph
            chart_type: line
            entities:
              - sensor.driveway_env_aqi
            stat_types:
              - mean
            days_to_show: 90
            period: day
            hide_legend: true
          - type: statistics-graph
            chart_type: line
            entities:
              - sensor.driveway_env_pm2_5
            stat_types:
              - mean
            days_to_show: 90
            period: day
            hide_legend: true

      # ── Audio Analytics SPL (Q3558, P3288, Q1656-LE) ───────────
      - title: AUDIO ANALYTICS (SPL)
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: >-
                  {% if states('sensor.front_audio_spl') not in ['unknown', 'unavailable'] %}
                  {{ states('sensor.front_audio_spl') }} dB
                  {% else %}—{% endif %}
                secondary: Front
                icon: mdi:volume-high
                icon_color: >-
                  {{ 'blue' if states('sensor.front_audio_spl') not in ['unknown', 'unavailable'] else 'disabled' }}
                layout: vertical
                fill_container: true
                tap_action:
                  action: more-info
                  entity: sensor.front_audio_spl
              - type: custom:mushroom-template-card
                primary: >-
                  {% if states('sensor.driveway_wide_audio_spl') not in ['unknown', 'unavailable'] %}
                  {{ states('sensor.driveway_wide_audio_spl') }} dB
                  {% else %}—{% endif %}
                secondary: Driveway
                icon: mdi:volume-high
                icon_color: >-
                  {{ 'blue' if states('sensor.driveway_wide_audio_spl') not in ['unknown', 'unavailable'] else 'disabled' }}
                layout: vertical
                fill_container: true
                tap_action:
                  action: more-info
                  entity: sensor.driveway_wide_audio_spl
              - type: custom:mushroom-template-card
                primary: >-
                  {% if states('sensor.backyard_audio_spl') not in ['unknown', 'unavailable'] %}
                  {{ states('sensor.backyard_audio_spl') }} dB
                  {% else %}—{% endif %}
                secondary: Backyard
                icon: mdi:volume-high
                icon_color: >-
                  {{ 'blue' if states('sensor.backyard_audio_spl') not in ['unknown', 'unavailable'] else 'disabled' }}
                layout: vertical
                fill_container: true
                tap_action:
                  action: more-info
                  entity: sensor.backyard_audio_spl
          - type: custom:mushroom-template-card
            primary: Plugin active on all 3 cameras
            secondary: >-
              {% if states('sensor.driveway_wide_audio_spl') in ['unknown', 'unavailable'] %}
              MQTT action rule needed — see docs/runbooks/audio-analytics-setup.md
              {% else %}Live SPL via MQTT{% endif %}
            icon: mdi:information-outline
            icon_color: amber
            fill_container: true
            tap_action:
              action: none
          - type: history-graph
            title: Sound Pressure Level (7 days)
            entities:
              - entity: sensor.front_audio_spl
                name: Front
              - entity: sensor.driveway_wide_audio_spl
                name: Driveway
              - entity: sensor.backyard_audio_spl
                name: Backyard
            hours_to_show: 168

      # ── Occupancy activity (AOA) ─────────────────────────────
      - title: ACTIVITY (AOA)
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:account
                content: >-
                  Entré · {{ 'På' if is_state('binary_sensor.front_aoa_person', 'on') else 'Av' }}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.front_aoa_person', 'on') else 'grey' }}
              - type: template
                icon: mdi:account
                content: >-
                  Uppf. bred · {{ 'På' if is_state('binary_sensor.driveway_wide_aoa_person', 'on') else 'Av' }}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.driveway_wide_aoa_person', 'on') else 'grey' }}
              - type: template
                icon: mdi:account
                content: >-
                  Uppf. ID · {{ 'På' if is_state('binary_sensor.driveway_id_aoa_person', 'on') else 'Av' }}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.driveway_id_aoa_person', 'on') else 'grey' }}
              - type: template
                icon: mdi:car
                content: >-
                  Fordon · {{ 'På' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on')
                     or is_state('binary_sensor.front_aoa_vehicle', 'on') else 'Av' }}
                icon_color: >-
                  {{ 'amber' if is_state('binary_sensor.driveway_wide_aoa_vehicle', 'on')
                     or is_state('binary_sensor.front_aoa_vehicle', 'on') else 'grey' }}
              - type: template
                icon: mdi:account
                content: >-
                  Backyard · {{ 'På' if is_state('binary_sensor.backyard_aoa_person', 'on') else 'Av' }}
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.backyard_aoa_person', 'on') else 'grey' }}

      # ── Object counts ────────────────────────────────────────
      - title: OBJECT COUNTS (24H)
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.front_person_count
            name: Front — persons
            icon: mdi:account
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: sensor.driveway_wide_car_count
            name: Driveway — cars
            icon: mdi:car
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: sensor.driveway_id_person_count
            name: Driveway ID — persons
            icon: mdi:account
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: sensor.backyard_person_count
            name: Backyard — persons
            icon: mdi:account
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: sensor.storage_ext_person_count
            name: Storage Ext — persons
            icon: mdi:account
            layout: horizontal
            fill_container: true

      # ── Event timeline ───────────────────────────────────────
      - title: TIMELINE
        cards:
          - type: logbook
            hours_to_show: 48
            entities:
              - binary_sensor.front_motion
              - binary_sensor.front_person_occupancy
              - binary_sensor.front_aoa_person
              - binary_sensor.driveway_wide_motion
              - binary_sensor.driveway_wide_car_occupancy
              - binary_sensor.driveway_wide_person_occupancy
              - binary_sensor.driveway_wide_aoa_person
              - binary_sensor.driveway_wide_aoa_vehicle
              - binary_sensor.driveway_id_motion
              - binary_sensor.driveway_id_person_occupancy
              - binary_sensor.driveway_id_aoa_person
              - binary_sensor.backyard_motion
              - binary_sensor.backyard_person_occupancy
              - binary_sensor.backyard_aoa_person
              - binary_sensor.storage_ext_motion
              - binary_sensor.storage_ext_person_occupancy
              - binary_sensor.storage_int_motion
              - binary_sensor.storage_int_person_occupancy


  # ═══════════════════════════════════════════════════════════════
  # VIEW 5 — ROOMS
  # Lights and devices by area
  # ═══════════════════════════════════════════════════════════════
  - title: Rooms
    path: rooms
    icon: mdi:floor-plan
    type: sections
    max_columns: 2
    sections:

      # ── Master light control ──────────────────────────────────
      - column_span: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Belysning
            secondary: >-
              {% set on = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('entity_id', 'search', 'ir_light|whitelight')
                | list %}
              {% if on | count == 0 %}Alla lampor släckta
              {% elif on | count == 1 %}1 lampa tänd
              {% else %}{{ on | count }} lampor tända{% endif %}
            icon: mdi:lightbulb-group
            icon_color: >-
              {% set on = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('entity_id', 'search', 'ir_light|whitelight')
                | list %}
              {{ 'amber' if on | count > 0 else 'disabled' }}
            fill_container: true
            tap_action:
              action: none
          - type: custom:mushroom-chips-card
            chips:
              - type: action
                icon: mdi:lightbulb-off-outline
                content: Släck allt
                tap_action:
                  action: call-service
                  service: light.turn_off
                  target:
                    entity_id:
                      - light.living_room
                      - light.fonsterlampor
                      - light.anna_och_thomas_sovrum
                      - light.hugos_rum
                      - light.matplats
                      - light.spottar
                      - light.underskapsbelysning

      # ── Kök ──────────────────────────────────────────────────
      - title: KÖK
        cards:
          - type: custom:mushroom-light-card
            entity: light.spottar
            name: Spottar
            show_brightness_control: true
            collapsible_controls: false
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-light-card
            entity: light.matplats
            name: Matplats
            show_brightness_control: true
            collapsible_controls: false
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-light-card
            entity: light.underskapsbelysning
            name: Underskåp
            show_brightness_control: true
            collapsible_controls: false
            layout: horizontal
            fill_container: true

      # ── Vardagsrum ───────────────────────────────────────────
      - title: VARDAGSRUM
        cards:
          - type: custom:mushroom-light-card
            entity: light.living_room
            name: Vardagsrum
            show_brightness_control: true
            show_color_temp_control: true
            collapsible_controls: false
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-light-card
            entity: light.taklampa
            name: Taklampa
            show_brightness_control: true
            collapsible_controls: false
            layout: horizontal
            fill_container: true

      # ── Fönsterlampor ────────────────────────────────────────
      - title: FÖNSTERLAMPOR
        cards:
          - type: custom:mushroom-light-card
            entity: light.fonsterlampor
            name: Alla fönster
            show_brightness_control: true
            collapsible_controls: false
            layout: horizontal
            fill_container: true
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-light-card
                entity: light.fonster_vanster
                name: Vänster
                show_brightness_control: true
                collapsible_controls: true
                fill_container: true
              - type: custom:mushroom-light-card
                entity: light.fonster_hoger
                name: Höger
                show_brightness_control: true
                collapsible_controls: true
                fill_container: true

      # ── Sovrum ───────────────────────────────────────────────
      - title: SOVRUM
        cards:
          - type: custom:mushroom-light-card
            entity: light.anna_och_thomas_sovrum
            name: Sovrum
            show_brightness_control: true
            show_color_temp_control: true
            collapsible_controls: false
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-light-card
            entity: light.sovrumstaklampa
            name: Taklampa
            show_brightness_control: true
            collapsible_controls: false
            layout: horizontal
            fill_container: true

      # ── Hugos rum ────────────────────────────────────────────
      - title: HUGOS RUM
        cards:
          - type: custom:mushroom-light-card
            entity: light.hugos_rum
            name: Hugos rum
            show_brightness_control: true
            show_color_temp_control: true
            collapsible_controls: false
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-light-card
            entity: light.hugos_taklampa
            name: Taklampa
            show_brightness_control: true
            collapsible_controls: false
            layout: horizontal
            fill_container: true

      # ── Nils rum ─────────────────────────────────────────────
      - title: NILS RUM
        cards:
          - type: custom:mushroom-template-card
            primary: Nils rum
            secondary: Inga lampor inkopplade ännu
            icon: mdi:lightbulb-off-outline
            icon_color: disabled
            fill_container: true
            tap_action:
              action: none

      # ── Vacuum (Roborock) ────────────────────────────────────
      - title: VACUUM
        column_span: 2
        cards:
          - type: custom:mushroom-vacuum-card
            entity: vacuum.hoover
            name: Vacuum
            fill_container: true
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-entity-card
                entity: sensor.hoover_batteri
                name: Batteri
                icon: mdi:battery
                layout: vertical
              - type: custom:mushroom-entity-card
                entity: sensor.hoover_status
                name: Status
                icon: mdi:information
                layout: vertical
              - type: custom:mushroom-entity-card
                entity: sensor.hoover_nuvarande_rum
                name: Rum
                icon: mdi:floor-plan
                layout: vertical
          - type: custom:mushroom-chips-card
            chips:
              - type: action
                icon: mdi:play
                content: Start
                tap_action:
                  action: call-service
                  service: vacuum.start
                  target:
                    entity_id: vacuum.hoover
              - type: action
                icon: mdi:pause
                content: Pause
                tap_action:
                  action: call-service
                  service: vacuum.pause
                  target:
                    entity_id: vacuum.hoover
              - type: action
                icon: mdi:stop
                content: Stop
                tap_action:
                  action: call-service
                  service: vacuum.stop
                  target:
                    entity_id: vacuum.hoover
              - type: action
                icon: mdi:home-import-outline
                content: Dock
                tap_action:
                  action: call-service
                  service: vacuum.return_to_base
                  target:
                    entity_id: vacuum.hoover
              - type: entity
                entity: button.hoover_full_cleaning
                icon: mdi:broom
                content_info: name
          - type: custom:mushroom-template-card
            primary: >-
              {% if is_state('vacuum.hoover', 'cleaning') %}Städar — {{ states('sensor.hoover_nuvarande_rum') }}
              {% elif is_state('vacuum.hoover', 'docked') %}Dockad & laddad
              {% else %}{{ states('vacuum.hoover') | title }}{% endif %}
            secondary: "Totalt städat: {{ states('sensor.hoover_totalt_stadad_area') | round(0) }} m²"
            icon: mdi:robot-vacuum
            icon_color: >-
              {{ 'green' if is_state('vacuum.hoover', 'docked') else 'blue' }}
            fill_container: true
            tap_action:
              action: more-info
              entity: vacuum.hoover
          - type: picture-entity
            entity: image.hoover_bottenvaning
            name: Bottenvåning
            show_state: false
            tap_action:
              action: more-info


  # ═══════════════════════════════════════════════════════════════
  # VIEW 6 — OPERATIONS
  # ═══════════════════════════════════════════════════════════════
  - title: Operations
    path: ops
    icon: mdi:cog
    type: sections
    max_columns: 2
    sections:

      # ── Camera status ────────────────────────────────────────
      - title: CAMERAS
        column_span: 2
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:cctv
                content: Front
                icon_color: >-
                  {{ 'green' if is_state('camera.front', 'recording') else 'red' }}
              - type: template
                icon: mdi:cctv
                content: Drwy Wide
                icon_color: >-
                  {{ 'green' if is_state('camera.driveway_wide', 'recording') else 'red' }}
              - type: template
                icon: mdi:cctv
                content: Drwy ID
                icon_color: >-
                  {{ 'green' if is_state('camera.driveway_id', 'recording') else 'red' }}
              - type: template
                icon: mdi:cctv
                content: Backyard
                icon_color: >-
                  {{ 'green' if is_state('camera.backyard', 'recording') else 'red' }}
              - type: template
                icon: mdi:cctv
                content: Stor Ext
                icon_color: >-
                  {{ 'green' if is_state('camera.storage_ext', 'recording') else 'red' }}
              - type: template
                icon: mdi:cctv
                content: Stor Int
                icon_color: >-
                  {{ 'green' if is_state('camera.storage_int', 'recording') else 'red' }}

      # ── Recording toggles ────────────────────────────────────
      - title: RECORDING
        column_span: 2
        cards:
          - type: custom:mushroom-entity-card
            entity: switch.front_recordings
            name: Front
            icon: mdi:record-rec
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: switch.driveway_wide_recordings
            name: Driveway Wide
            icon: mdi:record-rec
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: switch.driveway_id_recordings
            name: Driveway ID
            icon: mdi:record-rec
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: switch.backyard_recordings
            name: Backyard
            icon: mdi:record-rec
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: switch.storage_ext_recordings
            name: Storage Ext
            icon: mdi:record-rec
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: switch.storage_int_recordings
            name: Storage Int
            icon: mdi:record-rec
            layout: horizontal
            fill_container: true

      # ── System ───────────────────────────────────────────────
      - title: SYSTEM
        column_span: 2
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-entity-card
                entity: update.home_assistant_core_update
                name: Core
                icon: mdi:home-assistant
                layout: vertical
                fill_container: true
              - type: custom:mushroom-entity-card
                entity: update.home_assistant_supervisor_update
                name: Supervisor
                icon: mdi:update
                layout: vertical
                fill_container: true
              - type: custom:mushroom-entity-card
                entity: update.home_assistant_operating_system_update
                name: HAOS
                icon: mdi:layers
                layout: vertical
                fill_container: true

      # ── Add-ons ──────────────────────────────────────────────
      - title: ADD-ONS
        column_span: 2
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-entity-card
                entity: update.frigate_full_access_uppdatering
                name: Frigate
                icon: mdi:cctv
                layout: vertical
              - type: custom:mushroom-entity-card
                entity: update.double_take_uppdatering
                name: Double Take
                icon: mdi:face-recognition
                layout: vertical
              - type: custom:mushroom-entity-card
                entity: update.matter_server_uppdatering
                name: Matter
                icon: mdi:chip
                layout: vertical
              - type: custom:mushroom-entity-card
                entity: update.advanced_ssh_web_terminal_uppdatering
                name: SSH
                icon: mdi:console
                layout: vertical

      # ── Network ──────────────────────────────────────────────
      - title: NETWORK
        cards:
          - type: custom:mushroom-entity-card
            entity: binary_sensor.m9plus_wan_status
            name: WAN
            icon: mdi:wan
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: sensor.m9plus_nedladdningshastighet
            name: Down
            icon: mdi:download
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: sensor.m9plus_uppladdningshastighet
            name: Up
            icon: mdi:upload
            layout: horizontal
            fill_container: true

      # ── Backup ───────────────────────────────────────────────
      - title: BACKUP
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.backup_backup_manager_state
            name: State
            icon: mdi:backup-restore
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-entity-card
            entity: sensor.backup_last_successful_automatic_backup
            name: Last Backup
            icon: mdi:clock-check
            layout: horizontal
            fill_container: true

      # ── Quick Actions ────────────────────────────────────────
      - title: QUICK ACTIONS
        column_span: 2
        cards:
          - type: custom:mushroom-template-card
            primary: Restart HA
            icon: mdi:restart
            icon_color: amber
            fill_container: true
            tap_action:
              action: call-service
              service: homeassistant.restart
              confirmation:
                text: Restart Home Assistant?
          - type: custom:mushroom-template-card
            primary: Backup Now
            icon: mdi:backup-restore
            icon_color: blue
            fill_container: true
            tap_action:
              action: call-service
              service: backup.create
              confirmation:
                text: Create a full backup?
