            content: >-
              D6210 uppfart — recorder 90 dagar. Tom graf = bridge/add-on nere eller ingen historik än.
          - type: history-graph
            title: Temperatur
            hours_to_show: 168
            entities:
              - entity: sensor.driveway_env_temperature
          - type: history-graph
            title: Luftfuktighet
            hours_to_show: 168
            entities:
              - entity: sensor.driveway_env_humidity
