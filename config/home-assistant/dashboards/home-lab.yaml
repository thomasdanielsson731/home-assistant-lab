                icon: mdi:cctv
                content: Uppf. ID
                icon_color: >-
                  {{ 'green' if is_state('camera.driveway_id', 'recording') else 'red' }}
              - type: template
                icon: mdi:cctv
                content: Bakgård
                icon_color: >-
                  {{ 'green' if is_state('camera.backyard', 'recording') else 'red' }}
              - type: template
                icon: mdi:cctv
                content: Förråd ut
                icon_color: >-
                  {{ 'green' if is_state('camera.storage_ext', 'recording') else 'red' }}
