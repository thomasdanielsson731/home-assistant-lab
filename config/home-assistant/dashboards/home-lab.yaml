            stat_types:
              - mean
            days_to_show: 90
            period: day
            hide_legend: true
          - type: statistics-graph
            chart_type: line
            title: CO₂
            entities:
              - sensor.driveway_env_co2
            stat_types:
              - mean
            days_to_show: 90
            period: day
            hide_legend: true
          - type: statistics-graph
            chart_type: line
            title: AQI
            entities:
              - sensor.driveway_env_aqi
            stat_types:
              - mean
            days_to_show: 90
            period: day
            hide_legend: true
          - type: statistics-graph
            chart_type: line
            title: PM2.5
            entities:
              - sensor.driveway_env_pm2_5
            stat_types:
              - mean
            days_to_show: 90
            period: day
            hide_legend: true

