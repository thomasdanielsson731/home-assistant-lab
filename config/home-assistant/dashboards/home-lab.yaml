              - condition: state
                entity: image.driveway_wide_person
                state: unavailable
              - condition: state
                entity: image.driveway_id_person
                state: unavailable
            tap_action:
              action: none
          - type: horizontal-stack
            cards:
              - type: conditional
                conditions:
                  - condition: state
