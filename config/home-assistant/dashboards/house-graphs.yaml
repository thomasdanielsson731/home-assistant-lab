# Environment — HAOS add-on iframe (desktop) or open-in-browser button (mobile/iPad)
views:
  - title: Environment
    panel: true
    cards:
      - type: vertical-stack
        cards:
          - type: conditional
            conditions:
              - condition: screen
                media_query: "(min-width: 1025px)"
            card:
              type: markdown
              content: >-
                **Miljödata** (D6210 uppfart + inne brandvarnare + SPL).
                För detektioner och bilder → **Händelser** i sidomenyn.
          - type: conditional
            conditions:
              - condition: screen
                media_query: "(min-width: 1025px)"
            card:
              type: iframe
              url: !secret environment_url
              aspect_ratio: 125%

          - type: conditional
            conditions:
              - condition: screen
                media_query: "(max-width: 1024px)"
            card:
              type: vertical-stack
              cards:
                - type: markdown
                  content: |
                    ### Environment på mobil/iPad
                    Iframe blockeras ofta via HTTPS — öppna i Safari/Chrome.
                - type: custom:mushroom-template-card
                  primary: Öppna Environment
                  secondary: Grafer med zoom och luckor markerade
                  icon: mdi:chart-line
                  icon_color: blue
                  fill_container: true
                  tap_action:
                    action: url
                    url_path: !secret environment_url
