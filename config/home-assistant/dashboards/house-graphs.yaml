# Environment — Ingress on HAOS (desktop) or dev PC URL; Safari button on mobile
views:
  - title: Environment
    panel: true
    visibility:
      - condition: screen
        media_query: "(min-width: 1025px)"
    cards:
      - type: iframe
        url: !secret environment_url
        aspect_ratio: 50%

  - title: Environment
    visibility:
      - condition: screen
        media_query: "(max-width: 1024px)"
    cards:
      - type: markdown
        content: |
          ### Environment på mobil/iPad
          **Ingress (HAOS):** fungerar i appen när add-on körs på hosten.
          **Dev PC:** använd **Öppna i Safari** (HTTP-iframe blockeras via HTTPS/Nabu Casa).
      - type: button
        name: Öppna Environment
        icon: mdi:chart-line
        tap_action:
          action: url
          url_path: !secret environment_url
