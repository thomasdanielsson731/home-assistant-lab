# Environment — Insights via Ingress (in-app). Iframe blockeras i Windows HA-appen.
views:
  - title: Environment
    panel: true
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: action
                icon: mdi:home
                content: Hem
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-hem/home
              - type: action
                icon: mdi:format-list-bulleted
                content: Händelser
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events
              - type: action
                icon: mdi:chip
                content: Teknik
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-tech/live
              - type: template
                icon: mdi:counter
                content: >-
                  {{ states('sensor.insights_events_24h_display') | default('—', true) }} händelser (24 h)
                icon_color: grey
              - type: template
                icon: mdi:server-network
                content: >-
                  {% if states('sensor.insights_server_ok') == 'unavailable' %}Insights offline
                  {% else %}Insights OK{% endif %}
                icon_color: >-
                  {% if states('sensor.insights_server_ok') == 'unavailable' %}red
                  {% else %}green{% endif %}
              - type: action
                icon: mdi:chart-box-outline
                content: Grafana 7d
                tap_action:
                  action: url
                  url_path: !secret grafana_url
          - type: conditional
            conditions:
              - condition: state
                entity: sensor.insights_server_ok
                state:
                  - unavailable
            card:
              type: markdown
              content: >-
                **Insights svarar inte** — starta om add-on *Danielsson Insights*
                under Inställningar → Tillägg → Drift.
          - type: markdown
            content: >-
              **Miljödata** (D6210 uppfart + inne brandvarnare + SPL) från Insights metrics.
              **Recorder** (HA databas) används inte här — se Teknik → Historik för HA-grafer.
          - type: custom:mushroom-template-card
            primary: Öppna Environment
            secondary: Grafer med zoom och luckor markerade (Ingress i appen)
            icon: mdi:chart-line
            icon_color: blue
            fill_container: true
            tap_action:
              action: url
              url_path: !secret environment_url
          - type: custom:mushroom-template-card
            primary: Öppna i webbläsare
            secondary: insights.danielsson.cloud — om Ingress-knappen inte fungerar
            icon: mdi:open-in-new
            icon_color: grey
            fill_container: true
            tap_action:
              action: url
              url_path: !secret environment_external_url
