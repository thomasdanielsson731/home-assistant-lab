# Environment — HAOS add-on iframe (desktop) or open-in-browser button (mobile/iPad)
views:
  - title: Environment
    panel: true
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: action
                icon: mdi:home
                content: Hem
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-hem/home
              - type: action
                icon: mdi:format-list-bulleted
                content: Händelser
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-events/events
              - type: action
                icon: mdi:chip
                content: Teknik
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/home-tech/live
              - type: template
                icon: mdi:counter
                content: >-
                  {{ states('sensor.insights_events_24h_display') | default('—', true) }} händelser (24 h)
                icon_color: grey
              - type: template
                icon: mdi:server-network
                content: >-
                  {% if states('sensor.insights_server_ok') in ['unknown', 'unavailable', ''] %}Insights offline
                  {% else %}Insights OK{% endif %}
                icon_color: >-
                  {% if states('sensor.insights_server_ok') in ['unknown', 'unavailable', ''] %}red
                  {% else %}green{% endif %}
          - type: conditional
            conditions:
              - condition: state
                entity: sensor.insights_server_ok
                state:
                  - unavailable
                  - unknown
            card:
              type: markdown
              content: >-
                **Insights svarar inte** — Environment kan vara tomt.
                Starta om add-on *Danielsson Insights* under Inställningar → Tillägg → Drift.
          - type: conditional
            conditions:
              - condition: screen
                media_query: "(min-width: 1025px)"
            card:
              type: custom:mushroom-template-card
              primary: Öppna Environment i ny flik
              secondary: Använd om iframe är tom (vanligt efter omstart eller cache)
              icon: mdi:open-in-new
              icon_color: blue
              fill_container: true
              tap_action:
                action: url
                url_path: !secret environment_url
          - type: conditional
            conditions:
              - condition: screen
                media_query: "(min-width: 1025px)"
            card:
              type: markdown
              content: >-
                **Miljödata** (D6210 uppfart + inne brandvarnare + SPL).
                För detektioner och bilder → **Händelser** i sidomenyn.
          - type: conditional
            conditions:
              - condition: screen
                media_query: "(min-width: 1025px)"
            card:
              type: iframe
              url: !secret environment_url
              aspect_ratio: 125%

          - type: conditional
            conditions:
              - condition: screen
                media_query: "(max-width: 1024px)"
            card:
              type: vertical-stack
              cards:
                - type: markdown
                  content: |
                    ### Environment på mobil/iPad
                    Iframe blockeras ofta via HTTPS — öppna i Safari/Chrome.
                - type: custom:mushroom-template-card
                  primary: Öppna Environment
                  secondary: Grafer med zoom och luckor markerade
                  icon: mdi:chart-line
                  icon_color: blue
                  fill_container: true
                  tap_action:
                    action: url
                    url_path: !secret environment_url
