# Axis D6210 Air Quality Sensor — driveway_env (outdoor, driveway)
# Source: scripts/air_quality_bridge.py → VAPIX REST → MQTT
# Topics: axis/driveway_env/air/<metric>  (retained, updated every 60 s)

- name: "driveway env temperature"
  unique_id: "driveway_env_temperature"
  state_topic: "axis/driveway_env/air/temperature"
  unit_of_measurement: "°C"
  device_class: temperature
  state_class: measurement

- name: "driveway env humidity"
  unique_id: "driveway_env_humidity"
  state_topic: "axis/driveway_env/air/humidity"
  unit_of_measurement: "%"
  device_class: humidity
  state_class: measurement

- name: "driveway env co2"
  unique_id: "driveway_env_co2"
  state_topic: "axis/driveway_env/air/co2"
  unit_of_measurement: "ppm"
  device_class: carbon_dioxide
  state_class: measurement

- name: "driveway env voc"
  unique_id: "driveway_env_voc"
  state_topic: "axis/driveway_env/air/voc"
  unit_of_measurement: "ppb"
  device_class: volatile_organic_compounds_parts
  state_class: measurement

- name: "driveway env nox"
  unique_id: "driveway_env_nox"
  state_topic: "axis/driveway_env/air/nox"
  unit_of_measurement: "ppb"
  device_class: nitrogen_dioxide
  state_class: measurement

- name: "driveway env pm2.5"
  unique_id: "driveway_env_pm2_5"
  state_topic: "axis/driveway_env/air/pm2_5"
  unit_of_measurement: "µg/m³"
  device_class: pm25
  state_class: measurement

- name: "driveway env pm10"
  unique_id: "driveway_env_pm10"
  state_topic: "axis/driveway_env/air/pm10"
  unit_of_measurement: "µg/m³"
  device_class: pm10
  state_class: measurement

- name: "driveway env aqi"
  unique_id: "driveway_env_aqi"
  state_topic: "axis/driveway_env/air/aqi"
  unit_of_measurement: ""
  device_class: aqi
  state_class: measurement
