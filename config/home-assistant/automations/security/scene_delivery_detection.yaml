# Scene metadata automations — smart, low-noise notifications
# Principle: notify only when human behaviour matches a meaningful pattern.
# Raw snapshot/frame events go to dashboard only, not push notifications.

- id: "scene_delivery_detection_front"
  alias: "Scene — leverans detekterad vid entrén"
  description: >
    Person vid entrén 15–90 s utan att dörren öppnas = möjlig leverans.
    Max 1 notis per 10 minuter.
  mode: single
  max_exceeded: silent

  trigger:
    - platform: state
      entity_id: binary_sensor.front_scene_object_present
      to: "on"

  action:
    - variables:
        arrived_at: "{{ now() }}"

    - wait_for_trigger:
        - platform: state
          entity_id: binary_sensor.front_scene_object_present
          to: "off"
      timeout: "00:03:00"
      continue_on_timeout: true

    - variables:
        dwell_seconds: "{{ (now() - arrived_at).total_seconds() | int }}"

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ dwell_seconds >= 15 and dwell_seconds <= 90 }}"
          sequence:
            - service: notify.mobile_app_thomas_iphone_15
              data:
                title: "Möjlig leverans vid entrén"
                message: "Person vid dörren {{ dwell_seconds }} s"
                data:
                  image: "/api/image/proxy/image.front_latest_detection"

    # Cooldown — blockera nästa körning i 10 min
    - delay: "00:10:00"

- id: "scene_crowd_alert_front"
  alias: "Scene — folksamling vid entrén"
  description: "Alert om 3+ personer samtidigt vid entrén. Max 1 notis per 5 min."
  mode: single
  max_exceeded: silent

  trigger:
    - platform: numeric_state
      entity_id: sensor.front_scene_persons
      above: 2
      for: "00:00:05"

  action:
    - service: notify.mobile_app_thomas_iphone_15
      data:
        title: "Folksamling vid entrén"
        message: "{{ states('sensor.front_scene_persons') }} personer detekterade"
        data:
          image: "/api/image/proxy/image.front_latest_detection"
    - delay: "00:05:00"
