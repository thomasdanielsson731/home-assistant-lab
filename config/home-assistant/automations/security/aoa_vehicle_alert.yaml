- id: "aoa_vehicle_detected_driveway"
  alias: "AOA — fordon i uppfart"
  initial_state: false
  description: >
    Av som standard — många fordon i uppfart ger falsklarm.
    Aktivera för demo eller tunna zoner.
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.driveway_wide_aoa_vehicle
        - binary_sensor.driveway_id_aoa_vehicle
        - binary_sensor.front_aoa_vehicle
      to: "on"
  action:
    - service: notify.mobile_app_thomas_iphone_15
      data:
        title: "Fordon detekterat"
        message: >
          {{ trigger.to_state.name | replace(' aoa vehicle', '') | title }}
          — kamera AOA
