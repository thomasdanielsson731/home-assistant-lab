- id: "aoa_person_detected_entry"
  alias: "AOA — person detected at entry point"
  description: >
    Triggers when AOA detects a person at front or driveway cameras.
    Complements Frigate alerts with on-camera inference (lower latency, no NVR dependency).
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.front_aoa_person
        - binary_sensor.driveway_id_aoa_person
        - binary_sensor.driveway_wide_aoa_person
      to: "on"
  action:
    - service: notify.mobile_app_thomas_iphone_15
      data:
        title: "Person detected"
        message: >
          {{ trigger.to_state.name | replace(' aoa person', '') | title }}
          — on-camera detection

- id: "aoa_person_detected_perimeter"
  alias: "AOA — person detected at perimeter"
  description: >
    Triggers when AOA detects a person at backyard or storage cameras.
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.backyard_aoa_person
        - binary_sensor.storage_ext_aoa_person
        - binary_sensor.storage_int_aoa_person
      to: "on"
  action:
    - service: notify.mobile_app_thomas_iphone_15
      data:
        title: "Perimeter alert"
        message: >
          {{ trigger.to_state.name | replace(' aoa person', '') | title }}
          — person detected
