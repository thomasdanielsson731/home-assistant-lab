# Smoke detector alert — unified template sensor covers all *ias_zon* entities
# Timeline events via event_normalizer (MQTT). Run configure_smoke_detectors.py after pairing.

- id: "security_smoke_detected_notify"
  alias: "Security — smoke detector alarm"
  initial_state: true
  description: >
    Push when any HEIMAN IAS zone reports smoke (via sensor.house_smoke_alarm).
  mode: parallel
  max_exceeded: silent

  trigger:
    - platform: state
      entity_id: binary_sensor.house_smoke_alarm
      to: "on"

  action:
    - service: notify.mobile_app_thomas_iphone_15
      data:
        title: "RÖKALARM"
        message: >-
          {{ state_attr('binary_sensor.house_smoke_alarm', 'active_sensors') | default('Brandvarnare') }}
          {% set inn = states('sensor.house_indoor_temperature') %}
          {% if inn not in ['unknown', 'unavailable', ''] %} · inne {{ inn }}°C{% endif %}
          — kontrollera omedelbart.
        data:
          url: /lovelace/home-security/security
          clickAction: /lovelace/home-security/security
