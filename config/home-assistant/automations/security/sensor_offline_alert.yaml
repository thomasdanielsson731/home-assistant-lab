# Push when critical sensors go offline (Thomas iPhone only).

- id: sensor_offline_water_alert
  alias: "Sensor offline — kitchen water leak"
  description: Notify when dishwasher leak sensor stops responding.
  mode: single
  max_exceeded: silent
  trigger:
    - platform: state
      entity_id: binary_sensor.sonoff_snzb_05p
      to: unavailable
      for: "00:05:00"
  action:
    - service: notify.mobile_app_thomas_iphone_15
      data:
        title: "Vattensensor offline"
        message: "Kök diskmaskin-sensor svarar inte — vattenlarm tyst tills den är tillbaka."
        data:
          url: /lovelace/home-security/security
          clickAction: /lovelace/home-security/security

- id: sensor_offline_smoke_alert
  alias: "Sensor offline — smoke detector count"
  description: Notify when fewer than 3 HEIMAN smoke detectors are online.
  mode: single
  max_exceeded: silent
  trigger:
    - platform: template
      value_template: >-
        {{ state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | int(3) < 3 }}
      for: "00:10:00"
  action:
    - service: notify.mobile_app_thomas_iphone_15
      data:
        title: >-
          {% if state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | int(0) == 0 %}
          Alla brandvarnare offline
          {% else %}
          Brandvarnare offline
          {% endif %}
        message: >-
          {% set dc = state_attr('binary_sensor.house_smoke_alarm', 'detector_count') | int(0) %}
          {% if dc == 0 %}
          Inga brandvarnare svarar — kontrollera ZHA och batteri.
          {% else %}
          Endast {{ dc }}/3 brandvarnare online — kontrollera ZHA.
          {% endif %}
        data:
          url: /lovelace/home-tech/ops
          clickAction: /lovelace/home-tech/ops
