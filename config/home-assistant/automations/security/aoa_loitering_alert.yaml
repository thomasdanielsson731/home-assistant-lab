- id: "aoa_loitering_detected"
  alias: "AOA — loitering detected"
  initial_state: true
  description: >
    Push when AOA loitering scenario fires (person lingering past camera threshold).
    15 min cooldown per automation run.
  mode: single
  max_exceeded: silent
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.front_aoa_loitering
        - binary_sensor.driveway_wide_aoa_loitering
        - binary_sensor.driveway_id_aoa_loitering
        - binary_sensor.backyard_aoa_loitering
        - binary_sensor.storage_ext_aoa_loitering
        - binary_sensor.storage_int_aoa_loitering
      to: "on"
  action:
    - service: notify.mobile_app_thomas_iphone_15
      data:
        title: "Kvarvarande person ute"
        message: >-
          {% set zone = trigger.entity_id.split('.')[1].replace('_aoa_loitering', '') %}
          {{ zone | replace('_', ' ') | title }}
    - delay: "00:15:00"
