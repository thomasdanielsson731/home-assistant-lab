# Future notification policy — enable when ready
#
# Notify ONLY for:
#   1. Cats (neighbour cats, custom Frigate model)
#   2. Unknown persons at entry (Frigate person — no household identity layer)
#
# Thomas iPhone push only (family does not use HA Companion for presence).

- id: notify_cat_detected
  alias: "Notify — cat detected"
  initial_state: false
  description: >
    Push when Frigate detects a cat. Enable after cat model is trained
    or Frigate label 'cat' is reliable.
  mode: single
  max_exceeded: silent
  trigger:
    - platform: mqtt
      topic: "frigate/events"
  condition:
    - condition: template
      value_template: >
        {{ trigger.payload_json.type == 'new'
           and trigger.payload_json.after.label == 'cat' }}
  action:
    - service: notify.mobile_app_thomas_iphone_15
      data:
        title: "Cat detected"
        message: >-
          {{ trigger.payload_json.after.camera | replace('_', ' ') | title }}
        data:
          image: /api/frigate/notifications/{{ trigger.payload_json.after.id }}/snapshot.jpg

- id: notify_unknown_person_entry
  alias: "Notify — person at entry"
  initial_state: false
  description: >
    Push when Frigate detects a person at an entry camera.
    Enable when you want Thomas-only security alerts (no face filtering).
  mode: single
  max_exceeded: silent
  trigger:
    - platform: mqtt
      topic: "frigate/events"
  condition:
    - condition: template
      value_template: >
        {{ trigger.payload_json.type == 'new'
           and trigger.payload_json.after.label == 'person'
           and trigger.payload_json.after.camera in ['front', 'driveway_id', 'driveway_wide'] }}
  action:
    - service: notify.mobile_app_thomas_iphone_15
      data:
        title: "Person at entry"
        message: >-
          {{ trigger.payload_json.after.camera | replace('_', ' ') | title }}
        data:
          image: /api/frigate/notifications/{{ trigger.payload_json.after.id }}/snapshot.jpg
