- id: frigate_person_detected
  alias: "Frigate — Person detected at entry"
  enabled: false  # Push notifications off — see security/smart_notifications.yaml for future policy
  description: >
    Notify when Frigate detects a new person event at an entry camera.
    Uses frigate/events (not state topic) so the snapshot ID is available.
  trigger:
    - platform: mqtt
      topic: "frigate/events"
  condition:
    - condition: template
      value_template: >
        {{ trigger.payload_json.type == 'new'
           and trigger.payload_json.after.label == 'person'
           and trigger.payload_json.after.camera in ['front', 'driveway_id', 'driveway_wide'] }}
  action:
    - service: notify.mobile_app_thomas_iphone_15
      data:
        title: "Person detected"
        message: "{{ trigger.payload_json.after.camera | replace('_', ' ') | title }}"
        data:
          image: /api/frigate/notifications/{{ trigger.payload_json.after.id }}/snapshot.jpg
  mode: single
  max_exceeded: silent

- id: double_take_person_identified
  alias: "Double Take — Known person identified"
  description: "Log and optionally act when a known face is matched"
  trigger:
    - platform: mqtt
      topic: "double_take/matches"
  condition:
    - condition: template
      value_template: "{{ trigger.payload_json.match is defined }}"
  action:
    - service: logbook.log
      data:
        name: "Face Recognition"
        message: >
          {{ trigger.payload_json.match.name }} identified
          at {{ trigger.payload_json.camera }}
          with {{ trigger.payload_json.match.confidence }}% confidence.
  mode: queued
  max: 5
