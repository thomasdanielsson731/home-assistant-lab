# Double Take — Home Lab
# Deployed to /config/double-take/config.yml on HA host
# Face recognizer: CodeProject.AI running on Windows PC (192.168.68.118)

mqtt:
  host: core-mosquitto
  port: 1883
  topics:
    frigate: frigate
    matches: double_take/matches
    cameras: double_take/cameras

frigate:
  url: http://ccab4aaf-frigate-fa:5000
  cameras:
    - front
    - driveway_id

# CodeProject.AI — native Windows service, no Docker required
# Install: https://www.codeproject.com/AI/docs/why/installing_on_windows.html
# After install, enable the Face Recognition module in the dashboard
detectors:
  codeproject:
    url: http://192.168.68.118:32168

time:
  timezone: Europe/Stockholm

detect:
  match:
    save: true
    base64: false
    confidence: 65
    purge: 168
  unknown:
    save: true
    base64: false
    confidence: 40
    purge: 24

notify:
  gotify: false

# Persons to recognize — add training images via Double Take UI
# Settings → Training → Upload photos for each person
