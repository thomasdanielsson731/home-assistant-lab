# Double Take — Danielsson Home
# Deployed to /config/double-take/config.yml on HA host
# Face recognizer: CodeProject.AI on Windows dev PC (DEV_PC_HOST / 192.168.68.136)

mqtt:
  host: core-mosquitto
  port: 1883
  username: !secret mqtt_username
  password: !secret mqtt_password
  topics:
    frigate: frigate
    matches: double_take/matches
    cameras: double_take/cameras

frigate:
  url: http://ccab4aaf-frigate-fa:5000
  cameras:
    - front
    - driveway_id

# CodeProject.AI — use deepstack key (jakowenko Double Take 1.13 API-compatible)
# CPAI Face module must be Running on dev PC :32168
detectors:
  deepstack:
    url: http://192.168.68.136:32168
    timeout: 60
    opencv_face_required: false

time:
  timezone: Europe/Stockholm

detect:
  match:
    save: true
    base64: false
    confidence: 65
    purge: 168
  unknown:
    save: true
    base64: false
    confidence: 40
    purge: 24

# Persons to recognize — add training images via Double Take UI
# Settings → Training → Upload photos for each person
